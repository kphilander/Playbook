<svg xmlns="http://www.w3.org/2000/svg" width="80" height="80" viewBox="0 0 80 80">
  <rect width="80" height="80" fill="#1B2838"/>
  <!-- Dot grid -->
  <circle cx="20" cy="20" r="0.5" fill="#00D4AA" opacity="0.12"/>
  <circle cx="60" cy="20" r="0.5" fill="#00D4AA" opacity="0.12"/>
  <circle cx="20" cy="60" r="0.5" fill="#00D4AA" opacity="0.12"/>
  <circle cx="60" cy="60" r="0.5" fill="#00D4AA" opacity="0.12"/>
  <circle cx="40" cy="40" r="0.5" fill="#00D4AA" opacity="0.08"/>
  <!-- Playbook mark (very subtle) -->
  <rect x="28" y="28" width="10" height="24" rx="2" fill="#FFFFFF" opacity="0.025"/>
  <polygon points="40,28 52,40 40,52" fill="#00D4AA" opacity="0.025"/>
  <!-- Diagonal accent -->
  <line x1="0" y1="80" x2="80" y2="0" stroke="#00D4AA" stroke-width="0.25" opacity="0.05"/>
</svg>
