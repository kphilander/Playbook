<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=420">
<title>بطاقة لوحة النشاط — الفئة الثانية</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800;900&family=Noto+Sans+Arabic:wght@300;400;600;700;800;900&family=Source+Code+Pro:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { margin: 0; padding: 0; background: transparent; }

  .session-summary {
    width: 420px;
    min-height: 360px;
    background: var(--pb-color-white);
    border: 1px solid var(--pb-color-neutral-100);
    border-radius: 16px;
    font-family: var(--pb-font-body);
    color: var(--pb-color-primary);
    padding: 28px 28px 24px;
    display: flex;
    flex-direction: column;
  }

  .card-heading {
    font-family: var(--pb-font-heading);
    font-weight: 700;
    font-size: calc(19px * var(--pb-template-text-scale, 1));
    color: var(--pb-color-primary);
    margin-bottom: 24px;
    display: flex;
    align-items: baseline;
    gap: 8px;
    line-height: 1.5;
  }
  .card-heading .period {
    font-weight: 400;
    font-size: calc(15px * var(--pb-template-text-scale, 1));
    color: var(--pb-color-neutral-500);
  }

  .chart {
    display: flex;
    align-items: flex-end;
    gap: 12px;
    height: 100px;
    margin-bottom: 8px;
    padding: 0 4px;
  }
  .bar-col {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    height: 100%;
    justify-content: flex-end;
  }
  .bar {
    width: 100%;
    max-width: 36px;
    border-radius: 4px 4px 0 0;
    background: var(--pb-color-neutral-100);
    min-height: 4px;
  }
  .bar.today { background: var(--pb-color-secondary); }
  .bar-label {
    font-family: var(--pb-font-heading);
    font-size: calc(12px * var(--pb-template-text-scale, 1));
    font-weight: 600;
    color: var(--pb-color-neutral-300);
    margin-top: 8px;
    line-height: 1.5;
  }
  .bar-label.today { color: var(--pb-color-secondary); }

  .stats-row {
    display: flex;
    gap: 6px;
    align-items: center;
    font-family: var(--pb-font-body);
    font-size: calc(15px * var(--pb-template-text-scale, 1));
    font-weight: 500;
    color: var(--pb-color-neutral-700);
    margin-top: 16px;
    padding: 14px 0;
    border-top: 1px solid var(--pb-color-neutral-50);
    border-bottom: 1px solid var(--pb-color-neutral-50);
    line-height: 1.7;
  }
  .stats-row .sep { color: var(--pb-color-neutral-300); }

  .limit-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 0;
    margin-top: 4px;
  }
  .limit-label {
    font-size: calc(15px * var(--pb-template-text-scale, 1));
    color: var(--pb-color-neutral-500);
    line-height: 1.7;
  }
  .limit-value {
    font-family: var(--pb-font-body);
    font-weight: 600;
    font-size: calc(15px * var(--pb-template-text-scale, 1));
    color: var(--pb-color-primary);
  }
  .limit-badge {
    display: inline-block;
    background: #E8FFF8;
    color: var(--pb-color-secondary);
    font-family: var(--pb-font-heading);
    font-size: calc(12px * var(--pb-template-text-scale, 1));
    font-weight: 700;
    padding: 3px 10px;
    border-radius: 4px;
    margin-inline-start: 8px;
  }

  .manage-link {
    font-family: var(--pb-font-heading);
    font-size: calc(15px * var(--pb-template-text-scale, 1));
    font-weight: 600;
    color: var(--pb-color-secondary);
    text-decoration: none;
    margin-top: auto;
    padding-top: 10px;
  }
</style>
  <link rel="stylesheet" href="brand-inject.css">
  <style>
    /* Locale-specific font cascade override — must come AFTER brand-inject.css to win */
    :root {
      --pb-font-heading: 'Inter', 'Noto Sans Arabic', system-ui, -apple-system, sans-serif;
      --pb-font-body: 'Inter', 'Noto Sans Arabic', system-ui, sans-serif;
    }
  </style>
  </head>
<body>
<div class="session-summary">

  <div class="card-heading">
    النشاط <span class="period">— آخر 7 أيام</span>
  </div>

  <div class="chart">
    <div class="bar-col">
      <div class="bar" style="height: 60%;"></div>
      <div class="bar-label">الاثنين</div>
    </div>
    <div class="bar-col">
      <div class="bar" style="height: 35%;"></div>
      <div class="bar-label">الثلاثاء</div>
    </div>
    <div class="bar-col">
      <div class="bar" style="height: 0; min-height: 4px;"></div>
      <div class="bar-label">الأربعاء</div>
    </div>
    <div class="bar-col">
      <div class="bar" style="height: 80%;"></div>
      <div class="bar-label">الخميس</div>
    </div>
    <div class="bar-col">
      <div class="bar" style="height: 0; min-height: 4px;"></div>
      <div class="bar-label">الجمعة</div>
    </div>
    <div class="bar-col">
      <div class="bar" style="height: 50%;"></div>
      <div class="bar-label">السبت</div>
    </div>
    <div class="bar-col">
      <div class="bar today" style="height: 45%;"></div>
      <div class="bar-label today">الأحد</div>
    </div>
  </div>

  <div class="stats-row">
    الجلسات: 4 <span class="sep">&middot;</span> الوقت: 3 ساعات و22 دقيقة <span class="sep">&middot;</span> المتوسط: 50 دقيقة
  </div>

  <div class="limit-row">
    <span class="limit-label">حد الإيداع</span>
    <span class="limit-value">200 د.إ/أسبوع <span class="limit-badge">مُفعَّل</span></span>
  </div>

  <a class="manage-link">إدارة الإعدادات &larr;</a>

</div>
</body>
</html>
