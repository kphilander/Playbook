<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1800">
<title>Venue Poster — Tier 2</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800;900&family=Source+Sans+3:wght@300;400;600&family=Source+Code+Pro:wght@500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { margin: 0; padding: 24px; background: var(--pb-color-white); }

  .poster {
    width: 1800px;
    height: 2400px;
    background: var(--pb-color-white);
    font-family: var(--pb-font-body);
    color: var(--pb-color-primary);
    position: relative;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* 3px solid teal top bar (Tier 2 spec) */
  .accent-bar {
    height: 6px;
    background: var(--pb-color-secondary);
    flex-shrink: 0;
  }

  /* Header */
  .poster-header {
    padding: 96px 128px 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .logo {
    font-family: var(--pb-font-heading);
    font-size: calc(64px * var(--pb-template-text-scale, 1));
  }
  .logo-play {
    font-weight: 800;
    letter-spacing: -0.02em;
    color: var(--pb-color-primary);
  }
  .logo-book {
    font-weight: 300;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--pb-color-secondary);
  }

  /* Body */
  .poster-body {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 0 128px;
    text-align: center;
  }

  .headline {
    font-family: var(--pb-font-heading);
    font-weight: 700;
    font-size: calc(144px * var(--pb-template-text-scale, 1));
    color: var(--pb-color-primary);
    line-height: 1.1;
    letter-spacing: -0.03em;
    margin-bottom: 32px;
  }
  .subhead {
    font-family: var(--pb-font-body);
    font-size: calc(52px * var(--pb-template-text-scale, 1));
    color: var(--pb-color-neutral-700);
    line-height: 1.5;
    margin-bottom: 112px;
  }

  /* Large helpline number */
  .helpline-number {
    font-family: var(--pb-font-mono);
    font-weight: 600;
    font-size: calc(144px * var(--pb-template-text-scale, 1));
    color: var(--pb-color-secondary);
    letter-spacing: 0.02em;
    margin-bottom: 32px;
  }
  .helpline-channels {
    font-family: var(--pb-font-heading);
    font-weight: 600;
    font-size: calc(44px * var(--pb-template-text-scale, 1));
    color: var(--pb-color-neutral-500);
    letter-spacing: 0.04em;
    margin-bottom: 96px;
  }
  .helpline-channels strong {
    color: var(--pb-color-primary);
    font-weight: 700;
  }

  /* QR code */
  .qr-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 48px;
    margin-bottom: 40px;
  }
  .qr-box {
    width: 240px;
    height: 240px;
    background: var(--pb-color-neutral-50);
    border-radius: 24px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--pb-font-mono);
    font-size: calc(28px * var(--pb-template-text-scale, 1));
    font-weight: 600;
    color: var(--pb-color-primary);
  }
  .qr-label {
    text-align: left;
  }
  .qr-label-main {
    font-family: var(--pb-font-heading);
    font-weight: 700;
    font-size: calc(40px * var(--pb-template-text-scale, 1));
    color: var(--pb-color-primary);
    margin-bottom: 8px;
  }
  .qr-label-sub {
    font-size: calc(30px * var(--pb-template-text-scale, 1));
    color: var(--pb-color-neutral-500);
  }

  /* Footer */
  .poster-footer {
    padding: 64px 128px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-top: 1px solid var(--pb-color-neutral-100);
  }
  .operator-placeholder {
    width: 240px;
    height: 80px;
    border: 1.5px dashed var(--pb-color-neutral-300);
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--pb-font-body);
    font-size: calc(22px * var(--pb-template-text-scale, 1));
    color: var(--pb-color-neutral-300);
    letter-spacing: 0.02em;
  }
  .footer-legal {
    font-size: calc(26px * var(--pb-template-text-scale, 1));
    color: var(--pb-color-neutral-500);
    text-align: right;
    line-height: 1.5;
  }
</style>
  <link rel="stylesheet" href="brand-inject.css">
  </head>
<body>
<div class="poster">

  <div class="accent-bar"></div>

  <div class="poster-header">
    <span class="logo"><span class="logo-play">Play</span><span class="logo-book">book</span></span>
  </div>

  <div class="poster-body">
    <div class="headline">Need to talk?</div>
    <div class="subhead">Free. Confidential. No judgment.</div>

    <div class="helpline-number">{{HELPLINE_NUMBER}}</div>
    <div class="helpline-channels">
      {{TEXT_NUMBER}} &nbsp;&middot;&nbsp; <strong>Chat</strong> {{CHAT_URL}}
    </div>

    <div class="qr-row">
      <div class="qr-box">QR</div>
      <div class="qr-label">
        <div class="qr-label-main">Scan for support</div>
        <div class="qr-label-sub">{{CHAT_URL}}</div>
      </div>
    </div>
  </div>

  <div class="poster-footer">
    <div class="operator-placeholder">Your logo</div>
    <div class="footer-legal">
      {{AGE_DISCLAIMER}} {{GENERAL_DISCLAIMER}}
    </div>
  </div>

</div>
</body>
</html>
