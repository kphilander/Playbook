<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800;900&family=Noto+Sans+Arabic:wght@300;400;600;700;800;900&family=Source+Code+Pro:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { margin: 0; background: transparent; }
  .social-card {
    width: 1080px; height: 1080px;
    background: var(--pb-color-primary);
    position: relative; overflow: hidden;
    display: flex; flex-direction: column;
  }
  .social-card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 8px;
    background: linear-gradient(90deg, var(--pb-color-accent), var(--pb-color-secondary));
  }
  .card-header { padding: 56px 64px 0; display: flex; align-items: center; justify-content: space-between; position: relative; z-index: 1; }
  .card-logo { font-family: var(--pb-font-heading); font-size: calc(32px * var(--pb-template-text-scale, 1)); }
  .card-logo .logo-play { color: var(--pb-color-white); font-weight: 800; letter-spacing: -0.02em; }
  .card-logo .logo-book { color: var(--pb-color-secondary); font-weight: 300; text-transform: uppercase; letter-spacing: 0.08em; }
  .card-pillar { font-family: var(--pb-font-heading); font-size: calc(20px * var(--pb-template-text-scale, 1)); font-weight: 700; color: var(--pb-color-primary); background: var(--pb-color-secondary); padding: 8px 22px; border-radius: 100px; display: inline-flex; align-items: center; justify-content: center; line-height: 1; }
  .card-body { flex: 1; display: flex; flex-direction: column; justify-content: center; padding: 0 64px; position: relative; z-index: 1; }
  .myth-label { font-family: var(--pb-font-heading); font-size: calc(18px * var(--pb-template-text-scale, 1)); font-weight: 700; color: var(--pb-color-accent); margin-bottom: 20px; }
  .myth-intro { font-family: var(--pb-font-body); font-size: calc(26px * var(--pb-template-text-scale, 1)); font-weight: 400; color: var(--pb-color-neutral-300); margin-bottom: 12px; line-height: 1.8; }
  .myth-statement { font-family: var(--pb-font-heading); font-size: calc(54px * var(--pb-template-text-scale, 1)); font-weight: 700; line-height: 1.5; color: var(--pb-color-white); margin-bottom: 32px; }
  .fact-statement { font-family: var(--pb-font-heading); font-size: calc(48px * var(--pb-template-text-scale, 1)); font-weight: 700; line-height: 1.6; color: var(--pb-color-white); }
  .fact-statement strong { color: var(--pb-color-secondary); font-weight: 700; }
  .card-footer { background: var(--pb-color-primary-light); padding: 20px 64px; display: flex; align-items: center; justify-content: space-between; position: relative; z-index: 1; }
  .footer-helpline { font-family: var(--pb-font-mono); font-weight: 700; font-size: calc(16px * var(--pb-template-text-scale, 1)); color: var(--pb-color-white); }
  .footer-legal { font-size: calc(13px * var(--pb-template-text-scale, 1)); color: var(--pb-color-neutral-300); font-family: var(--pb-font-body); }
</style>
  <link rel="stylesheet" href="brand-inject.css">
  <style>
    /* Locale-specific font cascade override — must come AFTER brand-inject.css to win */
    :root {
      --pb-font-heading: 'Inter', 'Noto Sans Arabic', system-ui, -apple-system, sans-serif;
      --pb-font-body: 'Inter', 'Noto Sans Arabic', system-ui, sans-serif;
    }
  </style>
  </head>
<body>
<div class="social-card">
  <div class="card-header">
    <span class="card-logo"><span class="logo-play">Play</span><span class="logo-book">book</span></span>
    <span class="card-pillar">شفافية</span>
  </div>
  <div class="card-body">
    <div class="myth-label">الاعتقاد مقابل الأرقام</div>
    <div class="myth-intro">يعتقد بعض اللاعبين:</div>
    <div class="myth-statement">«فزت فوزًا كبيرًا في المرة السابقة»</div>
    <div class="fact-statement">في الواقع، يحتفظ الذهن بالانتصارات <strong>وينسى الخسائر.</strong></div>
  </div>
  <div class="card-footer">
    <span class="footer-helpline">دعم مجاني وسري على مدار الساعة: {{HELPLINE_NUMBER}}</span>
    <span class="footer-legal">{{AGE_DISCLAIMER}}</span>
  </div>
</div>
</body>
</html>
