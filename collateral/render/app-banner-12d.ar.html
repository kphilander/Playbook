<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=728">
<title>بانر التطبيق — التوعية</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800;900&family=Noto+Sans+Arabic:wght@300;400;600;700;800;900&family=Source+Code+Pro:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { margin: 0; padding: 0; background: transparent; }

  .app-banner {
    width: 728px;
    height: 90px;
    background: var(--pb-color-primary);
    font-family: var(--pb-font-body);
    color: var(--pb-color-white);
    display: flex;
    flex-direction: column;
    position: relative;
    overflow: hidden;
  }

  .accent-bar {
    height: 4px;
    background: linear-gradient(90deg, var(--pb-color-accent), var(--pb-color-secondary));
    flex-shrink: 0;
  }

  .banner-inner {
    flex: 1;
    display: flex;
    align-items: center;
    padding: 0 20px;
    gap: 16px;
    position: relative;
    z-index: 1;
  }

  .card-logo {
    font-family: var(--pb-font-heading);
    font-size: calc(16px * var(--pb-template-text-scale, 1));
    white-space: nowrap;
    flex-shrink: 0;
  }
  .card-logo .logo-play { color: var(--pb-color-white); font-weight: 800; letter-spacing: -0.02em; }
  .card-logo .logo-book { color: var(--pb-color-secondary); font-weight: 300; text-transform: uppercase; letter-spacing: 0.08em; }

  .banner-message {
    flex: 1;
    font-family: var(--pb-font-heading);
    font-weight: 600;
    font-size: calc(16px * var(--pb-template-text-scale, 1));
    color: var(--pb-color-white);
    line-height: 1.5;
    white-space: nowrap;
  }

  .cta-pill {
    padding: 9px 22px;
    background: var(--pb-color-secondary);
    color: var(--pb-color-primary);
    font-family: var(--pb-font-heading);
    font-weight: 700;
    font-size: calc(15px * var(--pb-template-text-scale, 1));
    border: none;
    border-radius: 8px;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .banner-helpline {
    font-family: var(--pb-font-mono);
    font-weight: 700;
    font-size: calc(14px * var(--pb-template-text-scale, 1));
    color: var(--pb-color-neutral-300);
    white-space: nowrap;
    flex-shrink: 0;
  }
</style>
  <link rel="stylesheet" href="brand-inject.css">
  <style>
    /* Locale-specific font cascade override — must come AFTER brand-inject.css to win */
    :root {
      --pb-font-heading: 'Inter', 'Noto Sans Arabic', system-ui, -apple-system, sans-serif;
      --pb-font-body: 'Inter', 'Noto Sans Arabic', system-ui, sans-serif;
    }
  </style>
  </head>
<body>
<div class="app-banner">

  <div class="accent-bar"></div>

  <div class="banner-inner">
    <span class="card-logo"><span class="logo-play">Play</span><span class="logo-book">book</span></span>
    <span class="banner-message">لكل لعبة نسبة للكازينو. معرفة النسبة لكل لاعب.</span>
    <button class="cta-pill">لمعرفة المزيد</button>
    <span class="banner-helpline">دعم مجاني وسري: {{HELPLINE_NUMBER}}</span>
  </div>

</div>
</body>
</html>
