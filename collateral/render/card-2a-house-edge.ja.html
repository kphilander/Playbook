<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800;900&family=Noto+Sans+JP:wght@300;400;600;700;800;900&family=Source+Code+Pro:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { margin: 0; background: transparent; }
  .social-card {
    width: 1080px; height: 1080px;
    background: linear-gradient(145deg, var(--pb-color-primary-dark), var(--pb-color-primary));
    position: relative; overflow: hidden;
    display: flex; flex-direction: column;
  }
  .social-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 8px; background: linear-gradient(90deg, var(--pb-color-accent), var(--pb-color-secondary)); }
  .card-header { padding: 56px 64px 0; display: flex; align-items: center; justify-content: space-between; position: relative; z-index: 1; }
  .card-logo { font-family: var(--pb-font-heading); font-size: calc(32px * var(--pb-template-text-scale, 1)); }
  .card-logo .logo-play { color: var(--pb-color-white); font-weight: 800; letter-spacing: -0.02em; }
  .card-logo .logo-book { color: var(--pb-color-secondary); font-weight: 300; text-transform: uppercase; letter-spacing: 0.08em; }
  .section-label { font-family: var(--pb-font-heading); font-size: calc(18px * var(--pb-template-text-scale, 1)); font-weight: 700; color: var(--pb-color-accent); }
  .card-body { flex: 1; display: flex; flex-direction: column; justify-content: center; padding: 0 64px; position: relative; z-index: 1; }
  .headline { font-family: var(--pb-font-heading); font-size: calc(48px * var(--pb-template-text-scale, 1)); font-weight: 700; line-height: 1.4; color: var(--pb-color-white); margin-bottom: 36px; }
  .odds-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .odds-item { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 16px; padding: 24px; }
  .odds-game { font-family: var(--pb-font-body); font-size: calc(20px * var(--pb-template-text-scale, 1)); color: var(--pb-color-neutral-300); margin-bottom: 8px; line-height: 1.5; }
  .odds-edge { font-family: var(--pb-font-heading); font-size: calc(46px * var(--pb-template-text-scale, 1)); font-weight: 700; letter-spacing: -0.02em; }
  .odds-edge.teal { color: var(--pb-color-secondary); }
  .odds-edge.white { color: var(--pb-color-white); }
  .odds-edge.orange { color: var(--pb-color-accent); }
  .odds-note { font-family: var(--pb-font-body); font-size: calc(17px * var(--pb-template-text-scale, 1)); color: var(--pb-color-neutral-500); margin-top: 4px; line-height: 1.5; }
  .card-footer { background: var(--pb-color-primary-light); padding: 20px 64px; display: flex; align-items: center; justify-content: space-between; position: relative; z-index: 1; }
  .footer-helpline { font-family: var(--pb-font-mono); font-weight: 700; font-size: calc(16px * var(--pb-template-text-scale, 1)); color: var(--pb-color-white); }
  .footer-legal { font-size: calc(13px * var(--pb-template-text-scale, 1)); color: var(--pb-color-neutral-300); font-family: var(--pb-font-body); }
</style>
  <link rel="stylesheet" href="brand-inject.css">
  <style>
    /* Locale-specific font cascade override — must come AFTER brand-inject.css to win */
    :root {
      --pb-font-heading: 'Inter', 'Noto Sans JP', system-ui, -apple-system, sans-serif;
      --pb-font-body: 'Inter', 'Noto Sans JP', system-ui, sans-serif;
    }
  </style>
  </head>
<body>
<div class="social-card">
  <div class="card-header">
    <span class="card-logo"><span class="logo-play">Play</span><span class="logo-book">book</span></span>
    <span class="section-label">本当の確率</span>
  </div>
  <div class="card-body">
    <div class="headline">すべてのゲームにはハウスエッジがあります。<br>実際に遊んでいるものの中身をご紹介します。</div>
    <div class="odds-grid">
      <div class="odds-item">
        <div class="odds-game">ブラックジャック（基本戦略）</div>
        <div class="odds-edge teal">0.5%</div>
        <div class="odds-note">カジノで最も有利な確率</div>
      </div>
      <div class="odds-item">
        <div class="odds-game">ヨーロピアンルーレット</div>
        <div class="odds-edge white">2.7%</div>
        <div class="odds-note">シングルゼロのホイール</div>
      </div>
      <div class="odds-item">
        <div class="odds-game">アメリカンルーレット</div>
        <div class="odds-edge orange">5.26%</div>
        <div class="odds-note">ダブルゼロはエッジも倍</div>
      </div>
      <div class="odds-item">
        <div class="odds-game">スロット（平均）</div>
        <div class="odds-edge white">2〜15%</div>
        <div class="odds-note">機種によって異なります</div>
      </div>
    </div>
  </div>
  <div class="card-footer">
    <span class="footer-helpline">24時間無料サポート：{{HELPLINE_NUMBER}}</span>
    <span class="footer-legal">{{AGE_DISCLAIMER}}</span>
  </div>
</div>
</body>
</html>
