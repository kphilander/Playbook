<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800;900&family=Noto+Sans+JP:wght@300;400;600;700;800;900&family=Source+Code+Pro:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { margin: 0; background: transparent; }
  .story-card {
    width: 1080px; height: 1920px;
    background: linear-gradient(180deg, var(--pb-color-primary), var(--pb-color-primary-dark));
    position: relative; overflow: hidden;
    display: flex; flex-direction: column;
  }
  .story-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 8px; background: linear-gradient(90deg, var(--pb-color-accent), var(--pb-color-secondary)); z-index: 2; }
  .story-header { padding: 48px 48px 0; display: flex; align-items: center; justify-content: space-between; position: relative; z-index: 1; }
  .story-logo { font-family: var(--pb-font-heading); font-size: calc(28px * var(--pb-template-text-scale, 1)); }
  .story-logo .logo-play { color: var(--pb-color-white); font-weight: 800; letter-spacing: -0.02em; }
  .story-logo .logo-book { color: var(--pb-color-secondary); font-weight: 300; text-transform: uppercase; letter-spacing: 0.08em; }
  .section-label { font-family: var(--pb-font-heading); font-size: calc(18px * var(--pb-template-text-scale, 1)); font-weight: 700; color: var(--pb-color-primary); background: var(--pb-color-secondary); padding: 8px 22px; border-radius: 100px; display: inline-flex; align-items: center; justify-content: center; line-height: 1; }
  .story-body { flex: 1; display: flex; flex-direction: column; justify-content: center; padding: 0 48px; position: relative; z-index: 1; }
  .eyebrow { font-family: var(--pb-font-heading); font-size: calc(24px * var(--pb-template-text-scale, 1)); font-weight: 700; color: var(--pb-color-secondary); margin-bottom: 24px; }
  .headline { font-family: var(--pb-font-heading); font-size: calc(68px * var(--pb-template-text-scale, 1)); font-weight: 700; line-height: 1.3; color: var(--pb-color-white); margin-bottom: 64px; }
  .bar-list { display: flex; flex-direction: column; gap: 36px; margin-bottom: 56px; }
  .bar-row { display: flex; flex-direction: column; gap: 12px; }
  .bar-label { display: flex; align-items: baseline; justify-content: space-between; }
  .bar-name { font-family: var(--pb-font-heading); font-size: calc(34px * var(--pb-template-text-scale, 1)); font-weight: 700; color: var(--pb-color-white); line-height: 1.4; }
  .bar-value { font-family: var(--pb-font-mono); font-size: calc(40px * var(--pb-template-text-scale, 1)); font-weight: 700; }
  .bar-value.teal { color: var(--pb-color-secondary); }
  .bar-value.white { color: var(--pb-color-white); }
  .bar-value.orange { color: var(--pb-color-accent); }
  .bar-track { width: 100%; height: 56px; background: rgba(255,255,255,0.06); border-radius: 12px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 12px; }
  .bar-fill.teal { background: var(--pb-color-secondary); width: 18%; }
  .bar-fill.white { background: var(--pb-color-white); width: 40%; }
  .bar-fill.orange { background: var(--pb-color-accent); width: 95%; }
  .body-text { font-family: var(--pb-font-body); font-size: calc(32px * var(--pb-template-text-scale, 1)); line-height: 1.7; color: var(--pb-color-neutral-300); }
  .story-footer { background: var(--pb-color-primary-light); padding: 24px 48px; text-align: center; position: relative; z-index: 1; }
  .footer-helpline { font-family: var(--pb-font-mono); font-weight: 700; font-size: calc(16px * var(--pb-template-text-scale, 1)); color: var(--pb-color-white); }
</style>
  <link rel="stylesheet" href="brand-inject.css">
  <style>
    /* Locale-specific font cascade override — must come AFTER brand-inject.css to win */
    :root {
      --pb-font-heading: 'Inter', 'Noto Sans JP', system-ui, -apple-system, sans-serif;
      --pb-font-body: 'Inter', 'Noto Sans JP', system-ui, sans-serif;
    }
  </style>
  </head>
<body>
<div class="story-card">
  <div class="story-header">
    <span class="story-logo"><span class="logo-play">Play</span><span class="logo-book">book</span></span>
    <span class="section-label">オープン</span>
  </div>
  <div class="story-body">
    <div class="eyebrow">スポーツの数学</div>
    <div class="headline">賭けの種類によって、取り分は違います。</div>
    <div class="bar-list">
      <div class="bar-row">
        <div class="bar-label">
          <span class="bar-name">マネーライン</span>
          <span class="bar-value teal">3%</span>
        </div>
        <div class="bar-track"><div class="bar-fill teal"></div></div>
      </div>
      <div class="bar-row">
        <div class="bar-label">
          <span class="bar-name">プロップ</span>
          <span class="bar-value white">5〜7%</span>
        </div>
        <div class="bar-track"><div class="bar-fill white"></div></div>
      </div>
      <div class="bar-row">
        <div class="bar-label">
          <span class="bar-name">同一試合パーレイ</span>
          <span class="bar-value orange">15〜25%</span>
        </div>
        <div class="bar-track"><div class="bar-fill orange"></div></div>
      </div>
    </div>
    <div class="body-text">シンプルな賭けは取り分が少なく、複雑な賭けは取り分が大きくなります。</div>
  </div>
  <div class="story-footer">
    <span class="footer-helpline">24時間無料・秘密厳守サポート：{{HELPLINE_NUMBER}}</span>
  </div>
</div>
</body>
</html>
