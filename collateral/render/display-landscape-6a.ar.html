<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800;900&family=Noto+Sans+Arabic:wght@300;400;600;700;800;900&family=Source+Code+Pro:wght@500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { margin: 0; padding: 0; background: transparent; }

    .display-screen {
      width: 1920px;
      height: 1080px;
      position: relative;
      background: linear-gradient(145deg, var(--pb-color-primary-dark), var(--pb-color-primary));
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .display-screen::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 8px;
      background: linear-gradient(90deg, var(--pb-color-accent), var(--pb-color-secondary));
    }

    .screen-header {
      padding: 48px 72px 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: relative;
      z-index: 1;
    }
    .screen-logo {
      font-family: var(--pb-font-heading);
      font-size: calc(44px * var(--pb-template-text-scale, 1));
      color: var(--pb-color-white);
    }
    .screen-logo .logo-play { font-weight: 800; letter-spacing: -0.02em; }
    .screen-logo .logo-book { font-weight: 300; text-transform: uppercase; letter-spacing: 0.08em; }
    .co-brand { display: flex; align-items: center; gap: 20px; }
    .co-brand-divider { width: 1px; height: 36px; background: var(--pb-color-neutral-300); }
    .operator-placeholder {
      width: 160px;
      height: 60px;
      border: 2px dashed rgba(255,255,255,0.25);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--pb-font-body);
      font-size: calc(16px * var(--pb-template-text-scale, 1));
      color: rgba(255,255,255,0.25);
    }

    .screen-body {
      flex: 1;
      display: flex;
      align-items: center;
      padding: 0 72px;
      position: relative;
      z-index: 1;
    }

    .content-left { flex: 1; }
    .pillar-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
      font-family: var(--pb-font-heading);
      font-size: calc(28px * var(--pb-template-text-scale, 1));
      font-weight: 700;
      color: var(--pb-color-primary);
      background: var(--pb-color-secondary);
      padding: 12px 28px;
      border-radius: 100px;
      margin-bottom: 32px;
    }
    .screen-headline {
      font-family: var(--pb-font-heading);
      font-size: calc(104px * var(--pb-template-text-scale, 1));
      font-weight: 800;
      line-height: 1.4;
      color: var(--pb-color-white);
      margin-bottom: 28px;
      max-width: 1100px;
    }

    .stats-row {
      display: flex;
      gap: 56px;
    }
    .stat-item { text-align: center; }
    .stat-game {
      font-family: var(--pb-font-body);
      font-size: calc(34px * var(--pb-template-text-scale, 1));
      font-weight: 600;
      color: var(--pb-color-neutral-300);
      margin-bottom: 12px;
      line-height: 1.5;
    }
    .stat-pct {
      font-family: 'Inter', 'Noto Sans Arabic', system-ui, sans-serif;
      font-size: calc(76px * var(--pb-template-text-scale, 1));
      font-weight: 900;
      line-height: 1.1;
    }
    .stat-pct.teal { color: var(--pb-color-secondary); }
    .stat-pct.white { color: var(--pb-color-white); }
    .stat-pct.orange { color: var(--pb-color-accent); }
    .stat-label {
      font-family: var(--pb-font-body);
      font-size: calc(26px * var(--pb-template-text-scale, 1));
      color: var(--pb-color-neutral-500);
      margin-top: 8px;
      line-height: 1.7;
    }

    .content-right {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-inline-start: 72px;
    }
    .qr-box {
      width: 220px;
      height: 220px;
      background: var(--pb-color-white);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--pb-font-mono);
      font-size: calc(24px * var(--pb-template-text-scale, 1));
      color: var(--pb-color-primary);
      margin-bottom: 18px;
    }
    .qr-label {
      font-family: var(--pb-font-heading);
      font-size: calc(30px * var(--pb-template-text-scale, 1));
      font-weight: 700;
      color: var(--pb-color-white);
      text-align: center;
      line-height: 1.5;
    }

    .helpline-strip {
      background: var(--pb-color-primary-light);
      padding: 28px 72px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      z-index: 1;
    }
    .helpline-text {
      font-family: var(--pb-font-mono);
      font-size: calc(32px * var(--pb-template-text-scale, 1));
      font-weight: 700;
      color: var(--pb-color-white);
    }

    .legal-strip {
      padding: 16px 72px;
      text-align: center;
      position: relative;
      z-index: 1;
    }
    .legal-text {
      font-family: var(--pb-font-body);
      font-size: calc(20px * var(--pb-template-text-scale, 1));
      color: var(--pb-color-neutral-500);
      line-height: 1.7;
    }
  </style>
  <link rel="stylesheet" href="brand-inject.css">
  <style>
    /* Locale-specific font cascade override — must come AFTER brand-inject.css to win */
    :root {
      --pb-font-heading: 'Inter', 'Noto Sans Arabic', system-ui, -apple-system, sans-serif;
      --pb-font-body: 'Inter', 'Noto Sans Arabic', system-ui, sans-serif;
    }
  </style>
  </head>
<body>
  <div class="display-screen">
    <div class="screen-header">
      <span class="screen-logo"><span class="logo-play">Play</span><span class="logo-book">book</span></span>
      <div class="co-brand">
        <div class="co-brand-divider"></div>
        <div class="operator-placeholder">شعارك هنا</div>
      </div>
    </div>
    <div class="screen-body">
      <div class="content-left">
        <div class="pillar-badge">شفافية</div>
        <div class="screen-headline">لكل لعبة حساباتها.<br>وفيما يلي التفاصيل.</div>
        <div class="stats-row">
          <div class="stat-item">
            <div class="stat-game">بلاك جاك</div>
            <div class="stat-pct teal">0.5%</div>
            <div class="stat-label">نسبة الكازينو</div>
          </div>
          <div class="stat-item">
            <div class="stat-game">الروليت</div>
            <div class="stat-pct white">5.26%</div>
            <div class="stat-label">نسبة الكازينو</div>
          </div>
          <div class="stat-item">
            <div class="stat-game">آلات القمار</div>
            <div class="stat-pct orange">2-15%</div>
            <div class="stat-label">نسبة الكازينو</div>
          </div>
        </div>
      </div>
      <div class="content-right">
        <div class="qr-box">QR</div>
        <span class="qr-label">امسح<br>لمعرفة المزيد</span>
      </div>
    </div>
    <div class="helpline-strip">
      <span class="helpline-text">دعم مجاني وسري على مدار الساعة: {{HELPLINE_NUMBER}}</span>
    </div>
    <div class="legal-strip">
      <span class="legal-text">{{AGE_DISCLAIMER}} {{GENERAL_DISCLAIMER}}</span>
    </div>
  </div>
</body>
</html>
