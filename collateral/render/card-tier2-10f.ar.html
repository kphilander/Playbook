<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>بطاقة اجتماعية — الفئة الثانية</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800;900&family=Noto+Sans+Arabic:wght@300;400;600;700;800;900&family=Source+Code+Pro:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { margin: 0; padding: 0; background: transparent; }

  .social-card {
    width: 1080px;
    height: 1080px;
    background: var(--pb-color-white);
    font-family: var(--pb-font-body);
    color: var(--pb-color-primary);
    position: relative;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .accent-bar {
    height: 3px;
    background: var(--pb-color-secondary);
    flex-shrink: 0;
  }

  .card-header {
    padding: 56px 80px 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .logo {
    font-family: var(--pb-font-heading);
    font-size: calc(36px * var(--pb-template-text-scale, 1));
  }
  .logo-play { font-weight: 800; letter-spacing: -0.02em; color: var(--pb-color-primary); }
  .logo-book { font-weight: 300; text-transform: uppercase; letter-spacing: 0.08em; color: var(--pb-color-secondary); }

  .card-body {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 0 80px;
    max-width: 920px;
  }

  .headline {
    font-family: var(--pb-font-heading);
    font-weight: 700;
    font-size: calc(80px * var(--pb-template-text-scale, 1));
    color: var(--pb-color-primary);
    line-height: 1.5;
    margin-bottom: 24px;
  }
  .subline {
    font-size: calc(30px * var(--pb-template-text-scale, 1));
    color: var(--pb-color-neutral-700);
    line-height: 1.8;
    margin-bottom: 56px;
    max-width: 780px;
  }

  .helpline-number {
    font-family: var(--pb-font-mono);
    font-weight: 700;
    font-size: calc(66px * var(--pb-template-text-scale, 1));
    color: var(--pb-color-secondary);
    margin-bottom: 14px;
    line-height: 1.2;
  }
  .helpline-channels {
    font-family: var(--pb-font-heading);
    font-weight: 600;
    font-size: calc(28px * var(--pb-template-text-scale, 1));
    color: var(--pb-color-neutral-500);
    margin-bottom: 56px;
    line-height: 1.5;
  }

  .qr-row {
    display: flex;
    align-items: center;
    gap: 20px;
  }
  .qr-box {
    width: 100px;
    height: 100px;
    background: var(--pb-color-neutral-50);
    border: 1px solid var(--pb-color-neutral-100);
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--pb-font-mono);
    font-size: calc(14px * var(--pb-template-text-scale, 1));
    font-weight: 600;
    color: var(--pb-color-neutral-300);
  }
  .qr-label {
    font-size: calc(18px * var(--pb-template-text-scale, 1));
    color: var(--pb-color-neutral-500);
    line-height: 1.7;
  }

  .card-footer {
    padding: 0 80px 56px;
  }
  .footer-text {
    font-family: var(--pb-font-heading);
    font-weight: 700;
    font-size: calc(24px * var(--pb-template-text-scale, 1));
    color: var(--pb-color-neutral-300);
    line-height: 1.5;
  }
</style>
  <link rel="stylesheet" href="brand-inject.css">
  <style>
    /* Locale-specific font cascade override — must come AFTER brand-inject.css to win */
    :root {
      --pb-font-heading: 'Inter', 'Noto Sans Arabic', system-ui, -apple-system, sans-serif;
      --pb-font-body: 'Inter', 'Noto Sans Arabic', system-ui, sans-serif;
    }
  </style>
  </head>
<body>
<div class="social-card">

  <div class="accent-bar"></div>

  <div class="card-header">
    <span class="logo"><span class="logo-play">Play</span><span class="logo-book">book</span></span>
  </div>

  <div class="card-body">
    <div class="headline">لا يوجد سؤال<br>صغير.</div>
    <div class="subline">دعم مجاني وسري لأي سؤال يتعلق بالمقامرة.</div>

    <div class="helpline-number">{{HELPLINE_NUMBER}}</div>
    <div class="helpline-channels">اتصال &middot; رسالة &middot; دردشة</div>

    <div class="qr-row">
      <div class="qr-box">QR</div>
      <div class="qr-label">امسح للحصول على الدعم</div>
    </div>
  </div>

  <div class="card-footer">
    <div class="footer-text">على مدار الساعة &middot; بدون أحكام &middot; أبدًا</div>
  </div>

</div>
</body>
</html>
