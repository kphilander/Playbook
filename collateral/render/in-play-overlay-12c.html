<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=420">
<title>In-Play Overlay — Session Check-in — Tier 1</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800;900&family=Source+Sans+3:wght@300;400;600&family=Source+Code+Pro:wght@500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { margin: 0; padding: 0; background: transparent; }

  .in-play-overlay {
    width: 420px;
    height: 280px;
    background: var(--pb-color-primary);
    font-family: var(--pb-font-body);
    color: var(--pb-color-white);
    display: flex;
    flex-direction: column;
    position: relative;
  }

  /* Grid overlay */
  .in-play-overlay::after {
    content: "";
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(var(--pb-grid-color, 255,255,255), var(--pb-grid-opacity, 0.02)) 1px, transparent 1px),
      linear-gradient(90deg, rgba(var(--pb-grid-color, 255,255,255), var(--pb-grid-opacity, 0.02)) 1px, transparent 1px);
    background-size: 24px 24px;
    pointer-events: none;
  }

  /* Accent bar */
  .accent-bar {
    height: 6px;
    background: linear-gradient(90deg, var(--pb-color-accent), var(--pb-color-secondary));
    flex-shrink: 0;
  }

  /* Content */
  .content {
    padding: 20px 28px;
    flex: 1;
    display: flex;
    flex-direction: column;
  }

  .top-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }
  .card-logo {
    font-family: var(--pb-font-heading);
    font-size: calc(16px * var(--pb-template-text-scale, 1));
  }
  .card-logo .logo-play {
    color: var(--pb-color-white);
    font-weight: 800;
    letter-spacing: -0.02em;
  }
  .card-logo .logo-book {
    color: var(--pb-color-secondary);
    font-weight: 300;
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  .heading {
    font-family: var(--pb-font-heading);
    font-weight: 800;
    font-size: calc(20px * var(--pb-template-text-scale, 1));
    color: var(--pb-color-white);
    line-height: 1.2;
  }

  /* Session stats */
  .session-stats {
    font-family: var(--pb-font-mono);
    font-size: calc(16px * var(--pb-template-text-scale, 1));
    font-weight: 500;
    color: var(--pb-color-neutral-300);
    margin-bottom: 20px;
    line-height: 1.4;
  }

  /* Buttons */
  .button-row {
    display: flex;
    gap: 12px;
    margin-bottom: auto;
  }
  .btn {
    flex: 1;
    padding: 14px 16px;
    font-family: var(--pb-font-heading);
    font-weight: 700;
    font-size: calc(16px * var(--pb-template-text-scale, 1));
    text-align: center;
    border-radius: 10px;
    cursor: pointer;
    border: none;
    letter-spacing: 0.01em;
  }
  .btn-outline {
    background: transparent;
    border: 1.5px solid var(--pb-color-white);
    color: var(--pb-color-white);
  }
  .btn-primary {
    background: var(--pb-color-secondary);
    color: var(--pb-color-primary);
  }

  /* Footer */
  .footer {
    padding: 0 28px 16px;
    text-align: center;
  }
  .footer-helpline {
    font-family: var(--pb-font-mono);
    font-weight: 600;
    font-size: calc(18px * var(--pb-template-text-scale, 1));
    color: var(--pb-color-neutral-300);
  }
</style>
  <link rel="stylesheet" href="brand-inject.css">
  </head>
<body>
<div class="in-play-overlay">

  <div class="accent-bar"></div>

  <div class="content">
    <div class="top-row">
      <span class="card-logo"><span class="logo-play">Play</span><span class="logo-book">book</span></span>
      <h1 class="heading">Session check-in</h1>
    </div>

    <div class="session-stats">1h 23m played &middot; $45 wagered</div>

    <div class="button-row">
      <button class="btn btn-outline">Keep playing</button>
      <button class="btn btn-primary">Take a break</button>
    </div>
  </div>

  <div class="footer">
    <span class="footer-helpline">{{HELPLINE_NUMBER}} &middot; 24/7</span>
  </div>

</div>
</body>
</html>
