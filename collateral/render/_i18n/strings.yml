      ja: "メッセージ"
      zh-CN: "短讯"
      ar: "رسالة نصية"
      note: "zh-CN: 短讯 is the Macau/HK register; mainland would use 短信."
    channel_chat:
      en: "Chat"
      ja: "チャット"
      zh-CN: "在线支援"
      ar: "الدردشة"
      note: "zh-CN: 在线支援 (online support) reads more institutional than 聊天 (chat)."
    channel_web:
      en: "Web"
      ja: "ウェブ"
      zh-CN: "网站"
      ar: "الويب"
    channel_call_dot_text_dot_chat:
      en: "Call · Text · Chat"
      ja: "電話・メッセージ・チャット"
      zh-CN: "电话・短讯・在线支援"
      ar: "اتصال · رسالة · دردشة"

    # Short CTAs.
    cta_learn_more:
      en: "Learn more"
      ja: "詳しくはこちら"
      zh-CN: "了解更多"
      ar: "اعرف المزيد"
    cta_get_started:
      en: "Get started"
      ja: "はじめる"
      zh-CN: "立即开始"
      ar: "ابدأ الآن"
    cta_continue:
      en: "Continue"
      ja: "続ける"
      zh-CN: "继续"
      ar: "متابعة"
    cta_done:
      en: "Done"
      ja: "完了"
      zh-CN: "完成"
      ar: "تم"
    cta_go_back:
      en: "Go back"
      ja: "戻る"
      zh-CN: "返回"
      ar: "رجوع"
    cta_see_full_breakdown:
      en: "See the full breakdown"
      ja: "詳細を確認する"
      zh-CN: "查看完整数据"
      ar: "عرض التفاصيل الكاملة"
    cta_scan_for_support:
      en: "Scan for support"
      ja: "スキャンしてサポートへ"
      zh-CN: "扫码获取支援"
      ar: "امسح للحصول على الدعم"
    cta_scan_for_facts:
      en: "Scan for the facts"
      ja: "スキャンして事実を確認"
      zh-CN: "扫码查看事实"
      ar: "امسح لعرض الحقائق"
    cta_scan_to_learn_more:
      en: "Scan to learn more"
      ja: "スキャンして詳細を見る"
      zh-CN: "扫码了解更多"
      ar: "امسح لمعرفة المزيد"
    cta_manage_preferences:
      en: "Manage your preferences"
      ja: "配信設定を管理する"
      zh-CN: "管理邮件偏好"
      ar: "إدارة التفضيلات"
    cta_unsubscribe:
      en: "Unsubscribe"
      ja: "配信停止"
      zh-CN: "取消订阅"
      ar: "إلغاء الاشتراك"

    # Legal / disclaimer lines. {{AGE_DISCLAIMER}} and {{GENERAL_DISCLAIMER}}
    # are build-time tokens resolved from jurisdiction config, so they are
    # NOT translated here. They appear untouched in templates.
    legal_age_plus_general:
      en: "{{AGE_DISCLAIMER}} {{GENERAL_DISCLAIMER}}"
      ja: "{{AGE_DISCLAIMER}} {{GENERAL_DISCLAIMER}}"
      zh-CN: "{{AGE_DISCLAIMER}} {{GENERAL_DISCLAIMER}}"
      ar: "{{AGE_DISCLAIMER}} {{GENERAL_DISCLAIMER}}"
      note: "Passthrough — these tokens resolve per jurisdiction at build time."

    # Operator co-brand placeholder ("Your logo" / "Your logo here") — this is
    # a pre-build placeholder that operators replace with their logo, so it
    # should read naturally to the authoring audience. Still, the test renders
    # show the string, so we translate it for preview parity.
    operator_logo_placeholder:
      en: "Your logo"
      ja: "貴社ロゴ"
      zh-CN: "贵司标志"
      ar: "شعارك"
    operator_logo_here:
      en: "Your logo here"
      ja: "貴社ロゴをここに"
      zh-CN: "贵司标志"
      ar: "شعارك هنا"

    # QR block labels.
    qr_code_label:
      en: "QR Code"
      ja: "QRコード"
      zh-CN: "二维码"
      ar: "رمز الاستجابة السريعة"
    qr_plain:
      en: "QR"
      ja: "QR"
      zh-CN: "QR"
      ar: "QR"
      note: "Plain 'QR' placeholder in mockups — leave as Latin."

    # Internal-use / operator-facing labels that appear in the rendered
    # mockups (sign-staff-9e, etc.) but are ultimately seen only by staff.
    internal_use_only:
      en: "Internal use only"
      ja: "社内限定"
      zh-CN: "内部使用"
      ar: "للاستخدام الداخلي فقط"

  # ──────────────────────────────────────────────────────────────────────
  # PHASE A — cognitive-distortion "Myth vs. Math" cards (13a..13f)
  # These are the highest-stakes strings for cultural adaptation because
  # they use first-person myth quotes and blunt corrective facts. Literal
  # translation would read as accusatory in ja/zh-CN/ar. We use the
  # culturally-correct elder/authority register for each target.
  # ──────────────────────────────────────────────────────────────────────

  card-13a-its-due:
    eyebrow: { $ref: "common.section_myth_vs_math" }
    pillar: { $ref: "common.pillar_open" }
    myth_intro:
      en: ""
      ja: ""
      zh-CN: "有些玩家认为："
      ar: "يعتقد بعض اللاعبين:"
      note: "Macau and UAE introduce the myth as a third-person belief held by 'some players' rather than addressing the reader directly. This is the institutional/communal substitute for the strikethrough device used in English/Japanese. Empty for en/ja since those locales keep the strikethrough."
    myth:
      en: '"It''s due to hit"'
      ja: "「そろそろ当たるはずだ」"
      zh-CN: "「快该中了」"
      ar: "«حان وقت الفوز»"
      note: "ja: 「そろそろ当たるはずだ」 — bare はず is fragmentary as a quoted thought; はずだ is the natural sentence-final form. zh-CN: 快该中了 captures the casual player's internal monologue in Macau Cantonese-influenced Mandarin. ar: «حان وقت الفوز» = 'the time for winning has come' — preserves the expectation, formal MSA."
    fact_softener:
      en: ""
      ja: ""
      zh-CN: "事实上，"
      ar: "في الواقع، "
      note: "Macau and UAE prefix the fact statement with a diplomatic softener (事实上 / في الواقع — 'in fact, / in reality,') to avoid direct negation of the myth. Standard institutional Chinese and Arabic public-health convention. Note Chinese full-width comma U+FF0C and Arabic comma U+060C."
    fact:
      en: "The slot doesn't owe you a win. <strong>Losses don't load the next spin.</strong>"
      ja: "スロットマシンは、勝ちを保証するものではありません。<strong>過去の負けが次の結果に影響することはありません。</strong>"
      zh-CN: "老虎机并不欠玩家任何奖金。<strong>过往的损失不会影响下一次旋转。</strong>"
      ar: "آلة القمار لا تدين لأحد بالفوز. <strong>الخسائر السابقة لا تؤثر على الدورة التالية.</strong>"
      note: "ja: 保証する (to guarantee) is the institutional/financial verb, more elder-register than 約束する (to promise). zh-CN: uses 玩家 instead of 你, keeping the communal/institutional register. ar: 'لا تدين لأحد' (doesn't owe anyone) instead of 'لك' (you) — communal voice for UAE institutional register; the literal you-address would read as Western RG translation."
    stat_number:
      en: "$0"
      ja: "¥0"
      zh-CN: "澳门币 0"
      ar: "0 د.إ"
      note: "Currency symbols localized to native conventions per jurisdiction: Japan → ¥ (universal); Macau → 澳门币 (Chinese-language Macau pataca, MOP$ for international/banking); UAE → د.إ (Arabic dirham abbreviation, AED for ISO/banking). Numerals stay Western Arabic (0-9)."
    stat_unit:
      en: "owed to you<br>for past losses"
      ja: "過去の負けに対する<br>払い戻し"
      zh-CN: "因过往损失<br>应得的金额"
      ar: "مستحق<br>مقابل الخسائر السابقة"
      note: "ja: 払い戻し (refund) is the natural Japanese financial-institution noun for what's owed back; reads as a single noun phrase paired with the ¥0 numeral. ar: drops 'لك' (to you) for communal voice consistency with the fact statement."

  card-13b-near-win:
    eyebrow: { $ref: "common.section_myth_vs_math" }
    pillar: { $ref: "common.pillar_open" }
    myth:
      en: '"It was so close!"'
      ja: "「惜しかった！」"
      zh-CN: "「就差一点！」"
      ar: "«كان قريبًا جدًا!»"
    fact:
      en: "A near-win isn't progress. It's just <strong>a loss that looks close.</strong>"
      ja: "惜しい負けは、勝ちに近づいている証ではありません。それは<strong>近く見えるだけの負け</strong>です。"
      zh-CN: "差一点的失败并非接近胜利,<strong>其实只是一次看起来接近的损失。</strong>"
      ar: "الخسارة القريبة ليست تقدمًا. إنها فقط <strong>خسارة تبدو قريبة.</strong>"
      note: "zh-CN: 其实 (actually/in fact) replaces direct negation, fitting the diplomatic profile."
    stat_number:
      en: "$0"
      ja: "¥0"
      zh-CN: "MOP$0"
      ar: "0 د.إ"
      note: "ar: localized to UAE dirham form د.إ (with Arabic dots and kasra) instead of Latin 'AED'. The native Arabic abbreviation matches how currency is rendered in UAE-facing institutional materials."
    stat_unit:
      en: "earned<br>by \"almost\""
      ja: "「惜しい」で<br>得られるもの"
      zh-CN: "因「差一点」<br>获得的金额"
      ar: "المكتسب<br>من «تقريبًا»"
      note: "ar: smoothed from the earlier ما يُكسب (what is earned) to المكتسب (the gained) — a more natural MSA nominal form that flows better in the tight stat-unit layout."

  card-13c-picked-right:
    eyebrow: { $ref: "common.section_myth_vs_math" }
    pillar: { $ref: "common.pillar_open" }
    myth:
      en: '"I picked the right machine"'
      ja: "「いい台を選んだ」"
      zh-CN: "「我选对了机器」"
      ar: "«اخترت الآلة المناسبة»"
    fact:
      en: "All slots are random. <strong>Your pick doesn't change the odds.</strong>"
      ja: "すべてのスロットは無作為に決まります。<strong>台を選んでも確率は変わりません。</strong>"
      zh-CN: "所有老虎机均为随机。<strong>事实上,选择机器不会改变赔率。</strong>"
      ar: "جميع آلات القمار عشوائية. <strong>الاختيار لا يغير الاحتمالات.</strong>"
      note: "zh-CN: 事实上 (in fact) softens the correction per the diplomatic Macau profile. ar: dropped the second-person possessive ك from اختيارك (your pick) → الاختيار (the pick/choosing) — aligns with the UAE communal-voice rule that forbids second-person pronouns in institutional RG copy."
    stat_number:
      en: "0%"
