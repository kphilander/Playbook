      ja: "ブックメーカーが<br>本当に勝つ仕組み。"
      zh-CN: "体育博彩公司<br>实际上是如何获利的。"
      ar: "كيف تفوز شركة<br>الرهان فعليًا."
    row_side_a:
      en: "Bet on Side A:"
      ja: "Aへの賭け："
      zh-CN: "投注 A 方:"
      ar: "الرهان على الجانب أ:"
    row_side_b:
