      ar: "نسبة الكازينو على<br>كل رهان قياسي"

  htp-card-slots:
    game:
      en: "Slots"
      ja: "スロット"
      zh-CN: "老虎机"
      ar: "آلات القمار"
    body:
      en: "Every spin is decided by a <strong>random number generator</strong> before the reels even move. No memory. No patterns. No hot streaks."
      ja: "どのスピンも、リールが回る前に<strong>乱数発生装置</strong>によって決まります。記憶も、規則性も、連勝もありません。"
      zh-CN: "每一次旋转均由<strong>随机数生成器</strong>于卷轴启动前决定。并无记忆、并无规律、亦无连胜可言。"
      ar: "كل دورة يقرّرها <strong>مولّد الأرقام العشوائية</strong> قبل تحرّك البكرات. لا ذاكرة. لا أنماط. لا سلاسل حظ."
    stat_number:
      en: "2–15%"
    stat_unit:
      en: "house edge range<br>check the paytable"
      ja: "ハウスエッジの幅<br>ペイテーブルをご確認ください"
      zh-CN: "庄家优势区间<br>详见赔付表"
      ar: "نطاق نسبة الكازينو<br>مراجعة جدول الأرباح"

  htp-card-sports:
    game:
      en: "Sports Betting"
      ja: "スポーツベッティング"
      zh-CN: "体育博彩"
      ar: "الرهان الرياضي"
    body:
      en: "At standard odds, you need to win <strong>more than half</strong> your bets just to break even. The vig is the sportsbook's built-in commission."
      ja: "標準的なオッズでは、収支を合わせるためだけでも<strong>半分を超える</strong>勝率が必要です。ビグはブックメーカーに組み込まれた手数料です。"
      zh-CN: "在标准赔率下，玩家须于<strong>逾半数</strong>的投注中获胜方可勉强持平。所谓抽水即博彩公司内建的佣金。"
      ar: "بالأسعار القياسية، يلزم الفوز بـ<strong>أكثر من نصف</strong> الرهانات لمجرد التعادل. الـvig هي العمولة المُدمجة لشركة الرهان."
    stat_number:
      en: "52.4%"
    stat_unit:
      en: "break-even win rate<br>at −110 odds"
      ja: "−110オッズでの<br>損益分岐の勝率"
      zh-CN: "−110 赔率下的<br>持平胜率"
      ar: "نسبة الفوز اللازمة للتعادل<br>عند أسعار ‎-110"

  htp-card-video-poker:
    game:
      en: "Video Poker"
      ja: "ビデオポーカー"
      zh-CN: "视频扑克"
      ar: "بوكر الفيديو"
    body:
      en: "Your hold/discard decisions change the math. Check two numbers on the paytable: <strong>full house and flush payouts</strong>. 9/6 is the one you want."
      ja: "手札を残すか捨てるかの判断で数学が変わります。ペイテーブルで確認したいのは2つの数字：<strong>フルハウスとフラッシュの配当</strong>です。9/6が最良です。"
      zh-CN: "保留或弃牌的决策会改变数字。请留意赔付表中的两项数字：<strong>葫芦及同花的赔付</strong>。9/6 为最佳选择。"
      ar: "قرارات الإبقاء أو الاستبدال تغيّر الأرقام. يُنصح بمراجعة رقمين في جدول الأرباح: <strong>عوائد الفول هاوس والفلاش</strong>. 9/6 هي النسبة المطلوبة."
    stat_number:
      en: "0.46%"
    stat_unit:
      en: "house edge on full-pay<br>9/6 Jacks or Better"
      ja: "フルペイ9/6ジャックス・オア・ベター<br>のハウスエッジ"
      zh-CN: "全额赔付 9/6<br>Jacks or Better 的庄家优势"
      ar: "نسبة الكازينو على<br>9/6 Jacks or Better بالعوائد الكاملة"

