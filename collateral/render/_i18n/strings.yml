      zh-CN: "并非所有投注都等价。"
      ar: "ليست كل الرهانات متساوية التكلفة."
    bar_moneyline:
      en: "Moneyline"
      ja: "マネーライン"
      zh-CN: "独赢盘"
      ar: "موني لاين"
      note: "ar: CRITICAL typo fix. The earlier transliteration منى لاين reads as 'Mina line' (Mina is a place name / girl's name, not 'money'). موني لاين is the correct phonetic transliteration of 'moneyline'."
    bar_moneyline_value:
