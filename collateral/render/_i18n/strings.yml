  # ──────────────────────────────────────────────────────────────────────
  # PHASE A — Sports-math quartet (15a..15d)
  # ──────────────────────────────────────────────────────────────────────

  card-15a-point-spread:
    eyebrow: { $ref: "common.section_sports_math" }
    pillar: { $ref: "common.pillar_open" }
    headline:
      en: "The point spread, explained."
      ja: "ポイントスプレッドとは。"
      zh-CN: "让分盘,详细解释。"
      ar: "فارق النقاط، موضّحًا."
    body_text:
      en: "The spread isn't a guess at who will win. It's how the sportsbook gets bets on both teams."
      ja: "スプレッドは勝者を予想するものではなく、両チームに賭けを集めるための仕組みです。"
      zh-CN: "让分并非预测胜负,而是博彩公司吸引双方投注的方式。"
      ar: "فارق النقاط ليس تخمينًا للفائز. إنه الطريقة التي تستخدمها شركة الرهان لجذب الرهانات على الفريقين."
    hero_big:
      en: "$1.10"
      ja: "11,000円"
      zh-CN: "澳门币 11"
      ar: "11 د.إ"
      note: "Currency localizes per jurisdiction. The ratio 1.10:1 is what matters — it is the canonical -110 sportsbook juice (bet 11 to win 10, total 22, winner gets back 21, sportsbook keeps 1; hold = 1/22 ≈ 4.55%). ja: scaled ×10000 from the $1.10 base — 1円 is functionally worthless in Japan (~$0.007 USD) and no Japanese bettor would reference a 1-yen wager; 10,000–22,000円 (~$70–150 USD) matches realistic typical wager sizes for Japanese sports betting (toto, Pari-mutuel). zh-CN: Macau uses whole-pataca units (澳门币 11 / 澳门币 10) instead of fractional MOP$1.10 — a 10-MOP minimum-unit bet is the realistic local framing and it preserves the canonical 11:10 (-110) ratio without introducing fractional patacas. ar: whole-dirham units 11 د.إ / 10 د.إ instead of fractional 1.10 AED — realistic UAE framing using the native د.إ abbreviation, and preserves the canonical 11:10 (-110) ratio without fractional dirhams. Arithmetic and 1.10:1 ratio preserved across all locales."
    hero_label:
      en: "to win $1, either side"
      ja: "どちらに賭けても10,000円を得るために"
      zh-CN: "投注任一方赢取 澳门币 10 所需"
      ar: "للربح بقيمة 10 د.إ من أي جهة"
      note: "ja: ending 〜ために is a complete purpose-clause (the prior 〜のに left a dangling grammar fragment unsuitable as a standalone label). zh-CN: paired with hero_big 澳门币 11 — bet 11 to win 10. ar: paired with hero_big 11 د.إ — bet 11 dirhams to win 10 dirhams, preserving the canonical 11:10 ratio with native currency formatting."

