  sign-staff-9e:
    internal_label: { $ref: "common.internal_use_only" }
    headline:
      en: "5 things every team<br>member should know"
      ja: "スタッフ全員に<br>知っていただきたい5つのこと"
      zh-CN: "员工须知五项要点"
      ar: "خمس نقاط ينبغي أن<br>يعرفها كل موظف"
    item1_title:
      en: "Players have tools."
      ja: "お客様にはツールがあります。"
      zh-CN: "玩家具备相关工具。"
      ar: "لدى اللاعبين أدوات متاحة."
    item1_body:
      en: "Limits, reminders, and dashboards live in account settings."
      ja: "上限設定、お知らせ、ダッシュボードはアカウント設定の中にあります。"
      zh-CN: "限额、提醒及仪表板均位于账户设置中。"
      ar: "الحدود والتذكيرات ولوحات النشاط متوفرة في إعدادات الحساب."
    item2_title:
      en: "Use Playbook language."
      ja: "Playbookの言葉を使いましょう。"
      zh-CN: "使用 Playbook 规范用语。"
      ar: "اعتماد لغة Playbook."
    item2_body:
      en: "Say <strong>\"tools\"</strong> not \"interventions.\" <strong>\"Player\"</strong> not \"gambler.\" <strong>\"Check in\"</strong> not \"self-assess.\""
      ja: "「介入」ではなく<strong>「ツール」</strong>。「ギャンブラー」ではなく<strong>「お客様」</strong>。「自己診断」ではなく<strong>「確認」</strong>と表現します。"
      zh-CN: "应使用<strong>「工具」</strong>而非「介入」；使用<strong>「玩家」</strong>而非「赌徒」；使用<strong>「咨询」</strong>而非「自我评估」。"
      ar: "الأفضل استخدام <strong>«الأدوات»</strong> بدلًا من «التدخلات»، و<strong>«اللاعب»</strong> بدلًا من «المقامر»، و<strong>«المتابعة»</strong> بدلًا من «التقييم الذاتي»."
      note: "review: Playbook's English anti-vocabulary list does NOT translate literally. zh-CN: anti-vocabulary mapped to Simplified Chinese equivalents — 工具/介入, 玩家/赌徒, 咨询/自我评估. ja: anti-vocabulary list adapted to Japanese — '介入'/'ツール', 'ギャンブラー'/'お客様' (customer, not 'player'), '自己診断'/'確認' per the cultural-audit work. The Japanese hospitality register prefers お客様 over プレイヤー."
    item3_title:
      en: "Know the helpline."
      ja: "ヘルプラインを覚えておきましょう。"
      zh-CN: "熟记支援热线。"
      ar: "معرفة خط الدعم."
    item3_body:
      en: "{{HELPLINE_NUMBER}} — free, confidential, 24/7."
      ja: "{{HELPLINE_NUMBER}} ― 無料、秘密厳守、24時間対応。"
      zh-CN: "{{HELPLINE_NUMBER}} — 免费、保密、24 小时服务。"
      ar: "{{HELPLINE_NUMBER}} — دعم مجاني وسري على مدار الساعة."
    item4_title:
      en: "Offer support discreetly."
      ja: "さりげなくサポートをご案内します。"
      zh-CN: "以审慎方式提供支援。"
      ar: "تقديم الدعم بتحفّظ."
    item4_body:
      en: "Don't diagnose. Just say: \"Here's our support card.\""
      ja: "診断はしません。「こちらはサポートのご案内です」とだけお伝えします。"
      zh-CN: "切勿作出任何判断。仅需表示：「请参阅我方提供的支援资讯卡。」"
      ar: "لا حاجة إلى أي تشخيص. يكفي قول: «إليك بطاقة الدعم»."
    item5_title:
      en: "Player education is in the content hub."
      ja: "お客様向けの教材はコンテンツハブにあります。"
      zh-CN: "玩家教育资料位于内容中心。"
      ar: "محتوى توعية اللاعبين متوفر في مركز المحتوى."
    item5_body:
      en: "Send curious players to the Playbook section."
      ja: "ご関心のあるお客様にはPlaybookのコーナーをご案内ください。"
      zh-CN: "对此感兴趣的玩家，可引导前往 Playbook 专区。"
      ar: "يمكن إرشاد اللاعبين المهتمين إلى قسم Playbook."

