      ja: "ブックメーカーの取り分："
      zh-CN: "博彩公司保留:"
      ar: "تحتفظ شركة الرهان بـ:"
    val_110:
      en: "$1.10"
      ja: "11,000円"
      zh-CN: "澳门币 11"
      ar: "11 د.إ"
      note: "Canonical -110 sportsbook juice: bet 11 to win 10, total 22 collected, winner gets 21 back, sportsbook keeps 1 (hold = 1/22 ≈ 4.55%). ja: scaled ×10000 from USD base — 1円 is functionally worthless in Japan (~$0.007 USD); 11,000–22,000円 (~$70–150 USD) matches realistic typical wager sizes for Japanese sports betting (toto, Pari-mutuel). zh-CN: Macau uses whole-pataca units (澳门币 11 / 22 / 21 / 1) instead of fractional MOP$1.10 — a 10-MOP minimum-unit bet is the realistic local framing and preserves the canonical 11:10 (-110) ratio without fractional patacas. ar: whole-dirham units (11 / 22 / 21 / 1 د.إ) using the native د.إ abbreviation instead of fractional Latin 'AED' — realistic UAE framing, preserves the canonical 11:10 (-110) ratio without fractional dirhams. All five values across locales scale together so 11+11=22, 22−21=1 arithmetic and the proportional vig (≈4.55%) are preserved."
    val_220:
      en: "$2.20"
      ja: "22,000円"
      zh-CN: "澳门币 22"
      ar: "22 د.إ"
    val_210:
      en: "$2.10"
      ja: "21,000円"
      zh-CN: "澳门币 21"
      ar: "21 د.إ"
    val_010:
      en: "$0.10"
      ja: "1,000円"
      zh-CN: "澳门币 1"
      ar: "1 د.إ"
    insight:
      en: "They don't need to pick winners. They just need bets on both sides.</br>"
      ja: "勝者を当てる必要はありません。両方に賭けが入ればよいのです。"
      zh-CN: "无需预测赢家,只需双方均有投注即可。"
      ar: "لا حاجة لاختيار الفائز. يكفي وجود رهانات على الجانبين."
    cta:
      en: "See the math at {{PROGRAM_URL}}"
