# Translation strings for Playbook collateral.
#
# Each key is a unique string ID used across one or more templates.
# en is the source. ja, zh-CN, ar are target languages.
#
# Cultural profile drives translation quality (not just language):
#   ja        (Japan):  elder, communal, understated, contextual, reserved
#   zh-CN     (Macau):  authority, communal, minimal, diplomatic, private
#   ar        (UAE):    authority, communal, understated, contextual, private
#
# Rules applied in this file:
#   1. English source is copied verbatim from the templates — never edited.
#   2. Cultural adaptation, not literal translation. Where a literal rendering
#      would be culturally wrong (e.g., irreverent jokes in zh-CN/ar, direct
#      second-person "you" in ja-formal), a `note:` field explains what changed.
#   3. {{TOKENS}} are build-time placeholders and are NOT translated.
#   4. Identical strings (helpline label, age disclaimer, "Learn more", footer
#      legal, etc.) are deduplicated into the top-level `common:` section.
#   5. Template-specific strings are grouped by template ID (filename minus
#      the .html extension) to make review easy.
#   6. Phase A items are fully translated across all three languages.
#      Phase B items list the English source with `TODO: translate` markers
#      for ja/zh-CN/ar — to be filled in batched future work.
#
# Phase A (fully translated below):
#   - common (helpline/disclaimer/CTAs/footer legal, etc.)
#   - card-13a..13f  (cognitive distortion "Myth vs. Math" cards — most
#     culturally reactive, need careful work)
#   - card-14a / story-14b / poster-14c / email-14d / display-14e /
#     mobile-14f  (every-game cross-format showcase — shared headline,
#     different layouts)
#   - card-15a / story-15b / poster-15c / live-odds-overlay-15d
#     (sports-math quartet)
#
# Phase B (skeleton — English only, translations TODO):
#   - all other templates listed at the bottom of this file
#
# review: comments flag any translation the extractor was uncertain about.

strings:

  # ──────────────────────────────────────────────────────────────────────
  # COMMON — strings shared across many templates
  # ──────────────────────────────────────────────────────────────────────
  common:

    # The Playbook logo is two parts — "Play" set bold, "book" set light/uppercase.
    # It is a brand wordmark. Translations render it exactly the same visually;
    # the brand name "Playbook" never translates, it stays Latin.
    brand_logo_play:
      en: "Play"
      ja: "Play"
      zh-CN: "Play"
      ar: "Play"
      note: "Brand wordmark — never translates. Keep Latin characters."
    brand_logo_book:
      en: "book"
      ja: "book"
      zh-CN: "book"
      ar: "book"
      note: "Brand wordmark — never translates. Keep Latin characters."

    # Voice pillars printed in pill badges on many cards/posters.
    pillar_open:
      en: "Open"
      ja: "オープン"
      zh-CN: "公开"
      ar: "شفافية"
      note: "ja: Katakana loanword is idiomatic for this kind of brand pillar label. zh-CN (Macau): 公开 = open/public/transparent, an authoritative civic register. ar: شفافية = transparency, the institutional register the UAE uses in RG communications."
    pillar_social:
      en: "Social"
      ja: "ソーシャル"
      zh-CN: "社群"
      ar: "اجتماعي"
      note: "zh-CN: 社群 (community) fits the communal profile better than 社交 (socializing)."

    # Section labels — these appear in the same pill-badge slot as voice pillars
    # but carry editorial/section meaning instead.
    section_real_odds:
      en: "Real Odds"
      ja: "本当の確率"
      zh-CN: "真实赔率"
      ar: "الاحتمالات الحقيقية"
    section_sports_math:
      en: "Sports math"
      ja: "スポーツの数学"
      zh-CN: "体育博彩的数学"
      ar: "حسابات الرهان الرياضي"
      note: "zh-CN: 'sports math' as a punchy English phrase doesn't land; expanded to '体育博彩的数学' (the math of sports betting) for the institutional register."
    section_know_your_game:
      en: "Know Your Game"
      ja: "ゲームを知る"
      zh-CN: "了解游戏"
      ar: "معرفة اللعبة"
      note: "ar: UAE communal voice — 'اعرف لعبتك' (imperative + 2nd-person suffix) replaced with the verbal noun 'معرفة اللعبة' (knowing the game), the standard institutional register."
    section_how_it_works:
      en: "How It Works"
      ja: "仕組み"
      zh-CN: "运作方式"
      ar: "آلية العمل"
    section_your_session:
      en: "Your session"
      ja: "今回のセッション"
      zh-CN: "本次游戏"
      ar: "ملخّص الجلسة"
      note: "ar: UAE communal voice — 'جلستك' contains the 2nd-person ك suffix ('your session'). Replaced with 'ملخّص الجلسة' (session summary) — no direct address."
    section_more_resources:
      en: "More resources"
      ja: "その他のサポート"
      zh-CN: "更多资源"
      ar: "موارد إضافية"
    section_myth_vs_math:
      en: "Myth vs. Math"
      ja: "俗説と数学"
      zh-CN: "误区与数字"
      ar: "الاعتقاد مقابل الأرقام"
      note: "zh-CN: 数字 (numbers) lands more cleanly than 数学 (mathematics) in the civic register. ar: we use 'belief vs. numbers' to preserve the contrast without the informal 'myth' framing."

    # Helpline / support line footer strings. There are several minor wording
    # variants in English ("Free support", "Free, confidential support", "24/7
    # Support") — we represent the canonical forms and let templates pick.
    helpline_short:
      en: "Free support 24/7: {{HELPLINE_NUMBER}}"
      ja: "24時間無料サポート：{{HELPLINE_NUMBER}}"
      zh-CN: "24小时免费支援：{{HELPLINE_NUMBER}}"
      ar: "دعم مجاني وسري على مدار الساعة: {{HELPLINE_NUMBER}}"
      note: "ar: numbers remain LTR inline within RTL text (standard CSS). Use Arabic colon positioning. ar intentionally adds وسري (and confidential) even though the English source is just 'Free support' — the UAE private/confidential register expects the confidentiality promise in every helpline label, so the short/full forms converge in Arabic. This harmonizes all 16 Arabic templates to the same label."
    helpline_full:
      en: "Free, confidential support 24/7: {{HELPLINE_NUMBER}}"
      ja: "秘密厳守・24時間無料サポート：{{HELPLINE_NUMBER}}"
      zh-CN: "24小时免费保密支援：{{HELPLINE_NUMBER}}"
      ar: "دعم مجاني وسري على مدار الساعة: {{HELPLINE_NUMBER}}"
      note: "zh-CN: 保密 (confidentiality) is emphasized per Macau profile. ja: 秘密厳守 is the standard institutional phrasing for confidential support."
    helpline_247_prefix:
      en: "24/7 Support: {{HELPLINE_NUMBER}}"
      ja: "24時間サポート：{{HELPLINE_NUMBER}}"
      zh-CN: "24小时支援：{{HELPLINE_NUMBER}}"
      ar: "دعم على مدار الساعة: {{HELPLINE_NUMBER}}"
    helpline_247_label:
      en: "24/7 Support"
      ja: "24時間サポート"
      zh-CN: "24小时支援"
      ar: "دعم مجاني وسري على مدار الساعة"
      note: "ar: UAE private/confidential register expects the مجاني وسري (free and confidential) promise in every helpline label. Original 'الدعم على مدار الساعة' extended to the full form to harmonize with helpline_short/helpline_full (which already include مجاني وسري)."
    helpline_label_24_7:
      en: "{{HELPLINE_NUMBER}} · 24/7"
      ja: "{{HELPLINE_NUMBER}}・24時間対応"
      zh-CN: "{{HELPLINE_NUMBER}}・24小时"
      ar: "{{HELPLINE_NUMBER}} · على مدار الساعة"
    helpline_available_24_7:
      en: "{{TEXT_NUMBER}} · Chat {{CHAT_URL}} · Available 24/7"
      ja: "{{TEXT_NUMBER}}・チャット {{CHAT_URL}}・24時間対応"
      zh-CN: "{{TEXT_NUMBER}}・在线支援 {{CHAT_URL}}・24小时服务"
      ar: "{{TEXT_NUMBER}} · الدردشة {{CHAT_URL}} · متاح على مدار الساعة"
    helpline_channels_short:
      en: "{{TEXT_NUMBER}} · Chat {{CHAT_URL}}"
      ja: "{{TEXT_NUMBER}}・チャット {{CHAT_URL}}"
      zh-CN: "{{TEXT_NUMBER}}・在线支援 {{CHAT_URL}}"
      ar: "{{TEXT_NUMBER}} · الدردشة {{CHAT_URL}}"
    helpline_headline:
      en: "Free, confidential support"
      ja: "秘密厳守の無料サポート"
      zh-CN: "免费保密支援"
      ar: "دعم مجاني وسري"
    helpline_headline_24_7:
      en: "Free, confidential support — 24/7"
      ja: "秘密厳守の無料サポート・24時間対応"
      zh-CN: "24小时免费保密支援"
      ar: "دعم مجاني وسري — على مدار الساعة"
    helpline_subtext:
      en: "No judgment. No cost. Just real help, whenever you need it."
      ja: "費用もかからず、評価もされません。必要なときに、確かなサポートをご利用いただけます。"
      zh-CN: "免费、不加评判，随时为玩家提供真诚的帮助。"
      ar: "بدون أحكام، وبدون تكلفة. فقط مساعدة حقيقية عند الحاجة."
      note: "ja: 'No judgment' becomes '評価もされません' (you won't be judged/assessed). zh-CN (Macau): subject dropped and 玩家 (player) used instead of 你; diplomatic register. ar: formal MSA, parallel structure preserved."
    helpline_for_any_question:
      en: "For any question about gambling. No judgment. Ever."
      ja: "ギャンブルに関するどのようなご相談にもお応えします。ご評価することはありません。"
      zh-CN: "无论关于博彩的任何问题，玩家皆可咨询，不受评判。"
      ar: "لأي سؤال يتعلق بالمقامرة. بدون أحكام، أبدًا."
    helpline_available_any_gambling:
      en: "Free, confidential support — for any question about gambling."
      ja: "ギャンブルに関するご相談は、秘密厳守の無料サポートをご利用いただけます。"
      zh-CN: "博彩相关任何问题，皆可获得免费保密支援。"
      ar: "دعم مجاني وسري — لأي سؤال يتعلق بالمقامرة."
    helpline_available_long:
      en: "Free, confidential support is available 24/7 — for any question about gambling. No judgment. Ever."
      ja: "ギャンブルに関するどのようなご相談にも、秘密厳守の無料サポートが24時間ご利用いただけます。ご評価することはありません。"
      zh-CN: "24小时免费保密支援，博彩相关任何问题皆可咨询，玩家不会受到任何评判。"
      ar: "الدعم المجاني والسري متاح على مدار الساعة — لأي سؤال يتعلق بالمقامرة. بدون أحكام، أبدًا."
      note: "zh-CN: use full-width Chinese comma U+FF0C (，) between clauses, never the half-width Latin comma U+002C (,). Chinese punctuation convention requires full-width marks when the surrounding characters are Han."
    helpline_24_7_no_judgment:
      en: "24/7 · No judgment · Any question about gambling"
      ja: "24時間対応・評価なし・ギャンブルに関するあらゆるご相談"
      zh-CN: "24小时·不加评判·博彩相关任何问题"
      ar: "على مدار الساعة · بدون أحكام · لأي سؤال عن المقامرة"
    helpline_24_7_ever:
      en: "24/7 · No judgment · Ever."
      ja: "24時間対応・評価は一切いたしません"
      zh-CN: "24小时・始终不加评判"
      ar: "على مدار الساعة · بدون أحكام · أبدًا"
    helpline_need_to_talk:
      en: "Need to talk?"
      ja: "お話しされたいときに"
      zh-CN: "需要倾诉吗？"
      ar: "باب الحوار مفتوح."
      note: "ja: direct question → softer nominal phrase ('when you'd like to talk'). zh-CN: keeps question form but in formal register. ar: UAE communal voice forbids direct second-person questions (تحتاج addresses the reader). Replaced with institutional declarative 'باب الحوار مفتوح' (The door for dialogue is open) — no second-person reference."
    helpline_need_to_talk_free:
      en: "Need to talk? Free, confidential support."
      ja: "お話しされたいときに。秘密厳守の無料サポートをご利用いただけます。"
      zh-CN: "需要倾诉吗？免费保密支援。"
      ar: "باب الحوار مفتوح. دعم مجاني وسري."
      note: "ar: UAE communal voice — see helpline_need_to_talk note."
    helpline_short_label:
      en: "Free, confidential support: {{HELPLINE_NUMBER}}"
      ja: "秘密厳守の無料サポート：{{HELPLINE_NUMBER}}"
      zh-CN: "免费保密支援：{{HELPLINE_NUMBER}}"
      ar: "دعم مجاني وسري: {{HELPLINE_NUMBER}}"

    # Channel labels repeated across multiple templates.
    channel_call:
      en: "Call"
      ja: "電話"
      zh-CN: "电话"
      ar: "اتصال"
    channel_text:
      en: "Text"
      ja: "メッセージ"
      zh-CN: "短讯"
      ar: "رسالة نصية"
      note: "zh-CN: 短讯 is the Macau/HK register; mainland would use 短信."
    channel_chat:
      en: "Chat"
      ja: "チャット"
      zh-CN: "在线支援"
      ar: "الدردشة"
      note: "zh-CN: 在线支援 (online support) reads more institutional than 聊天 (chat)."
    channel_web:
      en: "Web"
      ja: "ウェブ"
      zh-CN: "网站"
      ar: "الويب"
    channel_call_dot_text_dot_chat:
      en: "Call · Text · Chat"
      ja: "電話・メッセージ・チャット"
      zh-CN: "电话・短讯・在线支援"
      ar: "اتصال · رسالة · دردشة"

    # Short CTAs.
    cta_learn_more:
      en: "Learn more"
      ja: "詳しくはこちら"
      zh-CN: "了解更多"
      ar: "لمعرفة المزيد"
      note: "ar: UAE communal voice — imperative 'اعرف' replaced with the verbal-noun purposive construction 'لمعرفة' (to know / for knowing)."
    cta_get_started:
      en: "Get started"
      ja: "はじめる"
      zh-CN: "立即开始"
      ar: "البدء الآن"
      note: "ar: UAE communal voice — imperative 'ابدأ' replaced with the verbal noun 'البدء' (the starting / to begin). Standard institutional register for CTAs."
    cta_continue:
      en: "Continue"
      ja: "続ける"
      zh-CN: "继续"
      ar: "متابعة"
    cta_done:
      en: "Done"
      ja: "完了"
      zh-CN: "完成"
      ar: "تم"
    cta_go_back:
      en: "Go back"
      ja: "戻る"
      zh-CN: "返回"
      ar: "رجوع"
    cta_see_full_breakdown:
      en: "See the full breakdown"
      ja: "詳細を確認する"
      zh-CN: "查看完整数据"
      ar: "عرض التفاصيل الكاملة"
    cta_scan_for_support:
      en: "Scan for support"
      ja: "スキャンしてサポートへ"
      zh-CN: "扫码获取支援"
      ar: "امسح للحصول على الدعم"
    cta_scan_for_facts:
      en: "Scan for the facts"
      ja: "スキャンして事実を確認"
      zh-CN: "扫码查看事实"
      ar: "امسح لعرض الحقائق"
    cta_scan_to_learn_more:
      en: "Scan to learn more"
      ja: "スキャンして詳細を見る"
      zh-CN: "扫码了解更多"
      ar: "امسح لمعرفة المزيد"
    cta_manage_preferences:
      en: "Manage your preferences"
      ja: "配信設定を管理する"
      zh-CN: "管理邮件偏好"
      ar: "إدارة التفضيلات"
    cta_unsubscribe:
      en: "Unsubscribe"
      ja: "配信停止"
      zh-CN: "取消订阅"
      ar: "إلغاء الاشتراك"

    # Legal / disclaimer lines. {{AGE_DISCLAIMER}} and {{GENERAL_DISCLAIMER}}
    # are build-time tokens resolved from jurisdiction config, so they are
    # NOT translated here. They appear untouched in templates.
    legal_age_plus_general:
      en: "{{AGE_DISCLAIMER}} {{GENERAL_DISCLAIMER}}"
      ja: "{{AGE_DISCLAIMER}} {{GENERAL_DISCLAIMER}}"
      zh-CN: "{{AGE_DISCLAIMER}} {{GENERAL_DISCLAIMER}}"
      ar: "{{AGE_DISCLAIMER}} {{GENERAL_DISCLAIMER}}"
      note: "Passthrough — these tokens resolve per jurisdiction at build time."

    # Operator co-brand placeholder ("Your logo" / "Your logo here") — this is
    # a pre-build placeholder that operators replace with their logo, so it
    # should read naturally to the authoring audience. Still, the test renders
    # show the string, so we translate it for preview parity.
    operator_logo_placeholder:
      en: "Your logo"
      ja: "貴社ロゴ"
      zh-CN: "贵司标志"
      ar: "شعارك"
    operator_logo_here:
      en: "Your logo here"
      ja: "貴社ロゴをここに"
      zh-CN: "贵司标志"
      ar: "شعارك هنا"

    # QR block labels.
    qr_code_label:
      en: "QR Code"
      ja: "QRコード"
      zh-CN: "二维码"
      ar: "رمز الاستجابة السريعة"
    qr_plain:
      en: "QR"
      ja: "QR"
      zh-CN: "QR"
      ar: "QR"
      note: "Plain 'QR' placeholder in mockups — leave as Latin."

    # Internal-use / operator-facing labels that appear in the rendered
    # mockups (sign-staff-9e, etc.) but are ultimately seen only by staff.
    internal_use_only:
      en: "Internal use only"
      ja: "社内限定"
      zh-CN: "内部使用"
      ar: "للاستخدام الداخلي فقط"

  # ──────────────────────────────────────────────────────────────────────
  # PHASE A — cognitive-distortion "Myth vs. Math" cards (13a..13f)
  # These are the highest-stakes strings for cultural adaptation because
  # they use first-person myth quotes and blunt corrective facts. Literal
  # translation would read as accusatory in ja/zh-CN/ar. We use the
  # culturally-correct elder/authority register for each target.
  # ──────────────────────────────────────────────────────────────────────

  card-13a-its-due:
    eyebrow: { $ref: "common.section_myth_vs_math" }
    pillar: { $ref: "common.pillar_open" }
    myth_intro:
      en: ""
      ja: ""
      zh-CN: "有些玩家认为："
      ar: "يعتقد بعض اللاعبين:"
      note: "Macau and UAE introduce the myth as a third-person belief held by 'some players' rather than addressing the reader directly. This is the institutional/communal substitute for the strikethrough device used in English/Japanese. Empty for en/ja since those locales keep the strikethrough."
    myth:
      en: '"It''s due to hit"'
      ja: "「そろそろ当たるはずだ」"
      zh-CN: "「快该中了」"
      ar: "«حان وقت الفوز»"
      note: "ja: 「そろそろ当たるはずだ」 — bare はず is fragmentary as a quoted thought; はずだ is the natural sentence-final form. zh-CN: 快该中了 captures the casual player's internal monologue in Macau Cantonese-influenced Mandarin. ar: «حان وقت الفوز» = 'the time for winning has come' — preserves the expectation, formal MSA."
    fact_softener:
      en: ""
      ja: ""
      zh-CN: "事实上，"
      ar: "في الواقع، "
      note: "Macau and UAE prefix the fact statement with a diplomatic softener (事实上 / في الواقع — 'in fact, / in reality,') to avoid direct negation of the myth. Standard institutional Chinese and Arabic public-health convention. Note Chinese full-width comma U+FF0C and Arabic comma U+060C."
    fact:
      en: "The slot doesn't owe you a win. <strong>Losses don't load the next spin.</strong>"
      ja: "スロットマシンは、勝ちを保証するものではありません。<strong>過去の負けが次の結果に影響することはありません。</strong>"
      zh-CN: "老虎机并不欠玩家任何奖金。<strong>过往的损失不会影响下一次旋转。</strong>"
      ar: "آلة القمار لا تدين لأحد بالفوز. <strong>الخسائر السابقة لا تؤثر على الدورة التالية.</strong>"
      note: "ja: 保証する (to guarantee) is the institutional/financial verb, more elder-register than 約束する (to promise). zh-CN: uses 玩家 instead of 你, keeping the communal/institutional register. ar: 'لا تدين لأحد' (doesn't owe anyone) instead of 'لك' (you) — communal voice for UAE institutional register; the literal you-address would read as Western RG translation."
    stat_number:
      en: "$0"
      ja: "¥0"
      zh-CN: "澳门币 0"
      ar: "0 د.إ"
      note: "Currency symbols localized to native conventions per jurisdiction: Japan → ¥ (universal); Macau → 澳门币 (Chinese-language Macau pataca, MOP$ for international/banking); UAE → د.إ (Arabic dirham abbreviation, AED for ISO/banking). Numerals stay Western Arabic (0-9)."
    stat_unit:
      en: "owed to you<br>for past losses"
      ja: "過去の負けに対する<br>払い戻し"
      zh-CN: "因过往损失<br>应得的金额"
      ar: "مستحق<br>مقابل الخسائر السابقة"
      note: "ja: 払い戻し (refund) is the natural Japanese financial-institution noun for what's owed back; reads as a single noun phrase paired with the ¥0 numeral. ar: drops 'لك' (to you) for communal voice consistency with the fact statement."

  card-13b-near-win:
    eyebrow: { $ref: "common.section_myth_vs_math" }
    pillar: { $ref: "common.pillar_open" }
    myth:
      en: '"It was so close!"'
      ja: "「惜しかった！」"
      zh-CN: "「就差一点！」"
      ar: "«كان قريبًا جدًا!»"
    fact:
      en: "A near-win isn't progress. It's just <strong>a loss that looks close.</strong>"
      ja: "惜しい負けは、勝ちに近づいている証ではありません。それは<strong>近く見えるだけの負け</strong>です。"
      zh-CN: "差一点的失败并非接近胜利，<strong>其实只是一次看起来接近的损失。</strong>"
      ar: "الخسارة القريبة ليست تقدمًا. إنها فقط <strong>خسارة تبدو قريبة.</strong>"
      note: "zh-CN: 其实 (actually/in fact) replaces direct negation, fitting the diplomatic profile."
    stat_number:
      en: "$0"
      ja: "¥0"
      zh-CN: "MOP$0"
      ar: "0 د.إ"
      note: "ar: localized to UAE dirham form د.إ (with Arabic dots and kasra) instead of Latin 'AED'. The native Arabic abbreviation matches how currency is rendered in UAE-facing institutional materials."
    stat_unit:
      en: "earned<br>by \"almost\""
      ja: "「惜しい」で<br>得られるもの"
      zh-CN: "因「差一点」<br>获得的金额"
      ar: "المكتسب<br>من «تقريبًا»"
