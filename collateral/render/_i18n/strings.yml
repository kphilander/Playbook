      ar: "لأي سؤال يتعلق بالمقامرة. على مدار الساعة. بدون أحكام."
      note: "zh-CN: Macau profile — 保密 (confidentiality) emphasized."
    channel_text:
      en: "Text {{TEXT_NUMBER}}"
      ja: "メッセージ {{TEXT_NUMBER}}"
      zh-CN: "短讯 {{TEXT_NUMBER}}"
      ar: "رسالة نصية {{TEXT_NUMBER}}"
