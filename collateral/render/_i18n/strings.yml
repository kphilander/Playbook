  # -------- How-to-play (htp) card family --------
  # These share a consistent structure: pillar, section label "How It Works",
  # game name, body, stat number, stat unit. Listed here for each variant.
  htp-common:
    section_label: { $ref: "common.section_how_it_works" }

  htp-card-baccarat:
    game:
      en: "Baccarat"
      ja: "バカラ"
      zh-CN: "百家乐"
      ar: "باكاراه"
    body:
      en: "The simplest game on the floor has some of the <strong>best odds in the casino</strong>. Bet Banker. Skip the Tie. That's the whole strategy."
      ja: "カジノで最もシンプルなゲームの一つでありながら、<strong>カジノ屈指の有利な確率</strong>を持ちます。バンカーに賭け、タイは避ける。戦略はこれだけです。"
      zh-CN: "赌场中最简单的游戏之一，拥有<strong>较佳的赔率</strong>。投注庄家，避开和局，策略仅此而已。"
      ar: "أبسط لعبة في الصالة تتضمن بعضًا من <strong>أفضل الاحتمالات في الكازينو</strong>. الرهان على المصرفي. تجنّب التعادل. هذه هي الاستراتيجية بأكملها."
    stat_number:
      en: "1.06%"
    stat_unit:
      en: "house edge<br>on Banker bet"
      ja: "バンカーベットの<br>ハウスエッジ"
      zh-CN: "投注庄家的<br>庄家优势"
      ar: "نسبة الكازينو<br>على رهان المصرفي"

  htp-card-bingo:
    game:
      en: "Bingo"
      ja: "ビンゴ"
      zh-CN: "宾果"
      ar: "البينجو"
    body:
      en: "Every card has <strong>the same chance of winning</strong>. Off-peak sessions mean fewer players competing for the same prizes."
      ja: "どのカードも<strong>当たる確率は同じ</strong>です。空いている時間帯のセッションは、同じ賞金を競うプレイヤーが少なくなります。"
      zh-CN: "每张卡片<strong>中奖的概率完全相同</strong>。非高峰时段的场次中，参与者较少，争夺相同奖金的人数亦较少。"
      ar: "لكل بطاقة <strong>الفرصة نفسها في الفوز</strong>. الجلسات خارج أوقات الذروة تعني عددًا أقل من البطاقات المنافسة على الجوائز نفسها."
    stat_number:
      en: "5-25%"
    stat_unit:
      en: "house edge range<br>online vs. in-venue"
      ja: "ハウスエッジの幅<br>オンラインと会場の比較"
      zh-CN: "庄家优势区间<br>线上与场馆对比"
      ar: "نطاق نسبة الكازينو<br>عبر الإنترنت مقابل القاعة"
    legal_18_plus:
      en: "18+ to play"
      ja: "18歳以上よりご利用いただけます"
      zh-CN: "18 岁以上方可参与"
      ar: "18 عامًا فأكثر للعب"
      note: "This is a hardcoded 18+ legal line (not a token) — should be tokenized via {{AGE_DISCLAIMER}} long-term, but for now treat as a string to translate per jurisdiction. ja: 18+ legal line — Japan's legal gambling age is generally 20+ (公営ギャンブル), but this template hardcodes '18+'. Translated literally; should be reviewed against {{AGE_DISCLAIMER}} token long-term per jurisdiction."

  htp-card-blackjack:
    game:
      en: "Blackjack"
      ja: "ブラックジャック"
      zh-CN: "二十一点"
      ar: "بلاك جاك"
    body:
      en: "The best odds in the casino take <strong>20 minutes to learn</strong>. Basic strategy is the mathematically optimal play for every hand."
      ja: "カジノ屈指の有利な確率は、<strong>20分で身につけられます</strong>。基本戦略は、どのハンドでも数学的に最適な打ち方です。"
      zh-CN: "赌场中最佳的赔率，<strong>仅需二十分钟即可掌握</strong>。基本策略即为每手牌中数学上最优的打法。"
      ar: "أفضل الاحتمالات في الكازينو تستلزم <strong>20 دقيقة من التعلّم</strong>. الاستراتيجية الأساسية هي اللعب الأمثل رياضيًا لكل يد."
    stat_number:
      en: "0.5%"
    stat_unit:
      en: "house edge with<br>basic strategy"
      ja: "基本戦略を用いた<br>ハウスエッジ"
      zh-CN: "采用基本策略的<br>庄家优势"
      ar: "نسبة الكازينو مع<br>الاستراتيجية الأساسية"

  htp-card-craps:
    game:
      en: "Craps"
      ja: "クラップス"
      zh-CN: "花旗骰"
      ar: "كرابس"
    body:
      en: "The table looks complex but <strong>two bets matter</strong>: Pass and Don't Pass. Everything in the center of the layout has a house edge of 9% or worse."
      ja: "テーブルは複雑に見えますが、<strong>重要なのは2種類の賭け</strong>です。パスとドント・パス。台の中央にある賭けはいずれもハウスエッジが9%以上になります。"
      zh-CN: "桌面看似复杂，但<strong>真正重要的仅有两类投注</strong>：Pass 与 Don't Pass。台面中央的所有投注，庄家优势均为 9% 或更高。"
      ar: "تبدو الطاولة معقدة، لكن <strong>رهانين فقط يهمّان</strong>: Pass و Don't Pass. كل ما في وسط الطاولة تبلغ نسبة الكازينو فيه 9% أو أكثر."
    stat_number:
      en: "1.41%"
    stat_unit:
      en: "house edge<br>on the Pass line"
      ja: "パスラインの<br>ハウスエッジ"
      zh-CN: "Pass 线的<br>庄家优势"
      ar: "نسبة الكازينو<br>على خط Pass"

  htp-card-horse-racing:
    game:
      en: "Horse Racing"
      ja: "競馬"
      zh-CN: "赛马"
      ar: "سباق الخيل"
    body:
      en: "In pari-mutuel betting, you're not playing against the house. You're splitting the pool with <strong>other bettors</strong> — after the track takes its cut."
      ja: "パリミュチュエル方式では、ハウスと対戦するのではなく、<strong>他の購入者と配当を分け合います</strong>。主催者の取り分が差し引かれたあとの金額が対象です。"
      zh-CN: "在同注分彩制投注中，玩家并非与庄家对赌，而是在扣除赛马场抽成后，与<strong>其他投注者</strong>共享奖池。"
      ar: "في الرهانات التناسبية، لا يكون اللعب ضد الكازينو. يتقاسم اللاعبون المجموع مع <strong>باقي المراهنين</strong> بعد اقتطاع نسبة المسار."
    stat_number:
      en: "15-25%"
    stat_unit:
      en: "takeout range<br>depending on bet type"
      ja: "賭けの種類による<br>控除率の幅"
      zh-CN: "抽成区间<br>因投注类型而异"
      ar: "نطاق الاقتطاع<br>حسب نوع الرهان"
    legal_18_plus_wager:
      en: "18+ to wager"
      ja: "20歳以上より投票いただけます"
      zh-CN: "18 岁以上方可投注"
      ar: "18 عامًا فأكثر للمراهنة"
      note: "ja: horse racing (競馬) in Japan requires 20+ (Article 28 of 競馬法). Adjusted from the English '18+' to the correct Japanese legal age."

  htp-card-lottery:
    game:
      en: "Lottery"
      ja: "宝くじ"
      zh-CN: "彩票"
      ar: "اليانصيب"
    body:
      en: "Every number has an <strong>identical chance</strong> of being drawn. Picking birthdays, patterns, or \"lucky\" numbers doesn't change the odds."
      ja: "どの番号も<strong>当たる確率は同じ</strong>です。誕生日、法則、「幸運の」番号を選んでも、確率は変わりません。"
      zh-CN: "每一个号码被抽中的<strong>概率完全相同</strong>。选择生日、规律或所谓「幸运号码」均不会改变赔率。"
      ar: "لكل رقم <strong>احتمال متساوٍ</strong> في الظهور. اختيار أعياد الميلاد أو الأنماط أو «أرقام الحظ» لا يغيّر الاحتمالات."
    stat_number:
      en: "45-50%"
    stat_unit:
      en: "house edge<br>on major draw games"
      ja: "主要な抽選ゲームの<br>ハウスエッジ"
      zh-CN: "主要彩票游戏的<br>庄家优势"
      ar: "نسبة الكازينو<br>في سحوبات اليانصيب الرئيسية"

