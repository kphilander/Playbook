  # -------- Brochures 8a / 8b --------
  brochure-trifold-8a:
    panel_what_is_heading:
      en: "What is Playbook?"
      ja: "Playbookとは"
      zh-CN: "何谓 Playbook？"
      ar: "ما هو Playbook؟"
    panel_what_is_body:
      en: "Playbook gives you the facts and features to play on your terms. Not warnings. Not lectures. Just the real numbers behind the games you play — and the tools to manage your experience."
      ja: "Playbookは、ご自身のペースで遊ぶための事実と機能をお届けします。警告でも説教でもなく、ゲームの背景にある本当の数字と、体験を整えるためのツールをご提供します。"
      zh-CN: "Playbook 提供真实数据与实用功能，助玩家自主掌控。所呈现的是游戏背后的准确数字，以及便于管理游戏体验的工具。"
      ar: "يقدّم Playbook الحقائق والميزات التي تُتيح اللعب بشروط واضحة. معلومات دقيقة وأدوات عملية، إلى جانب الأرقام الفعلية خلف الألعاب."
      note: "review: 'not warnings, not lectures' rewritten as positive declarative for Macau institutional register."
    panel_know_heading:
      en: "Know the odds"
      ja: "確率を知る"
      zh-CN: "了解赔率"
      ar: "معرفة الاحتمالات"
      note: "ar: UAE communal voice — imperative 'اعرف' replaced with the verbal noun 'معرفة'."
    panel_know_body:
      en: "Every game has a house edge. We show you the actual numbers so you can make informed choices."
      ja: "すべてのゲームにはハウスエッジがあります。実際の数字をご紹介するので、納得のいく選択をしていただけます。"
      zh-CN: "每款游戏都有庄家优势。此处呈现准确数字，供玩家做出知情的选择。"
      ar: "لكل لعبة نسبة للكازينو. تُعرض الأرقام الفعلية لدعم القرارات المبنية على المعرفة."
    panel_tools_heading:
      en: "Use the tools"
      ja: "ツールを使う"
      zh-CN: "善用工具"
      ar: "استخدام الأدوات"
      note: "ar: UAE communal voice — imperative 'استخدم' replaced with the verbal noun 'استخدام'."
    panel_tools_body:
      en: "Deposit limits, session reminders, activity dashboards — features designed to keep you in control."
      ja: "入金上限、セッションのお知らせ、利用状況ダッシュボードなど、主導権を保つための機能をご用意しています。"
      zh-CN: "存款限额、游戏时长提醒、活动仪表板 — 各项功能均为玩家保持自主掌控而设。"
      ar: "حدود الإيداع وتذكيرات الجلسة ولوحات النشاط — ميزات مصمّمة لتعزيز التحكم."
    panel_play_heading:
      en: "Play your way"
      ja: "自分のペースで遊ぶ"
      zh-CN: "自主游戏"
      ar: "اللعب وفق الطريقة الخاصة"
      note: "ar: UAE communal voice — imperative العب + 2nd-person suffix ك replaced with verbal-noun construction 'اللعب وفق الطريقة الخاصة' (playing according to one's own way)."
    panel_play_body:
      en: "Your money, your limits, your call. We give you information and tools. You decide what to do with them."
      ja: "資金も、上限も、判断もご自身のものです。情報とツールはこちらでご用意しますが、使い方を決めるのはご自身です。"
      zh-CN: "资金、限额、决定皆由玩家自主。此处提供资讯与工具，具体运用由玩家决定。"
      ar: "المال والحدود والقرار تخصّ اللاعب. المعلومات والأدوات متاحة، والاستخدام يعود إلى كل لاعب."
    section_real_odds: { $ref: "common.section_real_odds" }
    he_heading:
      en: "The house edge — what it means for you"
      ja: "ハウスエッジとは ― それが意味すること"
      zh-CN: "庄家优势 — 其实际含义"
      ar: "نسبة الكازينو — المعنى وفائدتها"
    he_body:
      en: "The house edge is the mathematical advantage built into every casino game. It's not hidden. It's how the business works. Knowing the edge helps you pick your games and set your budget."
      ja: "ハウスエッジとは、すべてのカジノゲームに組み込まれている数学的な優位性のことです。隠されているわけではなく、ビジネスの成り立ちそのものです。エッジを知ることが、ゲーム選びと予算設定の手がかりになります。"
      zh-CN: "庄家优势即赌场各类游戏内含的数学优势，并非隐蔽信息，而是行业运作的基本方式。了解此数字有助于玩家选择游戏并设定预算。"
      ar: "نسبة الكازينو هي الميزة الرياضية المُدمجة في كل لعبة كازينو. إنها ليست مخفية، بل جزء من آلية العمل. معرفتها تساعد على اختيار الألعاب وضبط الميزانية."
    table_col_game:
      en: "Game"
      ja: "ゲーム"
      zh-CN: "游戏"
      ar: "اللعبة"
    table_col_edge:
      en: "House edge"
      ja: "ハウスエッジ"
      zh-CN: "庄家优势"
      ar: "نسبة الكازينو"
    roulette_100_example:
      en: "For every $100 you wager on American roulette, the casino keeps about $5.26 over time. That's the cost of the entertainment."
      ja: "アメリカンルーレットで10,000円を賭けるごとに、長期的には約526円がカジノに渡ります。これが娯楽の対価です。"
      zh-CN: "在美式轮盘中，每投注澳门币 100，长期而言赌场约保留澳门币 5.26。此即娱乐的成本。"
      ar: "مقابل كل 100 د.إ مراهنة على الروليت الأمريكي، يحتفظ الكازينو بنحو 5.26 د.إ مع مرور الوقت. هذه هي تكلفة التجربة."
      note: "ja: currency scaled from $100/$5.26 to realistic yen amounts (¥10,000 / ¥526). 5.26% ratio preserved."
    optimal_strategy_note:
      en: "House edge assumes optimal strategy where applicable."
      ja: "ハウスエッジは、該当する場合は最適戦略を前提としています。"
      zh-CN: "所列庄家优势于适用情况下，均以最佳策略为准。"
      ar: "نسبة الكازينو محسوبة على أساس الاستراتيجية المثلى حيثما كان ذلك ممكنًا."
    your_tools_h:
      en: "Your Tools"
      ja: "ご利用いただけるツール"
      zh-CN: "可用工具"
      ar: "الأدوات المتاحة"
    features_h:
      en: "Features that work for you"
      ja: "役立つ機能"
      zh-CN: "为玩家服务的功能"
      ar: "ميزات تدعم تجربة اللعب"
    feature_deposit_title:
      en: "Deposit limits"
      ja: "入金上限"
      zh-CN: "存款限额"
      ar: "حدود الإيداع"
    feature_deposit_body:
      en: "Set your entertainment budget for the week or month. Takes 10 seconds. Adjust anytime."
      ja: "週単位または月単位で娯楽予算を決めます。10秒で設定でき、いつでも変更できます。"
      zh-CN: "可按周或按月设定娱乐预算，仅需十秒钟，并可随时调整。"
      ar: "تحديد ميزانية الترفيه أسبوعيًا أو شهريًا. لا يستغرق الأمر سوى 10 ثوانٍ، ويمكن التعديل في أي وقت."
    feature_session_title:
      en: "Session reminders"
      ja: "セッションのお知らせ"
      zh-CN: "游戏时长提醒"
      ar: "تذكيرات الجلسة"
    feature_session_body:
      en: "Get a check-in at the interval you choose. Stay aware without killing the vibe."
      ja: "お選びいただいた間隔でそっとお知らせします。体験を妨げることなく、状況を把握していただけます。"
      zh-CN: "可按自选间隔收到提醒，有助于保持觉察而不打扰游戏体验。"
      ar: "تنبيه لحظي في الفاصل المختار. تعزيز الوعي دون تعطيل التجربة."
      note: "review: 'without killing the vibe' rewritten as '不打扰游戏体验' (without disrupting the experience). ja: 'without killing the vibe' dropped per review flag — rewrote as '体験を妨げることなく' (without disrupting the experience)."
    feature_dashboard_title:
      en: "Activity dashboard"
      ja: "利用状況ダッシュボード"
      zh-CN: "活动仪表板"
      ar: "لوحة النشاط"
    feature_dashboard_body:
      en: "See your play stats — sessions, time, spending. No surprises. Knowledge is a feature."
      ja: "セッション、時間、金額などのプレイ履歴をご確認いただけます。不意の発見はありません。知ることは、一つの機能です。"
      zh-CN: "查看游戏数据 — 场次、时长、支出。资讯清晰透明，知识即功能。"
      ar: "عرض إحصائيات اللعب: الجلسات والوقت والإنفاق. دون مفاجآت. المعرفة ميزة."
    feature_bankroll_title:
