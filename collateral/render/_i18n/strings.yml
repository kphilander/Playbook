  # -------- Misc cards 11a / 11b --------
  card-11a-streamer-myth:
    pillar: { $ref: "common.pillar_open" }
    myth_label: { $ref: "common.section_myth_vs_math" }
    myth_intro:
      zh-CN: "有些玩家认为："
    myth_statement:
      en: '"That streamer always wins"'
      ja: "「あの配信者はいつも勝っている」"
      zh-CN: "「那位主播总是会赢」"
      ar: "«هذا البثّ المباشر يفوز دائمًا»"
    fact_softener:
      zh-CN: "事实上，"
    fact_statement:
      en: "Sponsored streams use <strong>house money</strong>. Highlight reels cut the losses. Your account has a real balance — and real odds working against you."
      ja: "スポンサー付きの配信では<strong>ハウスの資金</strong>が使われています。編集された映像では負けの場面が省かれています。ご自身のアカウントには実際の残高があり、確率は自身に対して作用します。"
      zh-CN: "赞助直播使用的是<strong>赞助方资金</strong>，剪辑后的片段往往略去了亏损部分。玩家账户中的是实际余额，所面对的亦是真实的赔率。"
      ar: "البث المدفوع يستخدم <strong>أموال الشركة الراعية</strong>، والمقاطع المختصرة تُسقط الخسائر. حساب اللاعب يتضمن رصيدًا فعليًا واحتمالات فعلية."
      note: "review: 'highlight reels cut the losses' rewritten. zh-CN: '剪辑后的片段往往略去了亏损部分' (edited clips often omit loss portions). Second-person dropped throughout. ja: 'highlight reels cut the losses' rendered as '編集された映像では負けの場面が省かれています' (edited clips omit the losing scenes) per review flag."
    stat_number:
      en: "100%"
    stat_unit:
      en: "of esports odds include a<br>built-in margin. The book always gets its cut."
      ja: "eスポーツの確率には<br>あらかじめ取り分が含まれています。ブックメーカーの取り分は必ず発生します。"
      zh-CN: "电子竞技赔率均含有<br>内建利润。博彩公司始终获得抽成。"
      ar: "من احتمالات الرياضات الإلكترونية تتضمن هامشًا<br>مُدمجًا. شركة الرهان تحتفظ بنسبتها دائمًا."

  card-11b-lucky-numbers:
    pillar: { $ref: "common.pillar_open" }
    myth_label: { $ref: "common.section_myth_vs_math" }
    myth_intro:
      zh-CN: "有些玩家认为："
    myth_statement:
      en: '"My numbers are due"'
      ja: "「自分の番号がそろそろ来るはず」"
      zh-CN: "「我的号码该出了」"
      ar: "«حان دور أرقامي»"
    fact_softener:
      zh-CN: "事实上，"
    fact_statement:
      en: "Every combination in a 6/49 draw has <strong>identical odds: 1 in 13,983,816</strong>. The draw doesn't remember last week. Every week starts fresh."
      ja: "6/49の抽選では、どの組み合わせも<strong>まったく同じ確率：13,983,816分の1</strong>です。抽選は前週を記憶していません。毎週新たに始まります。"
      zh-CN: "在 6/49 开奖中，每一组号码组合的<strong>中奖概率完全相同：13,983,816 分之一</strong>。开奖并无对上一周的记忆，每一期均重新开始。"
      ar: "لكل توليفة في سحب 6/49 <strong>الاحتمال نفسه تمامًا: 1 من 13,983,816</strong>. السحب لا يحتفظ بذاكرة الأسبوع الماضي. كل أسبوع يبدأ من جديد."
