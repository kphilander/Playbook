      ja: "資金プランナー"
      zh-CN: "资金规划器"
      ar: "مخطط الرصيد"
    feature_bankroll_body:
      en: "Enter your budget, pick your game, and see how far your money can go."
      ja: "予算を入力してゲームを選ぶと、資金がどこまで持つかを確認できます。"
      zh-CN: "输入预算、选择游戏，即可查看资金的预期使用情况。"
      ar: "إدخال الميزانية واختيار اللعبة ومعرفة مدى امتداد المبلغ."
    feature_quiz_title:
      en: "Game IQ quiz"
      ja: "ゲームIQクイズ"
