# Translation strings for Playbook collateral.
#
# Each key is a unique string ID used across one or more templates.
# en is the source. ja, zh-CN, ar are target languages.
#
# Cultural profile drives translation quality (not just language):
#   ja        (Japan):  elder, communal, understated, contextual, reserved
#   zh-CN     (Macau):  authority, communal, minimal, diplomatic, private
#   ar        (UAE):    authority, communal, understated, contextual, private
#
# Rules applied in this file:
#   1. English source is copied verbatim from the templates — never edited.
#   2. Cultural adaptation, not literal translation. Where a literal rendering
#      would be culturally wrong (e.g., irreverent jokes in zh-CN/ar, direct
#      second-person "you" in ja-formal), a `note:` field explains what changed.
#   3. {{TOKENS}} are build-time placeholders and are NOT translated.
#   4. Identical strings (helpline label, age disclaimer, "Learn more", footer
#      legal, etc.) are deduplicated into the top-level `common:` section.
#   5. Template-specific strings are grouped by template ID (filename minus
#      the .html extension) to make review easy.
#   6. Phase A items are fully translated across all three languages.
#      Phase B items list the English source with `TODO: translate` markers
#      for ja/zh-CN/ar — to be filled in batched future work.
#
# Phase A (fully translated below):
#   - common (helpline/disclaimer/CTAs/footer legal, etc.)
#   - card-13a..13f  (cognitive distortion "Myth vs. Math" cards — most
#     culturally reactive, need careful work)
#   - card-14a / story-14b / poster-14c / email-14d / display-14e /
#     mobile-14f  (every-game cross-format showcase — shared headline,
#     different layouts)
#   - card-15a / story-15b / poster-15c / live-odds-overlay-15d
#     (sports-math quartet)
#
# Phase B (skeleton — English only, translations TODO):
#   - all other templates listed at the bottom of this file
#
# review: comments flag any translation the extractor was uncertain about.

strings:

  # ──────────────────────────────────────────────────────────────────────
  # COMMON — strings shared across many templates
  # ──────────────────────────────────────────────────────────────────────
  common:

    # The Playbook logo is two parts — "Play" set bold, "book" set light/uppercase.
    # It is a brand wordmark. Translations render it exactly the same visually;
    # the brand name "Playbook" never translates, it stays Latin.
    brand_logo_play:
      en: "Play"
      ja: "Play"
      zh-CN: "Play"
      ar: "Play"
      note: "Brand wordmark — never translates. Keep Latin characters."
    brand_logo_book:
      en: "book"
      ja: "book"
      zh-CN: "book"
      ar: "book"
      note: "Brand wordmark — never translates. Keep Latin characters."

    # Voice pillars printed in pill badges on many cards/posters.
    pillar_open:
      en: "Open"
      ja: "オープン"
      zh-CN: "公开"
      ar: "شفافية"
      note: "ja: Katakana loanword is idiomatic for this kind of brand pillar label. zh-CN (Macau): 公开 = open/public/transparent, an authoritative civic register. ar: شفافية = transparency, the institutional register the UAE uses in RG communications."
    pillar_social:
      en: "Social"
      ja: "ソーシャル"
      zh-CN: "社群"
      ar: "اجتماعي"
      note: "zh-CN: 社群 (community) fits the communal profile better than 社交 (socializing)."

    # Section labels — these appear in the same pill-badge slot as voice pillars
    # but carry editorial/section meaning instead.
    section_real_odds:
      en: "Real Odds"
      ja: "本当の確率"
      zh-CN: "真实赔率"
      ar: "الاحتمالات الحقيقية"
    section_sports_math:
      en: "Sports math"
      ja: "スポーツの数学"
      zh-CN: "体育博彩的数学"
      ar: "حسابات الرهان الرياضي"
      note: "zh-CN: 'sports math' as a punchy English phrase doesn't land; expanded to '体育博彩的数学' (the math of sports betting) for the institutional register."
    section_know_your_game:
      en: "Know Your Game"
      ja: "ゲームを知る"
      zh-CN: "了解游戏"
      ar: "اعرف لعبتك"
    section_how_it_works:
      en: "How It Works"
      ja: "仕組み"
      zh-CN: "运作方式"
      ar: "آلية العمل"
    section_your_session:
      en: "Your session"
      ja: "今回のセッション"
      zh-CN: "本次游戏"
      ar: "جلستك"
    section_more_resources:
      en: "More resources"
      ja: "その他のサポート"
      zh-CN: "更多资源"
      ar: "موارد إضافية"
    section_myth_vs_math:
      en: "Myth vs. Math"
      ja: "俗説と数学"
      zh-CN: "误区与数字"
      ar: "الاعتقاد مقابل الأرقام"
      note: "zh-CN: 数字 (numbers) lands more cleanly than 数学 (mathematics) in the civic register. ar: we use 'belief vs. numbers' to preserve the contrast without the informal 'myth' framing."

    # Helpline / support line footer strings. There are several minor wording
    # variants in English ("Free support", "Free, confidential support", "24/7
    # Support") — we represent the canonical forms and let templates pick.
    helpline_short:
      en: "Free support 24/7: {{HELPLINE_NUMBER}}"
      ja: "24時間無料サポート：{{HELPLINE_NUMBER}}"
      zh-CN: "24小时免费支援：{{HELPLINE_NUMBER}}"
      ar: "دعم مجاني وسري على مدار الساعة: {{HELPLINE_NUMBER}}"
      note: "ar: numbers remain LTR inline within RTL text (standard CSS). Use Arabic colon positioning. ar intentionally adds وسري (and confidential) even though the English source is just 'Free support' — the UAE private/confidential register expects the confidentiality promise in every helpline label, so the short/full forms converge in Arabic. This harmonizes all 16 Arabic templates to the same label."
    helpline_full:
      en: "Free, confidential support 24/7: {{HELPLINE_NUMBER}}"
      ja: "秘密厳守・24時間無料サポート：{{HELPLINE_NUMBER}}"
      zh-CN: "24小时免费保密支援：{{HELPLINE_NUMBER}}"
      ar: "دعم مجاني وسري على مدار الساعة: {{HELPLINE_NUMBER}}"
      note: "zh-CN: 保密 (confidentiality) is emphasized per Macau profile. ja: 秘密厳守 is the standard institutional phrasing for confidential support."
    helpline_247_prefix:
      en: "24/7 Support: {{HELPLINE_NUMBER}}"
      ja: "24時間サポート：{{HELPLINE_NUMBER}}"
      zh-CN: "24小时支援：{{HELPLINE_NUMBER}}"
      ar: "دعم على مدار الساعة: {{HELPLINE_NUMBER}}"
    helpline_247_label:
      en: "24/7 Support"
      ja: "24時間サポート"
      zh-CN: "24小时支援"
      ar: "الدعم على مدار الساعة"
    helpline_label_24_7:
      en: "{{HELPLINE_NUMBER}} · 24/7"
      ja: "{{HELPLINE_NUMBER}}・24時間対応"
      zh-CN: "{{HELPLINE_NUMBER}}・24小时"
      ar: "{{HELPLINE_NUMBER}} · على مدار الساعة"
    helpline_available_24_7:
      en: "{{TEXT_NUMBER}} · Chat {{CHAT_URL}} · Available 24/7"
      ja: "{{TEXT_NUMBER}}・チャット {{CHAT_URL}}・24時間対応"
      zh-CN: "{{TEXT_NUMBER}}・在线支援 {{CHAT_URL}}・24小时服务"
      ar: "{{TEXT_NUMBER}} · الدردشة {{CHAT_URL}} · متاح على مدار الساعة"
    helpline_channels_short:
      en: "{{TEXT_NUMBER}} · Chat {{CHAT_URL}}"
      ja: "{{TEXT_NUMBER}}・チャット {{CHAT_URL}}"
      zh-CN: "{{TEXT_NUMBER}}・在线支援 {{CHAT_URL}}"
      ar: "{{TEXT_NUMBER}} · الدردشة {{CHAT_URL}}"
    helpline_headline:
      en: "Free, confidential support"
      ja: "秘密厳守の無料サポート"
      zh-CN: "免费保密支援"
      ar: "دعم مجاني وسري"
    helpline_headline_24_7:
      en: "Free, confidential support — 24/7"
      ja: "秘密厳守の無料サポート・24時間対応"
      zh-CN: "24小时免费保密支援"
      ar: "دعم مجاني وسري — على مدار الساعة"
    helpline_subtext:
      en: "No judgment. No cost. Just real help, whenever you need it."
      ja: "費用もかからず、評価もされません。必要なときに、確かなサポートをご利用いただけます。"
      zh-CN: "免费、不加评判，随时为玩家提供真诚的帮助。"
      ar: "بدون أحكام، وبدون تكلفة. فقط مساعدة حقيقية عند الحاجة."
      note: "ja: 'No judgment' becomes '評価もされません' (you won't be judged/assessed). zh-CN (Macau): subject dropped and 玩家 (player) used instead of 你; diplomatic register. ar: formal MSA, parallel structure preserved."
    helpline_for_any_question:
      en: "For any question about gambling. No judgment. Ever."
      ja: "ギャンブルに関するどのようなご相談にもお応えします。ご評価することはありません。"
      zh-CN: "无论关于博彩的任何问题，玩家皆可咨询，不受评判。"
      ar: "لأي سؤال يتعلق بالمقامرة. بدون أحكام، أبدًا."
    helpline_available_any_gambling:
      en: "Free, confidential support — for any question about gambling."
      ja: "ギャンブルに関するご相談は、秘密厳守の無料サポートをご利用いただけます。"
      zh-CN: "博彩相关任何问题，皆可获得免费保密支援。"
      ar: "دعم مجاني وسري — لأي سؤال يتعلق بالمقامرة."
    helpline_available_long:
      en: "Free, confidential support is available 24/7 — for any question about gambling. No judgment. Ever."
      ja: "ギャンブルに関するどのようなご相談にも、秘密厳守の無料サポートが24時間ご利用いただけます。ご評価することはありません。"
      zh-CN: "24小时免费保密支援,博彩相关任何问题皆可咨询,玩家不会受到任何评判。"
      ar: "الدعم المجاني والسري متاح على مدار الساعة — لأي سؤال يتعلق بالمقامرة. بدون أحكام، أبدًا."
    helpline_24_7_no_judgment:
      en: "24/7 · No judgment · Any question about gambling"
      ja: "24時間対応・評価なし・ギャンブルに関するあらゆるご相談"
      zh-CN: "24小时·不加评判·博彩相关任何问题"
      ar: "على مدار الساعة · بدون أحكام · لأي سؤال عن المقامرة"
    helpline_24_7_ever:
      en: "24/7 · No judgment · Ever."
      ja: "24時間対応・評価は一切いたしません"
      zh-CN: "24小时・始终不加评判"
      ar: "على مدار الساعة · بدون أحكام · أبدًا"
    helpline_need_to_talk:
      en: "Need to talk?"
      ja: "お話しされたいときに"
      zh-CN: "需要倾诉吗？"
      ar: "هل تحتاج إلى التحدث؟"
      note: "ja: direct question → softer nominal phrase ('when you'd like to talk'). zh-CN: keeps question form but in formal register. ar: formal MSA interrogative."
    helpline_need_to_talk_free:
      en: "Need to talk? Free, confidential support."
      ja: "お話しされたいときに。秘密厳守の無料サポートをご利用いただけます。"
      zh-CN: "需要倾诉吗？免费保密支援。"
      ar: "هل تحتاج إلى التحدث؟ دعم مجاني وسري."
    helpline_short_label:
      en: "Free, confidential support: {{HELPLINE_NUMBER}}"
      ja: "秘密厳守の無料サポート：{{HELPLINE_NUMBER}}"
      zh-CN: "免费保密支援：{{HELPLINE_NUMBER}}"
      ar: "دعم مجاني وسري: {{HELPLINE_NUMBER}}"

    # Channel labels repeated across multiple templates.
    channel_call:
      en: "Call"
      ja: "電話"
      zh-CN: "电话"
      ar: "اتصال"
    channel_text:
