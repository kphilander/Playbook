      ja: "3%"
      zh-CN: "3%"
      ar: "3%"
    bar_props:
      en: "Props"
      ja: "プロップ"
      zh-CN: "特殊投注"
      ar: "رهانات خاصة"
    bar_props_value:
      en: "5–7%"
      ja: "5〜7%"
      zh-CN: "5–7%"
      ar: "5–7%"
    bar_parlays:
      en: "Same-game parlays"
      ja: "同一試合パーレイ"
      zh-CN: "同场过关"
      ar: "رهانات متعددة بنفس المباراة"
    bar_parlays_value:
      en: "15–25%"
      ja: "15〜25%"
      zh-CN: "15–25%"
      ar: "15–25%"
    body_text:
      en: "Simple bets have a smaller cut. Fun bets have a bigger one."
      ja: "シンプルな賭けは取り分が少なく、複雑な賭けは取り分が大きくなります。"
      zh-CN: "简单投注抽成较低,复杂投注抽成较高。"
      ar: "الرهانات البسيطة تكلفتها أقل. الرهانات المعقدة تكلفتها أكبر."
      note: "en 'fun bets' → neutralized to 'complex/exciting bets' — 'fun' reads flippant in zh-CN/ar RG registers. ar: specifically المعقدة (complex) rather than ممتعة (enjoyable/fun) — the UAE register cannot frame high-juice parlays as 'fun' without undermining the RG message."

