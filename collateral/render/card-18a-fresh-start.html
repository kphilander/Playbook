<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800;900&family=Source+Sans+3:wght@300;400;600&family=Source+Code+Pro:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { margin: 0; background: transparent; }
  .social-card {
    width: 1080px; height: 1080px;
    background-image: linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px), var(--pb-gradient-bg, linear-gradient(145deg, var(--pb-color-primary-dark), var(--pb-color-primary)));
    background-size: 48px 48px, 48px 48px, cover;
    position: relative; overflow: hidden;
    display: flex; flex-direction: column;
  }
  .social-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 8px; background: var(--pb-gradient-bar, linear-gradient(90deg, var(--pb-color-accent), var(--pb-color-secondary))); }
  .card-header { padding: 56px 64px 0; display: flex; align-items: center; justify-content: space-between; position: relative; z-index: 1; }
  .card-logo { font-family: var(--pb-font-heading); font-size: calc(32px * var(--pb-template-text-scale, 1)); }
  .card-logo .logo-play { color: var(--pb-color-white); font-weight: 800; letter-spacing: -0.02em; }
  .card-logo .logo-book { color: var(--pb-color-secondary); font-weight: 300; text-transform: uppercase; letter-spacing: 0.08em; }
  .section-label { font-family: var(--pb-font-heading); font-size: calc(16px * var(--pb-template-text-scale, 1)); font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: var(--pb-color-accent); }
  .card-body { flex: 1; display: flex; flex-direction: column; justify-content: center; padding: 0 64px; position: relative; z-index: 1; }
  .headline { font-family: var(--pb-font-heading); font-size: calc(44px * var(--pb-template-text-scale, 1)); font-weight: 800; line-height: 1.15; color: var(--pb-color-white); margin-bottom: 36px; letter-spacing: -0.02em; }
  .columns { display: flex; gap: 16px; }
  .col-tools { flex: 1; display: flex; flex-direction: column; gap: 16px; }
  .odds-item { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 16px; padding: 24px; flex: 1; display: flex; flex-direction: column; justify-content: space-between; }
  .odds-game { font-family: var(--pb-font-body); font-size: calc(18px * var(--pb-template-text-scale, 1)); color: var(--pb-color-neutral-300); margin-bottom: 8px; }
  .odds-edge { font-family: var(--pb-font-heading); font-size: calc(44px * var(--pb-template-text-scale, 1)); font-weight: 800; letter-spacing: -0.02em; }
  .odds-edge.teal { color: var(--pb-color-secondary); }
  .odds-note { font-family: var(--pb-font-body); font-size: calc(16px * var(--pb-template-text-scale, 1)); color: var(--pb-color-neutral-300); margin-top: 4px; }
  .col-chart { flex: 1.2; background: linear-gradient(rgba(255,255,255,0.04), rgba(255,255,255,0.04)), var(--pb-color-primary); border: 1px solid rgba(255,255,255,0.08); border-radius: 16px; padding: 24px; display: flex; flex-direction: column; }
  .chart-title { font-family: var(--pb-font-body); font-size: calc(18px * var(--pb-template-text-scale, 1)); color: var(--pb-color-neutral-300); margin-bottom: 12px; }
  .col-chart svg { width: 100%; height: auto; display: block; flex: 1; }
  .col-chart svg text { font-family: var(--pb-font-heading), 'Inter', sans-serif; }
  .chart-note { font-family: var(--pb-font-heading); font-size: calc(17px * var(--pb-template-text-scale, 1)); font-weight: 600; color: var(--pb-color-neutral-300); margin-top: 12px; }
  .card-footer { background: var(--pb-color-primary-light); padding: 20px 64px; display: flex; align-items: center; justify-content: space-between; position: relative; z-index: 1; }
  .footer-helpline { font-family: var(--pb-font-mono); font-weight: 700; font-size: calc(16px * var(--pb-template-text-scale, 1)); color: var(--pb-color-white); }
  .footer-legal { font-size: calc(13px * var(--pb-template-text-scale, 1)); color: var(--pb-color-neutral-300); font-family: var(--pb-font-body); }
</style>
  <link rel="stylesheet" href="brand-inject.css">
  </head>
<body>
<div class="social-card">
  <div class="card-header">
    <span class="card-logo"><span class="logo-play">Play</span><span class="logo-book">book</span></span>
    <span class="section-label">New Year</span>
  </div>
  <div class="card-body">
    <div class="headline">New year, same math.<br>One resolution that runs itself.</div>
    <div class="columns">
      <div class="col-tools">
        <div class="odds-item">
          <div class="odds-game">Set a deposit limit</div>
          <div class="odds-edge teal">10 sec</div>
          <div class="odds-note">That&#8217;s all it takes</div>
        </div>
        <div class="odds-item">
          <div class="odds-game">Add a session reminder</div>
          <div class="odds-edge teal">30 sec</div>
          <div class="odds-note">Set it once, done</div>
        </div>
      </div>
      <div class="col-chart">
        <div class="chart-title">The year ahead</div>
        <svg viewBox="0 40 480 260" fill="none">
          <line x1="20" y1="270" x2="460" y2="270" stroke="rgba(255,255,255,0.18)" stroke-width="2"/>
          <text x="20" y="292" font-family="Inter" font-weight="500" font-size="14" fill="var(--pb-color-neutral-300)">Jan</text>
          <text x="460" y="292" text-anchor="end" font-family="Inter" font-weight="500" font-size="14" fill="var(--pb-color-neutral-300)">Dec</text>
          <path d="M20 238 H440" stroke="var(--pb-color-accent)" stroke-width="2" stroke-linecap="round"/>
          <circle cx="440" cy="238" r="5" fill="var(--pb-color-accent)"/>
          <text x="440" y="222" text-anchor="end" font-family="Inter" font-weight="600" font-size="17" fill="var(--pb-color-accent)">House edge: same</text>
          <path d="M20 204 C 160 196, 300 152, 440 84" stroke="var(--pb-color-secondary)" stroke-width="2" stroke-linecap="round"/>
          <circle cx="440" cy="84" r="5" fill="var(--pb-color-secondary)"/>
          <text x="440" y="62" text-anchor="end" font-family="Inter" font-weight="600" font-size="17" fill="var(--pb-color-secondary)">Your Game IQ: up</text>
        </svg>
        <div class="chart-note">The math doesn&#8217;t do resolutions. You can.</div>
      </div>
    </div>
  </div>
  <div class="card-footer">
    <span class="footer-helpline">Free support 24/7: {{HELPLINE_NUMBER}}</span>
    <span class="footer-legal">{{AGE_DISCLAIMER}}</span>
  </div>
</div>
</body>
</html>
