<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800;900&family=Source+Sans+3:wght@300;400;600&family=Source+Code+Pro:wght@500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { margin: 0; padding: 0; background: transparent; }

    .display-screen {
      width: 1920px;
      height: 1080px;
      position: relative;
      background: linear-gradient(145deg, var(--pb-color-primary-dark), var(--pb-color-primary));
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .display-screen::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 8px;
      background: linear-gradient(90deg, var(--pb-color-accent), var(--pb-color-secondary));
    }

    .screen-header {
      padding: 48px 72px 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: relative;
      z-index: 1;
    }
    .screen-logo {
      font-family: var(--pb-font-heading);
      font-size: calc(44px * var(--pb-template-text-scale, 1));
      color: var(--pb-color-white);
    }
    .screen-logo .logo-play {
      font-weight: 800;
      letter-spacing: -0.02em;
    }
    .screen-logo .logo-book {
      font-weight: 300;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    .pillar-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
      font-family: var(--pb-font-heading);
      font-size: calc(26px * var(--pb-template-text-scale, 1));
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--pb-color-primary);
      background: var(--pb-color-secondary);
      padding: 12px 28px;
      border-radius: 100px;
    }

    .screen-body {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 0 72px;
      position: relative;
      z-index: 1;
    }
    .screen-headline {
      font-family: var(--pb-font-heading);
      font-size: calc(80px * var(--pb-template-text-scale, 1));
      font-weight: 800;
      line-height: 1.05;
      color: var(--pb-color-white);
      letter-spacing: -0.02em;
      margin-bottom: 56px;
    }

    .stats-row {
      display: flex;
      gap: 40px;
      margin-bottom: 48px;
      align-items: flex-end;
    }
    .stat-item {
      flex: 1;
      text-align: center;
      min-width: 0;
    }
    .stat-pct {
      font-family: var(--pb-font-heading);
      font-size: calc(160px * var(--pb-template-text-scale, 1));
      font-weight: 900;
      line-height: 1;
      letter-spacing: -0.03em;
      margin-bottom: 20px;
      white-space: nowrap;
    }
    .stat-pct.teal { color: var(--pb-color-secondary); }
    .stat-pct.white { color: var(--pb-color-white); }
    .stat-pct.orange { color: var(--pb-color-accent); }
    .stat-label {
      font-family: var(--pb-font-body);
      font-size: calc(28px * var(--pb-template-text-scale, 1));
      font-weight: 600;
      color: var(--pb-color-neutral-300);
      line-height: 1.3;
    }
    .body-line {
      font-family: var(--pb-font-body);
      font-size: calc(36px * var(--pb-template-text-scale, 1));
      color: var(--pb-color-neutral-300);
      text-align: center;
    }

    .helpline-strip {
      background: var(--pb-color-primary-light);
      padding: 24px 72px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      z-index: 1;
    }
    .helpline-text {
      font-family: var(--pb-font-mono);
      font-size: calc(32px * var(--pb-template-text-scale, 1));
      font-weight: 700;
      color: var(--pb-color-white);
    }

    .legal-strip {
      padding: 14px 72px;
      text-align: center;
      position: relative;
      z-index: 1;
    }
    .legal-text {
      font-family: var(--pb-font-body);
      font-size: calc(20px * var(--pb-template-text-scale, 1));
      color: var(--pb-color-neutral-500);
    }
  </style>
  <link rel="stylesheet" href="brand-inject.css">
  </head>
<body>
  <div class="display-screen">
    <div class="screen-header">
      <span class="screen-logo"><span class="logo-play">Play</span><span class="logo-book">book</span></span>
      <span class="pillar-badge">Open</span>
    </div>
    <div class="screen-body">
      <div class="screen-headline">Every game has math. Here's yours.</div>
      <div class="stats-row">
        <div class="stat-item">
          <div class="stat-pct teal">0.5%</div>
          <div class="stat-label">Blackjack (perfect play)</div>
        </div>
        <div class="stat-item">
          <div class="stat-pct white">5.26%</div>
          <div class="stat-label">Roulette</div>
        </div>
        <div class="stat-item">
          <div class="stat-pct orange">2&ndash;15%</div>
          <div class="stat-label">Slots</div>
        </div>
      </div>
      <div class="body-line">Same casino. Different math.</div>
    </div>
    <div class="helpline-strip">
      <span class="helpline-text">Free, confidential support 24/7: {{HELPLINE_NUMBER}}</span>
    </div>
    <div class="legal-strip">
      <span class="legal-text">{{AGE_DISCLAIMER}} {{GENERAL_DISCLAIMER}}</span>
    </div>
  </div>
</body>
</html>
