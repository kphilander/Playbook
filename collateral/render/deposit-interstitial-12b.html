<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=420">
<title>Deposit Interstitial — Limit Setting — Tier 1</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800;900&family=Source+Sans+3:wght@300;400;600&family=Source+Code+Pro:wght@500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { margin: 0; padding: 0; background: transparent; }

  .deposit-interstitial {
    width: 420px;
    height: 812px;
    background: var(--pb-color-primary);
    color: var(--pb-color-white);
    font-family: var(--pb-font-body);
    display: flex;
    flex-direction: column;
    position: relative;
  }
  .deposit-interstitial::after {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(var(--pb-grid-color, 255,255,255), var(--pb-grid-opacity, 0.02)) 1px, transparent 1px),
      linear-gradient(90deg, rgba(var(--pb-grid-color, 255,255,255), var(--pb-grid-opacity, 0.02)) 1px, transparent 1px);
    background-size: 60px 60px;
    pointer-events: none;
  }

  /* Accent bar */
  .accent-bar {
    height: 8px;
    background: linear-gradient(90deg, var(--pb-color-accent), var(--pb-color-secondary));
    flex-shrink: 0;
  }

  /* Header */
  .header {
    padding: 32px 32px 0;
  }
  .card-logo {
    font-family: var(--pb-font-heading);
    font-size: calc(24px * var(--pb-template-text-scale, 1));
  }
  .card-logo .logo-play {
    color: var(--pb-color-white);
    font-weight: 800;
    letter-spacing: -0.02em;
  }
  .card-logo .logo-book {
    color: var(--pb-color-secondary);
    font-weight: 300;
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  /* Content */
  .content {
    padding: 40px 32px 0;
    flex: 1;
    display: flex;
    flex-direction: column;
  }

  .heading {
    font-family: var(--pb-font-heading);
    font-weight: 800;
    font-size: calc(28px * var(--pb-template-text-scale, 1));
    color: var(--pb-color-white);
    line-height: 1.2;
    margin-bottom: 12px;
    letter-spacing: -0.01em;
  }
  .body-text {
    font-family: var(--pb-font-body);
    font-size: calc(17px * var(--pb-template-text-scale, 1));
    color: var(--pb-color-neutral-300);
    line-height: 1.6;
    margin-bottom: 32px;
  }

  /* Limit options — radio cards */
  .limit-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 36px;
  }
  .limit-option {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 16px 20px;
    border: 1.5px solid rgba(255,255,255,0.1);
    border-radius: 12px;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
  }
  .limit-option:hover {
    border-color: rgba(255,255,255,0.25);
  }
  .limit-option.selected {
    border-color: var(--pb-color-secondary);
    background: rgba(0,212,170,0.1);
  }
  .radio-circle {
    width: 22px;
    height: 22px;
    min-width: 22px;
    border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.3);
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .selected .radio-circle {
    border-color: var(--pb-color-secondary);
  }
  .radio-fill {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: transparent;
  }
  .selected .radio-fill {
    background: var(--pb-color-secondary);
  }
  .limit-label {
    font-family: var(--pb-font-heading);
    font-weight: 600;
    font-size: calc(16px * var(--pb-template-text-scale, 1));
    color: var(--pb-color-white);
  }

  /* CTA */
  .cta-button {
    display: block;
    width: 100%;
    padding: 16px;
    background: var(--pb-color-secondary);
    color: var(--pb-color-primary);
    font-family: var(--pb-font-heading);
    font-weight: 700;
    font-size: calc(16px * var(--pb-template-text-scale, 1));
    text-align: center;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    letter-spacing: 0.01em;
    margin-top: auto;
    margin-bottom: 16px;
  }

  .skip-link {
    text-align: center;
    font-family: var(--pb-font-heading);
    font-size: calc(14px * var(--pb-template-text-scale, 1));
    font-weight: 600;
    color: var(--pb-color-neutral-300);
    text-decoration: none;
    cursor: pointer;
    display: block;
    padding-bottom: 8px;
  }
  .skip-link:hover {
    color: var(--pb-color-white);
  }

  /* Footer */
  .footer {
    padding: 16px 32px 28px;
    text-align: center;
  }
  .footer-helpline {
    font-family: var(--pb-font-mono);
    font-weight: 600;
    font-size: calc(13px * var(--pb-template-text-scale, 1));
    color: var(--pb-color-neutral-300);
  }
</style>
  <link rel="stylesheet" href="brand-inject.css">
  </head>
<body>
<div class="deposit-interstitial">

  <div class="accent-bar"></div>

  <div class="header">
    <span class="card-logo"><span class="logo-play">Play</span><span class="logo-book">book</span></span>
  </div>

  <div class="content">
    <h1 class="heading">Before you deposit</h1>
    <p class="body-text">Setting a limit takes 10 seconds — pick your budget and you're set.</p>

    <div class="limit-list">
      <div class="limit-option">
        <div class="radio-circle"><div class="radio-fill"></div></div>
        <div class="limit-label">$50/week</div>
      </div>
      <div class="limit-option selected">
        <div class="radio-circle"><div class="radio-fill"></div></div>
        <div class="limit-label">$100/week</div>
      </div>
      <div class="limit-option">
        <div class="radio-circle"><div class="radio-fill"></div></div>
        <div class="limit-label">$200/week</div>
      </div>
      <div class="limit-option">
        <div class="radio-circle"><div class="radio-fill"></div></div>
        <div class="limit-label">Custom</div>
      </div>
    </div>

    <button class="cta-button">Set limit &amp; continue</button>
    <a class="skip-link">Skip for now</a>
  </div>

  <div class="footer">
    <span class="footer-helpline">24/7 Support: {{HELPLINE_NUMBER}}</span>
  </div>

</div>
</body>
</html>
