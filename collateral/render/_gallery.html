<style>
  :root {
    --bg: #0F1923;
    --bg-card: #1B2838;
    --bg-card-hover: #2A3F56;
    --text: #F5F5FA;
    --text-dim: #A8A8C0;
    --text-faint: #6B6B8A;
    --teal: #00D4AA;
    --orange: #FF6B35;
    --border: rgba(255,255,255,0.08);
    --thumb-w: 480px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  /* Sticky nav */
  .nav {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(15,25,35,0.95);
    backdrop-filter: blur(8px);
    border-bottom: 1px solid var(--border);
    padding: 16px 32px;
  }
  .nav-inner {
    max-width: 1600px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    gap: 24px;
    flex-wrap: wrap;
  }
  .nav-title {
    font-weight: 800;
    font-size: 18px;
    letter-spacing: -0.01em;
  }
  .nav-title .accent { color: var(--teal); font-weight: 300; text-transform: uppercase; letter-spacing: 0.08em; }
  .nav-count {
    font-family: 'Source Code Pro', monospace;
    font-size: 12px;
    color: var(--text-faint);
    margin-right: auto;
  }
  .nav a {
    color: var(--text-dim);
    text-decoration: none;
    font-size: 13px;
    font-weight: 600;
    padding: 6px 12px;
    border-radius: 6px;
    transition: background 0.15s, color 0.15s;
  }
  .nav a:hover {
    background: var(--bg-card);
    color: var(--text);
  }

  /* Section headers */
  .section {
    max-width: 1600px;
    margin: 0 auto;
    padding: 64px 32px 16px;
  }
  .section-header {
    display: flex;
    align-items: baseline;
    gap: 16px;
    margin-bottom: 32px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--border);
  }
  .section-title {
    font-size: 28px;
    font-weight: 800;
    letter-spacing: -0.02em;
  }
  .section-tier {
    font-family: 'Source Code Pro', monospace;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    padding: 4px 10px;
    border-radius: 100px;
  }
  .tier-1 { background: rgba(255,107,53,0.15); color: var(--orange); }
  .tier-2 { background: rgba(0,212,170,0.15); color: var(--teal); }
  .section-count {
    font-family: 'Source Code Pro', monospace;
    font-size: 12px;
    color: var(--text-faint);
    margin-left: auto;
  }

  /* Grid */
  .grid {
    display: flex;
    flex-wrap: wrap;
    gap: 32px;
    align-items: flex-start;
  }
  .item {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    transition: border-color 0.15s, transform 0.15s;
    flex: 0 0 auto;
  }
  .item:hover {
    border-color: rgba(0,212,170,0.3);
  }
  .item-meta {
    padding: 14px 18px;
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 12px;
    border-bottom: 1px solid var(--border);
  }
  .item-name {
    font-weight: 700;
    font-size: 13px;
    color: var(--text);
    font-family: 'Source Code Pro', monospace;
  }
  .item-dims {
    font-family: 'Source Code Pro', monospace;
    font-size: 11px;
    color: var(--text-faint);
    white-space: nowrap;
  }
  .item-frame {
    background: #000;
    overflow: hidden;
    position: relative;
  }
  .item-frame iframe {
    position: absolute;
    top: 0;
    left: 0;
    border: none;
    transform-origin: top left;
    background: white;
    display: block;
  }

  /* Open original link */
  .item-actions {
    padding: 10px 18px;
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: rgba(0,0,0,0.2);
  }
  .item-actions a {
    color: var(--teal);
    text-decoration: none;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }
  .item-actions a:hover {
    color: #33DDBB;
  }
  .item-tier {
    font-family: 'Source Code Pro', monospace;
    font-size: 10px;
    font-weight: 600;
    color: var(--text-faint);
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }

  /* Footer */
  footer {
    max-width: 1600px;
    margin: 64px auto;
    padding: 32px;
    text-align: center;
    color: var(--text-faint);
    font-size: 12px;
    font-family: 'Source Code Pro', monospace;
    border-top: 1px solid var(--border);
  }
</style>

<script>
// Render an item with iframe scaled to fit thumbnail dimensions
function item(file, w, h, tier) {
  // Cap both width and height so portrait/landscape templates fit nicely
  const maxW = 520;
  const maxH = 700;
  const scale = Math.min(1, maxW / w, maxH / h);
  const scaledW = Math.round(w * scale);
  const scaledH = Math.round(h * scale);
  return `
    <div class="item" style="width:${scaledW}px;">
      <div class="item-meta">
        <span class="item-name">${file}</span>
        <span class="item-dims">${w}×${h}</span>
      </div>
      <div class="item-frame" style="width:${scaledW}px;height:${scaledH}px;">
        <iframe src="${file}" style="width:${w}px;height:${h}px;transform:scale(${scale});"></iframe>
      </div>
      <div class="item-actions">
        <a href="${file}" target="_blank">Open original →</a>
        <span class="item-tier">${tier}</span>
      </div>
    </div>
  `;
}

function section(id, title, tier, items) {
  return `
    <section class="section" id="${id}">
      <div class="section-header">
        <h2 class="section-title">${title}</h2>
        ${tier ? `<span class="section-tier tier-${tier.replace('Tier ','')}">${tier}</span>` : ''}
        <span class="section-count">${items.length} templates</span>
      </div>
      <div class="grid">
        ${items.map(i => item(i[0], i[1], i[2], i[3] || tier || '')).join('')}
      </div>
    </section>
  `;
}
