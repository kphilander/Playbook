<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=420">
<title>قبل الإيداع — اختيار الحد</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800;900&family=Noto+Sans+Arabic:wght@300;400;600;700;800;900&family=Source+Code+Pro:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { margin: 0; padding: 0; background: transparent; }

  .deposit-interstitial {
    width: 420px;
    height: 812px;
    background: var(--pb-color-primary);
    color: var(--pb-color-white);
    font-family: var(--pb-font-body);
    display: flex;
    flex-direction: column;
    position: relative;
  }
  .accent-bar {
    height: 8px;
    background: linear-gradient(90deg, var(--pb-color-accent), var(--pb-color-secondary));
    flex-shrink: 0;
  }

  .header { padding: 32px 32px 0; }
  .card-logo {
    font-family: var(--pb-font-heading);
    font-size: calc(24px * var(--pb-template-text-scale, 1));
  }
  .card-logo .logo-play { color: var(--pb-color-white); font-weight: 800; letter-spacing: -0.02em; }
  .card-logo .logo-book { color: var(--pb-color-secondary); font-weight: 300; text-transform: uppercase; letter-spacing: 0.08em; }

  .content {
    padding: 40px 32px 0;
    flex: 1;
    display: flex;
    flex-direction: column;
  }

  .heading {
    font-family: var(--pb-font-heading);
    font-weight: 800;
    font-size: calc(30px * var(--pb-template-text-scale, 1));
    color: var(--pb-color-white);
    line-height: 1.5;
    margin-bottom: 14px;
  }
  .body-text {
    font-family: var(--pb-font-body);
    font-size: calc(18px * var(--pb-template-text-scale, 1));
    color: var(--pb-color-neutral-300);
    line-height: 1.8;
    margin-bottom: 32px;
  }

  .limit-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 36px;
  }
  .limit-option {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 18px 22px;
    border: 1.5px solid rgba(255,255,255,0.1);
    border-radius: 12px;
  }
  .limit-option.selected {
    border-color: var(--pb-color-secondary);
    background: rgba(0,212,170,0.1);
  }
  .radio-circle {
    width: 22px;
    height: 22px;
    min-width: 22px;
    border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.3);
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .selected .radio-circle { border-color: var(--pb-color-secondary); }
  .radio-fill {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: transparent;
  }
  .selected .radio-fill { background: var(--pb-color-secondary); }
  .limit-label {
    font-family: var(--pb-font-heading);
    font-weight: 600;
    font-size: calc(17px * var(--pb-template-text-scale, 1));
    color: var(--pb-color-white);
    line-height: 1.5;
  }

  .cta-button {
    display: block;
    width: 100%;
    padding: 16px;
    background: var(--pb-color-secondary);
    color: var(--pb-color-primary);
    font-family: var(--pb-font-heading);
    font-weight: 700;
    font-size: calc(17px * var(--pb-template-text-scale, 1));
    text-align: center;
    border: none;
    border-radius: 10px;
    margin-top: auto;
    margin-bottom: 16px;
  }

  .skip-link {
    text-align: center;
    font-family: var(--pb-font-heading);
    font-size: calc(16px * var(--pb-template-text-scale, 1));
    font-weight: 600;
    color: var(--pb-color-neutral-300);
    text-decoration: none;
    display: block;
    padding-bottom: 8px;
  }

  .footer {
    padding: 16px 32px 28px;
    text-align: center;
  }
  .footer-helpline {
    font-family: var(--pb-font-mono);
    font-weight: 700;
    font-size: calc(18px * var(--pb-template-text-scale, 1));
    color: var(--pb-color-neutral-300);
  }
</style>
  <link rel="stylesheet" href="brand-inject.css">
  <style>
    /* Locale-specific font cascade override — must come AFTER brand-inject.css to win */
    :root {
      --pb-font-heading: 'Inter', 'Noto Sans Arabic', system-ui, -apple-system, sans-serif;
      --pb-font-body: 'Inter', 'Noto Sans Arabic', system-ui, sans-serif;
    }
  </style>
  </head>
<body>
<div class="deposit-interstitial">

  <div class="accent-bar"></div>

  <div class="header">
    <span class="card-logo"><span class="logo-play">Play</span><span class="logo-book">book</span></span>
  </div>

  <div class="content">
    <h1 class="heading">قبل الإيداع</h1>
    <p class="body-text">ضبط الحد لا يستغرق سوى 10 ثوانٍ — اختيار الميزانية يكفي.</p>

    <div class="limit-list">
      <div class="limit-option">
        <div class="radio-circle"><div class="radio-fill"></div></div>
        <div class="limit-label">50 د.إ/أسبوع</div>
      </div>
      <div class="limit-option selected">
        <div class="radio-circle"><div class="radio-fill"></div></div>
        <div class="limit-label">100 د.إ/أسبوع</div>
      </div>
      <div class="limit-option">
        <div class="radio-circle"><div class="radio-fill"></div></div>
        <div class="limit-label">200 د.إ/أسبوع</div>
      </div>
      <div class="limit-option">
        <div class="radio-circle"><div class="radio-fill"></div></div>
        <div class="limit-label">قيمة مخصّصة</div>
      </div>
    </div>

    <button class="cta-button">ضبط الحد ومتابعة</button>
    <a class="skip-link">التخطي الآن</a>
  </div>

  <div class="footer">
    <span class="footer-helpline">دعم على مدار الساعة: {{HELPLINE_NUMBER}}</span>
  </div>

</div>
</body>
</html>
