<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800;900&family=Source+Sans+3:wght@300;400;600&family=Source+Code+Pro:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { margin: 0; background: transparent; }
  .social-card {
    width: 1080px; height: 1080px;
    background: var(--pb-color-primary);
    position: relative; overflow: hidden;
    display: flex; flex-direction: column;
  }
  .social-card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 8px;
    background: var(--pb-gradient-bar, linear-gradient(90deg, var(--pb-color-accent), var(--pb-color-secondary)));
  }
  .card-header { padding: 56px 64px 0; display: flex; align-items: center; justify-content: space-between; position: relative; z-index: 1; }
  .card-logo { font-family: var(--pb-font-heading); font-size: calc(32px * var(--pb-template-text-scale, 1)); }
  .card-logo .logo-play { color: var(--pb-color-white); font-weight: 800; letter-spacing: -0.02em; }
  .card-logo .logo-book { color: var(--pb-color-secondary); font-weight: 300; text-transform: uppercase; letter-spacing: 0.08em; }
  .card-pillar { font-family: var(--pb-font-heading); font-size: calc(18px * var(--pb-template-text-scale, 1)); font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--pb-color-primary); background: var(--pb-color-secondary); padding: 8px 22px; border-radius: 100px; display: inline-flex; align-items: center; justify-content: center; line-height: 1; }
  .card-body { flex: 1; display: flex; flex-direction: column; justify-content: center; padding: 0 64px; position: relative; z-index: 1; }
  .myth-label { font-family: var(--pb-font-heading); font-size: calc(16px * var(--pb-template-text-scale, 1)); font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: var(--pb-color-accent); margin-bottom: 20px; }
  .myth-statement { font-family: var(--pb-font-heading); font-size: calc(48px * var(--pb-template-text-scale, 1)); font-weight: 800; line-height: 1.15; color: var(--pb-color-white); margin-bottom: 32px; letter-spacing: -0.02em; }
  .myth-statement .strike { text-decoration: line-through; text-decoration-color: var(--pb-color-accent); text-decoration-thickness: 5px; color: var(--pb-color-neutral-300); }
  .body-row { display: flex; align-items: center; gap: 40px; }
  .body-text { flex: 1; }
  .fact-statement { font-family: var(--pb-font-body); font-size: calc(24px * var(--pb-template-text-scale, 1)); line-height: 1.55; color: var(--pb-color-neutral-300); }
  .fact-statement strong { color: var(--pb-color-secondary); font-weight: 600; }
  .donut-legend { margin-top: 36px; }
  .legend-item { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
  .legend-swatch { width: 16px; height: 16px; border-radius: 4px; }
  .legend-swatch.teal { background: var(--pb-color-secondary); }
  .legend-swatch.orange { background: var(--pb-color-accent); }
  .legend-text { font-family: var(--pb-font-body); font-size: calc(18px * var(--pb-template-text-scale, 1)); color: var(--pb-color-neutral-300); }
  .donut-wrap { width: 340px; flex-shrink: 0; }
  .donut-wrap svg { width: 100%; height: auto; display: block; }
  .donut-wrap svg text { font-family: var(--pb-font-heading), 'Inter', sans-serif; }
  .card-footer { background: var(--pb-color-primary-light); padding: 20px 64px; display: flex; align-items: center; justify-content: space-between; position: relative; z-index: 1; }
  .footer-helpline { font-family: var(--pb-font-mono); font-weight: 700; font-size: calc(16px * var(--pb-template-text-scale, 1)); color: var(--pb-color-white); }
  .footer-legal { font-size: calc(13px * var(--pb-template-text-scale, 1)); color: var(--pb-color-neutral-300); font-family: var(--pb-font-body); }
</style>
  <link rel="stylesheet" href="brand-inject.css">
  </head>
<body>
<div class="social-card">
  <div class="card-header">
    <span class="card-logo"><span class="logo-play">Play</span><span class="logo-book">book</span></span>
    <span class="card-pillar">Open</span>
  </div>
  <div class="card-body">
    <div class="myth-label">Myth vs. Math</div>
    <div class="myth-statement"><span class="strike">"Online slots are rigged"</span></div>
    <div class="body-row">
      <div class="body-text">
        <div class="fact-statement">Licensed online slots are <strong>independently tested</strong>. Most even show their payback.</div>
        <div class="donut-legend">
          <div class="legend-item"><span class="legend-swatch teal"></span><span class="legend-text">paid back to players</span></div>
          <div class="legend-item"><span class="legend-swatch orange"></span><span class="legend-text">the house edge</span></div>
        </div>
      </div>
      <div class="donut-wrap">
        <svg viewBox="0 0 240 240" fill="none">
          <circle cx="120" cy="120" r="88" stroke="rgba(255,255,255,0.06)" stroke-width="26"/>
          <g transform="rotate(-90 120 120)">
            <circle cx="120" cy="120" r="88" stroke="var(--pb-color-secondary)" stroke-width="26" stroke-dasharray="524 29" stroke-linecap="butt"/>
            <circle cx="120" cy="120" r="88" stroke="var(--pb-color-accent)" stroke-width="26" stroke-dasharray="23 530" stroke-dashoffset="-526" stroke-linecap="butt"/>
          </g>
          <text x="120" y="116" text-anchor="middle" font-family="Inter" font-weight="800" font-size="34" fill="var(--pb-color-white)">94&#8211;97%</text>
          <text x="120" y="144" text-anchor="middle" font-family="Inter" font-weight="600" font-size="13" fill="var(--pb-color-neutral-300)">typical payback</text>
        </svg>
      </div>
    </div>
  </div>
  <div class="card-footer">
    <span class="footer-helpline">Free support 24/7: {{HELPLINE_NUMBER}}</span>
    <span class="footer-legal">{{AGE_DISCLAIMER}}</span>
  </div>
</div>
</body>
</html>
