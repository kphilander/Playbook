<!DOCTYPE html>
<html lang="zh-Hans">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800;900&family=Noto+Sans+SC:wght@300;400;600;700;800;900&family=Source+Code+Pro:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { margin: 0; background: transparent; }
  .story-card {
    width: 1080px; height: 1920px;
    background: linear-gradient(180deg, var(--pb-color-primary), var(--pb-color-primary-dark));
    position: relative; overflow: hidden;
    display: flex; flex-direction: column;
  }
  .story-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 8px; background: linear-gradient(90deg, var(--pb-color-accent), var(--pb-color-secondary)); z-index: 2; }
  .story-header { padding: 48px 48px 0; display: flex; align-items: center; justify-content: space-between; position: relative; z-index: 1; }
  .story-logo { font-family: var(--pb-font-heading); font-size: calc(28px * var(--pb-template-text-scale, 1)); }
  .story-logo .logo-play { color: var(--pb-color-white); font-weight: 800; letter-spacing: -0.02em; }
  .story-logo .logo-book { color: var(--pb-color-secondary); font-weight: 300; text-transform: uppercase; letter-spacing: 0.08em; }
  .story-pillar { font-family: var(--pb-font-heading); font-size: calc(18px * var(--pb-template-text-scale, 1)); font-weight: 700; color: var(--pb-color-primary); background: var(--pb-color-secondary); padding: 8px 20px; border-radius: 100px; }
  .story-body { flex: 1; display: flex; flex-direction: column; justify-content: center; padding: 0 48px; position: relative; z-index: 1; }
  .eyebrow { font-family: var(--pb-font-heading); font-size: calc(18px * var(--pb-template-text-scale, 1)); font-weight: 700; color: var(--pb-color-secondary); margin-bottom: 20px; }
  .headline { font-family: var(--pb-font-heading); font-size: calc(52px * var(--pb-template-text-scale, 1)); font-weight: 700; line-height: 1.3; color: var(--pb-color-white); margin-bottom: 40px; }
  .quiz-box { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 20px; padding: 36px; margin-bottom: 40px; text-align: center; }
  .quiz-box .question { font-family: var(--pb-font-heading); font-weight: 600; font-size: calc(28px * var(--pb-template-text-scale, 1)); color: var(--pb-color-white); line-height: 1.7; margin-bottom: 24px; }
  .quiz-box .answer-label { font-family: var(--pb-font-heading); font-size: calc(16px * var(--pb-template-text-scale, 1)); font-weight: 700; color: var(--pb-color-accent); margin-bottom: 12px; }
  .quiz-box .answer { font-family: var(--pb-font-body); font-size: calc(24px * var(--pb-template-text-scale, 1)); color: var(--pb-color-neutral-300); line-height: 1.7; }
  .quiz-box .answer strong { color: var(--pb-color-secondary); font-weight: 600; }
  .breakdown-visual { display: flex; gap: 16px; margin-bottom: 40px; }
  .money-block { flex: 1; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 16px; padding: 24px; text-align: center; }
  .money-label { font-family: var(--pb-font-body); font-size: calc(20px * var(--pb-template-text-scale, 1)); color: var(--pb-color-neutral-300); margin-bottom: 8px; line-height: 1.5; }
  .money-value { font-family: var(--pb-font-mono); font-size: calc(36px * var(--pb-template-text-scale, 1)); font-weight: 700; }
  .money-value.green { color: var(--pb-color-secondary); }
  .money-value.white { color: var(--pb-color-white); }
  .money-value.orange { color: var(--pb-color-accent); }
  .money-note { font-family: var(--pb-font-body); font-size: calc(15px * var(--pb-template-text-scale, 1)); color: var(--pb-color-neutral-500); margin-top: 6px; line-height: 1.5; }
  .story-cta { display: block; width: 100%; padding: 24px; background: var(--pb-color-secondary); color: var(--pb-color-primary); font-family: var(--pb-font-heading); font-weight: 700; font-size: calc(24px * var(--pb-template-text-scale, 1)); text-align: center; border-radius: 16px; text-decoration: none; }
  .story-footer { background: var(--pb-color-primary-light); padding: 24px 48px; text-align: center; position: relative; z-index: 1; }
  .footer-helpline { font-family: var(--pb-font-mono); font-weight: 700; font-size: calc(16px * var(--pb-template-text-scale, 1)); color: var(--pb-color-white); }
</style>
  <link rel="stylesheet" href="brand-inject.css">
  <style>
    /* Locale-specific font cascade override — must come AFTER brand-inject.css to win */
    :root {
      --pb-font-heading: 'Inter', 'Noto Sans SC', system-ui, -apple-system, sans-serif;
      --pb-font-body: 'Inter', 'Noto Sans SC', system-ui, sans-serif;
    }
  </style>
  </head>
<body>
<div class="story-card">
  <div class="story-header">
    <span class="story-logo"><span class="logo-play">Play</span><span class="logo-book">book</span></span>
    
  </div>
  <div class="story-body">
    <div class="eyebrow">每周测验</div>
    <div class="headline">体育博彩中的 −110 是什么意思？</div>
    <div class="breakdown-visual">
      <div class="money-block">
        <div class="money-label">投注</div>
        <div class="money-value green">澳门币 110</div>
      </div>
      <div class="money-block">
        <div class="money-label">赢取</div>
        <div class="money-value white">澳门币 100</div>
      </div>
      <div class="money-block">
        <div class="money-label">抽成</div>
        <div class="money-value orange">澳门币 10</div>
        <div class="money-note">约 4.5% 抽成</div>
      </div>
    </div>
    <div class="quiz-box">
      <div class="answer-label">答案</div>
      <div class="answer"><strong>投注澳门币 110，赢取澳门币 100</strong>。差额的澳门币 10 即博彩公司的抽成，每一次投注均是如此。</div>
    </div>
    <a href="#" class="story-cta">了解每条盘口背后的数据</a>
  </div>
  <div class="story-footer">
    <span class="footer-helpline">24小时免费保密支援：{{HELPLINE_NUMBER}}</span>
  </div>
</div>
</body>
</html>
