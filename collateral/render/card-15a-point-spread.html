<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800;900&family=Source+Sans+3:wght@300;400;600&family=Source+Code+Pro:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { margin: 0; background: transparent; }
  .social-card {
    width: 1080px; height: 1080px;
    background: linear-gradient(145deg, var(--pb-color-primary-dark), var(--pb-color-primary));
    position: relative; overflow: hidden;
    display: flex; flex-direction: column;
  }
  .social-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 8px; background: linear-gradient(90deg, var(--pb-color-accent), var(--pb-color-secondary)); }
  .card-header { padding: 56px 64px 0; display: flex; align-items: center; justify-content: space-between; position: relative; z-index: 1; }
  .card-logo { font-family: var(--pb-font-heading); font-size: calc(32px * var(--pb-template-text-scale, 1)); }
  .card-logo .logo-play { color: var(--pb-color-white); font-weight: 800; letter-spacing: -0.02em; }
  .card-logo .logo-book { color: var(--pb-color-secondary); font-weight: 300; text-transform: uppercase; letter-spacing: 0.08em; }
  .section-label { font-family: var(--pb-font-heading); font-size: calc(16px * var(--pb-template-text-scale, 1)); font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: var(--pb-color-accent); }
  .card-body { flex: 1; display: flex; flex-direction: column; justify-content: center; padding: 0 64px; position: relative; z-index: 1; }
  .eyebrow { font-family: var(--pb-font-heading); font-size: calc(20px * var(--pb-template-text-scale, 1)); font-weight: 700; text-transform: uppercase; letter-spacing: 0.12em; color: var(--pb-color-secondary); margin-bottom: 24px; }
  .headline { font-family: var(--pb-font-heading); font-size: calc(56px * var(--pb-template-text-scale, 1)); font-weight: 800; line-height: 1.1; color: var(--pb-color-white); margin-bottom: 32px; letter-spacing: -0.02em; }
  .body-text { font-family: var(--pb-font-body); font-size: calc(26px * var(--pb-template-text-scale, 1)); line-height: 1.5; color: var(--pb-color-neutral-300); margin-bottom: 48px; }
  .hero-stat { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 20px; padding: 40px 36px; text-align: center; }
  .hero-stat .big { font-family: var(--pb-font-mono); font-size: calc(108px * var(--pb-template-text-scale, 1)); font-weight: 700; line-height: 1; color: var(--pb-color-secondary); letter-spacing: -0.02em; }
  .hero-stat .label { font-family: var(--pb-font-body); font-size: calc(22px * var(--pb-template-text-scale, 1)); color: var(--pb-color-neutral-300); margin-top: 16px; }
  .card-footer { background: var(--pb-color-primary-light); padding: 20px 64px; display: flex; align-items: center; justify-content: space-between; position: relative; z-index: 1; }
  .footer-helpline { font-family: var(--pb-font-mono); font-weight: 700; font-size: calc(16px * var(--pb-template-text-scale, 1)); color: var(--pb-color-white); }
  .footer-legal { font-size: calc(13px * var(--pb-template-text-scale, 1)); color: var(--pb-color-neutral-300); font-family: var(--pb-font-body); }
</style>
  <link rel="stylesheet" href="brand-inject.css">
  </head>
<body>
<div class="social-card">
  <div class="card-header">
    <span class="card-logo"><span class="logo-play">Play</span><span class="logo-book">book</span></span>
    <span class="section-label">Open</span>
  </div>
  <div class="card-body">
    <div class="eyebrow">Sports math</div>
    <div class="headline">The point spread, explained.</div>
    <div class="body-text">The spread isn't a guess at who will win. It's how the sportsbook gets bets on both teams.</div>
    <div class="hero-stat">
      <div class="big">$1.10</div>
      <div class="label">to win $1, either side</div>
    </div>
  </div>
  <div class="card-footer">
    <span class="footer-helpline">Free support 24/7: {{HELPLINE_NUMBER}}</span>
    <span class="footer-legal">{{AGE_DISCLAIMER}}</span>
  </div>
</div>
</body>
</html>
