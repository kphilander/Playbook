<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800;900&family=Noto+Sans+JP:wght@300;400;600;700;800;900&family=Source+Code+Pro:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { margin: 0; padding: 24px; background: var(--pb-color-primary); }
  .poster {
    width: 1800px; height: 2400px;
    background: linear-gradient(180deg, var(--pb-color-primary), var(--pb-color-primary-dark));
    position: relative; overflow: hidden;
    display: flex; flex-direction: column;
  }
  .poster::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 12px; background: linear-gradient(90deg, var(--pb-color-accent), var(--pb-color-secondary)); z-index: 2; }
  .poster-header { padding: 72px 96px 0; display: flex; align-items: center; justify-content: space-between; position: relative; z-index: 1; }
  .poster-logo { font-family: var(--pb-font-heading); font-size: calc(48px * var(--pb-template-text-scale, 1)); }
  .poster-logo .logo-play { color: var(--pb-color-white); font-weight: 800; letter-spacing: -0.02em; }
  .poster-logo .logo-book { color: var(--pb-color-secondary); font-weight: 300; text-transform: uppercase; letter-spacing: 0.08em; }
  .section-label { font-family: var(--pb-font-heading); font-size: calc(24px * var(--pb-template-text-scale, 1)); font-weight: 700; color: var(--pb-color-accent); }
  .poster-body { flex: 1; display: flex; flex-direction: column; justify-content: center; padding: 0 96px; position: relative; z-index: 1; }
  .eyebrow { font-family: var(--pb-font-heading); font-size: calc(24px * var(--pb-template-text-scale, 1)); font-weight: 700; color: var(--pb-color-secondary); margin-bottom: 28px; }
  .headline { font-family: var(--pb-font-heading); font-size: calc(82px * var(--pb-template-text-scale, 1)); font-weight: 700; line-height: 1.3; color: var(--pb-color-white); margin-bottom: 24px; }
  .headline .teal { color: var(--pb-color-secondary); }
  .subhead { font-family: var(--pb-font-body); font-size: calc(36px * var(--pb-template-text-scale, 1)); line-height: 1.7; color: var(--pb-color-neutral-300); margin-bottom: 56px; }
  .edge-list { display: flex; flex-direction: column; gap: 20px; margin-bottom: 56px; }
  .edge-row { display: flex; align-items: center; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 20px; padding: 28px 36px; gap: 32px; }
  .edge-bar-wrap { flex: 1; }
  .edge-game { font-family: var(--pb-font-heading); font-size: calc(28px * var(--pb-template-text-scale, 1)); font-weight: 700; color: var(--pb-color-white); margin-bottom: 12px; line-height: 1.5; }
  .edge-bar { height: 20px; border-radius: 10px; }
  .edge-bar.low { width: 10%; background: var(--pb-color-secondary); }
  .edge-bar.mid { width: 28%; background: var(--pb-color-white); }
  .edge-bar.high { width: 53%; background: var(--pb-color-accent); }
  .edge-bar.var { width: 75%; background: linear-gradient(90deg, var(--pb-color-accent), var(--pb-color-accent) 30%, rgba(255,107,53,0.3)); }
  .edge-pct { font-family: var(--pb-font-mono); font-size: calc(42px * var(--pb-template-text-scale, 1)); font-weight: 700; min-width: 180px; text-align: right; }
  .edge-pct.teal { color: var(--pb-color-secondary); }
  .edge-pct.white { color: var(--pb-color-white); }
  .edge-pct.orange { color: var(--pb-color-accent); }
  .callout { background: rgba(255,107,53,0.08); border: 2px solid var(--pb-color-accent); border-radius: 20px; padding: 40px; text-align: center; margin-bottom: 56px; }
  .callout-number { font-family: var(--pb-font-heading); font-size: calc(78px * var(--pb-template-text-scale, 1)); font-weight: 900; color: var(--pb-color-accent); line-height: 1; margin-bottom: 12px; }
  .callout-text { font-family: var(--pb-font-body); font-size: calc(30px * var(--pb-template-text-scale, 1)); color: var(--pb-color-neutral-300); line-height: 1.7; }
  .callout-text strong { color: var(--pb-color-white); font-weight: 600; }
  .poster-cta { display: block; width: 100%; padding: 36px; background: var(--pb-color-secondary); color: var(--pb-color-primary); font-family: var(--pb-font-heading); font-weight: 700; font-size: calc(34px * var(--pb-template-text-scale, 1)); text-align: center; border-radius: 20px; text-decoration: none; }
  .poster-footer { background: var(--pb-color-primary-light); padding: 48px 96px; display: flex; align-items: center; justify-content: space-between; gap: 32px; position: relative; z-index: 1; }
  .footer-helpline { font-family: var(--pb-font-mono); font-weight: 700; font-size: calc(42px * var(--pb-template-text-scale, 1)); color: var(--pb-color-white); }
  .footer-legal { font-family: var(--pb-font-body); font-size: calc(24px * var(--pb-template-text-scale, 1)); color: var(--pb-color-neutral-300); }
</style>
  <link rel="stylesheet" href="brand-inject.css">
  <style>
    /* Locale-specific font cascade override — must come AFTER brand-inject.css to win */
    :root {
      --pb-font-heading: 'Inter', 'Noto Sans JP', system-ui, -apple-system, sans-serif;
      --pb-font-body: 'Inter', 'Noto Sans JP', system-ui, sans-serif;
    }
  </style>
  </head>
<body>
<div class="poster">
  <div class="poster-header">
    <span class="poster-logo"><span class="logo-play">Play</span><span class="logo-book">book</span></span>
    <span class="section-label">本当の確率</span>
  </div>
  <div class="poster-body">
    <div class="eyebrow">但し書きはありません</div>
    <div class="headline">すべてのゲームには<span class="teal">ハウスエッジ</span>があります。<br>実際の数値をご紹介します。</div>
    <div class="subhead">長期的にハウスが受け取る割合のことです。ゲームごとの比較をご覧ください。</div>
    <div class="edge-list">
      <div class="edge-row">
        <div class="edge-bar-wrap">
          <div class="edge-game">ブラックジャック（基本戦略）</div>
          <div class="edge-bar low"></div>
        </div>
        <div class="edge-pct teal">0.5%</div>
      </div>
      <div class="edge-row">
        <div class="edge-bar-wrap">
          <div class="edge-game">クラップス（パス／ドント・パス）</div>
          <div class="edge-bar mid" style="width: 14%;"></div>
        </div>
        <div class="edge-pct white">1.4%</div>
      </div>
      <div class="edge-row">
        <div class="edge-bar-wrap">
          <div class="edge-game">アメリカンルーレット</div>
          <div class="edge-bar high"></div>
        </div>
        <div class="edge-pct orange">5.26%</div>
      </div>
      <div class="edge-row">
        <div class="edge-bar-wrap">
          <div class="edge-game">スロット</div>
          <div class="edge-bar var"></div>
        </div>
        <div class="edge-pct orange">2〜15%</div>
      </div>
    </div>
    <div class="callout">
      <div class="callout-number">526円</div>
      <div class="callout-text">アメリカンルーレットでは、<strong>10,000円の賭けにつき</strong>、平均して約526円がハウスに渡ります。</div>
    </div>
    <a href="#" class="poster-cta">詳細を確認する</a>
  </div>
  <div class="poster-footer">
    <span class="footer-helpline">秘密厳守・24時間無料サポート：{{HELPLINE_NUMBER}}</span>
    <span class="footer-legal">{{AGE_DISCLAIMER}}</span>
  </div>
</div>
</body>
</html>
