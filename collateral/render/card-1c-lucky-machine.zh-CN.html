<!DOCTYPE html>
<html lang="zh-Hans">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800;900&family=Noto+Sans+SC:wght@300;400;600;700;800;900&family=Source+Code+Pro:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { margin: 0; background: transparent; }
  .social-card {
    width: 1080px; height: 1080px;
    background: var(--pb-color-primary);
    position: relative; overflow: hidden;
    display: flex; flex-direction: column;
  }
  .social-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 8px; background: linear-gradient(90deg, var(--pb-color-accent), var(--pb-color-secondary)); }
  .card-header { padding: 56px 64px 0; display: flex; align-items: center; justify-content: space-between; position: relative; z-index: 1; }
  .card-logo { font-family: var(--pb-font-heading); font-size: calc(32px * var(--pb-template-text-scale, 1)); }
  .card-logo .logo-play { color: var(--pb-color-white); font-weight: 800; letter-spacing: -0.02em; }
  .card-logo .logo-book { color: var(--pb-color-secondary); font-weight: 300; text-transform: uppercase; letter-spacing: 0.08em; }
  .card-pillar { font-family: var(--pb-font-heading); font-size: calc(18px * var(--pb-template-text-scale, 1)); font-weight: 700; color: var(--pb-color-primary); background: var(--pb-color-secondary); padding: 8px 22px; border-radius: 100px; display: inline-flex; align-items: center; justify-content: center; line-height: 1; }
  .card-body { flex: 1; display: flex; flex-direction: column; justify-content: center; padding: 0 64px; position: relative; z-index: 1; }
  .myth-label { font-family: var(--pb-font-heading); font-size: calc(16px * var(--pb-template-text-scale, 1)); font-weight: 700; color: var(--pb-color-accent); margin-bottom: 20px; }
  .myth-intro { font-family: var(--pb-font-body); font-size: calc(24px * var(--pb-template-text-scale, 1)); font-weight: 400; color: var(--pb-color-neutral-300); margin-bottom: 12px; line-height: 1.7; }
  .myth-statement { font-family: var(--pb-font-heading); font-size: calc(48px * var(--pb-template-text-scale, 1)); font-weight: 700; line-height: 1.3; color: var(--pb-color-white); margin-bottom: 32px; }
  .fact-statement { font-family: var(--pb-font-body); font-size: calc(30px * var(--pb-template-text-scale, 1)); line-height: 1.7; color: var(--pb-color-neutral-300); margin-bottom: 32px; }
  .fact-statement strong { color: var(--pb-color-secondary); font-weight: 600; }
  .share-prompt { font-family: var(--pb-font-heading); font-size: calc(22px * var(--pb-template-text-scale, 1)); font-weight: 600; color: var(--pb-color-white); margin-top: 8px; line-height: 1.6; }
  .share-prompt span { color: var(--pb-color-accent); }
  .stat-row { display: flex; gap: 16px; margin-top: 32px; }
  .stat-card { flex: 1; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; padding: 20px; text-align: center; }
  .stat-card .game { font-family: var(--pb-font-body); font-size: calc(18px * var(--pb-template-text-scale, 1)); color: var(--pb-color-neutral-300); margin-bottom: 8px; line-height: 1.5; }
  .stat-card .edge { font-family: var(--pb-font-heading); font-size: calc(34px * var(--pb-template-text-scale, 1)); font-weight: 800; letter-spacing: -0.02em; }
  .stat-card .edge.teal { color: var(--pb-color-secondary); }
  .stat-card .edge.orange { color: var(--pb-color-accent); }
  .card-footer { background: var(--pb-color-primary-light); padding: 20px 64px; display: flex; align-items: center; justify-content: space-between; position: relative; z-index: 1; }
  .footer-helpline { font-family: var(--pb-font-mono); font-weight: 700; font-size: calc(16px * var(--pb-template-text-scale, 1)); color: var(--pb-color-white); }
  .footer-legal { font-size: calc(13px * var(--pb-template-text-scale, 1)); color: var(--pb-color-neutral-300); font-family: var(--pb-font-body); }
</style>
  <link rel="stylesheet" href="brand-inject.css">
  <style>
    /* Locale-specific font cascade override — must come AFTER brand-inject.css to win */
    :root {
      --pb-font-heading: 'Inter', 'Noto Sans SC', system-ui, -apple-system, sans-serif;
      --pb-font-body: 'Inter', 'Noto Sans SC', system-ui, sans-serif;
    }
  </style>
  </head>
<body>
<div class="social-card">
  <div class="card-header">
    <span class="card-logo"><span class="logo-play">Play</span><span class="logo-book">book</span></span>
    
  </div>
  <div class="card-body">
    <div class="myth-label">误区与数字</div>
    <div class="myth-intro">有些玩家认为：</div>
    <div class="myth-statement">「我的幸运机器对我有感觉」</div>
    <div class="fact-statement">事实上，每一次旋转均由<strong>随机数生成器</strong>决定。机器不会识别玩家，也不会记住上一次的结果。</div>
    <div class="stat-row">
      <div class="stat-card">
        <div class="game">老虎机庄家优势</div>
        <div class="edge orange">2-15%</div>
      </div>
      <div class="stat-card">
        <div class="game">随机数生成器的记忆</div>
        <div class="edge teal">0</div>
      </div>
    </div>
    <div class="share-prompt">欢迎将此资讯转发给身边的朋友。</div>
  </div>
  <div class="card-footer">
    <span class="footer-helpline">24小时免费保密支援：{{HELPLINE_NUMBER}}</span>
    <span class="footer-legal">{{AGE_DISCLAIMER}}</span>
  </div>
</div>
</body>
</html>
