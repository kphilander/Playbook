<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ATM Area Sign — A4</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800;900&family=Source+Sans+3:wght@300;400;600&family=Source+Code+Pro:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { margin: 0; padding: 24px; background: var(--pb-color-primary); }

  .sign-atm {
    width: 700px;
    height: 1000px;
    background: var(--pb-color-primary);
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    font-family: var(--pb-font-body);
  }
  .sign-atm::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 6px;
    background: var(--pb-gradient-bar, linear-gradient(90deg, var(--pb-color-accent), var(--pb-color-secondary)));
  }
  .sign-header {
    padding: 40px 48px 0;
    position: relative;
    z-index: 1;
  }
  .card-logo { font-family: var(--pb-font-heading); font-size: calc(34px * var(--pb-template-text-scale, 1)); }
  .card-logo .logo-play { color: var(--pb-color-white); font-weight: 800; letter-spacing: -0.02em; }
  .card-logo .logo-book { color: var(--pb-color-secondary); font-weight: 300; text-transform: uppercase; letter-spacing: 0.08em; }

  .sign-content {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 0 48px;
    position: relative;
    z-index: 1;
  }
  .sign-headline {
    font-family: var(--pb-font-heading);
    font-weight: 800;
    font-size: calc(54px * var(--pb-template-text-scale, 1));
    color: var(--pb-color-white);
    line-height: 1.1;
    letter-spacing: -0.02em;
    margin-bottom: 28px;
  }
  .sign-body {
    font-size: calc(28px * var(--pb-template-text-scale, 1));
    color: var(--pb-color-neutral-300);
    line-height: 1.45;
    margin-bottom: 44px;
    max-width: 600px;
  }

  .tool-highlight {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 16px;
    padding: 28px 32px;
    margin-bottom: 32px;
  }
  .tool-highlight-label {
    font-family: var(--pb-font-heading);
    font-weight: 700;
    font-size: calc(20px * var(--pb-template-text-scale, 1));
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--pb-color-secondary);
    margin-bottom: 12px;
  }
  .tool-highlight-stat {
    font-family: var(--pb-font-heading);
    font-weight: 800;
    font-size: calc(52px * var(--pb-template-text-scale, 1));
    color: var(--pb-color-white);
    line-height: 1;
    margin-bottom: 12px;
  }
  .tool-highlight-body {
    font-size: calc(24px * var(--pb-template-text-scale, 1));
    color: var(--pb-color-neutral-300);
    line-height: 1.45;
  }

  .qr-block {
    display: flex;
    align-items: center;
    gap: 16px;
    position: relative;
    z-index: 1;
  }
  .qr-placeholder {
    width: 140px;
    height: 140px;
    background: var(--pb-color-white);
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--pb-font-mono);
    font-size: calc(14px * var(--pb-template-text-scale, 1));
    color: var(--pb-color-neutral-500);
    font-weight: 600;
  }
  .qr-text {
    font-family: var(--pb-font-heading);
    font-weight: 600;
    font-size: calc(24px * var(--pb-template-text-scale, 1));
    color: var(--pb-color-neutral-300);
    line-height: 1.3;
  }

  .sign-footer {
    background: var(--pb-color-primary-light);
    padding: 28px 48px;
    position: relative;
    z-index: 1;
  }
  .footer-helpline {
    font-family: var(--pb-font-mono);
    font-weight: 700;
    font-size: calc(26px * var(--pb-template-text-scale, 1));
    color: var(--pb-color-white);
    margin-bottom: 6px;
    line-height: 1.25;
  }
  .footer-legal {
    font-size: calc(18px * var(--pb-template-text-scale, 1));
    color: var(--pb-color-neutral-300);
  }
</style>
  <link rel="stylesheet" href="brand-inject.css">
  </head>
<body>
<div class="sign-atm">

  <div class="sign-header">
    <span class="card-logo"><span class="logo-play">Play</span><span class="logo-book">book</span></span>
  </div>

  <div class="sign-content">
    <div class="sign-headline">Set your budget first.</div>
    <div class="sign-body">Deposit limits take 10 seconds. Your money. Your rules.</div>

    <div class="tool-highlight">
      <div class="tool-highlight-label">Deposit limits</div>
      <div class="tool-highlight-stat">10 seconds</div>
      <div class="tool-highlight-body">Weekly or monthly. Adjust anytime.</div>
    </div>

    <div class="qr-block">
      <div class="qr-placeholder">QR Code</div>
      <div class="qr-text">Scan to set your deposit limit</div>
    </div>
  </div>

  <div class="sign-footer">
    <div class="footer-helpline">Free, confidential support: {{HELPLINE_NUMBER}}</div>
    <div class="footer-legal">{{AGE_DISCLAIMER}}</div>
  </div>

</div>
</body>
</html>
