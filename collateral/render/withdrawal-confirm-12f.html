<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=420">
<title>Withdrawal Confirmation — Tier 2</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800;900&family=Source+Sans+3:wght@300;400;600&family=Source+Code+Pro:wght@500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { margin: 0; padding: 0; background: transparent; }

  .withdrawal-confirm {
    width: 420px;
    min-height: 812px;
    background: var(--pb-color-white);
    font-family: var(--pb-font-body);
    color: var(--pb-color-primary);
    display: flex;
    flex-direction: column;
  }

  /* 3px teal top bar */
  .accent-bar {
    height: 3px;
    background: var(--pb-color-secondary);
    flex-shrink: 0;
  }

  /* Content */
  .content {
    flex: 1;
    padding: 48px 32px 32px;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
  }

  /* Logo */
  .logo {
    font-family: var(--pb-font-heading);
    font-size: calc(22px * var(--pb-template-text-scale, 1));
    margin-bottom: 40px;
    line-height: 1;
  }
  .logo .logo-play {
    font-weight: 800;
    letter-spacing: -0.02em;
    color: var(--pb-color-primary);
  }
  .logo .logo-book {
    font-weight: 300;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--pb-color-secondary);
  }

  /* Checkmark circle */
  .check-circle {
    width: 72px;
    height: 72px;
    border-radius: 50%;
    background: var(--pb-color-success);
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 28px;
  }
  .check-icon {
    color: var(--pb-color-white);
  }
  .check-icon svg {
    width: 36px;
    height: 36px;
  }

  .heading {
    font-family: var(--pb-font-heading);
    font-weight: 800;
    font-size: calc(26px * var(--pb-template-text-scale, 1));
    color: var(--pb-color-primary);
    margin-bottom: 16px;
    line-height: 1.2;
    letter-spacing: -0.01em;
  }

  .amount {
    font-family: var(--pb-font-mono);
    font-weight: 600;
    font-size: calc(32px * var(--pb-template-text-scale, 1));
    color: var(--pb-color-primary);
    margin-bottom: 12px;
    line-height: 1.2;
  }

  .subhead {
    font-size: calc(16px * var(--pb-template-text-scale, 1));
    color: var(--pb-color-neutral-700);
    line-height: 1.6;
    margin-bottom: 32px;
    max-width: 340px;
  }

  /* Divider */
  .divider {
    width: 100%;
    max-width: 340px;
    height: 1px;
    background: var(--pb-color-neutral-100);
    margin-bottom: 24px;
  }

  /* Session section */
  .section-label {
    font-family: var(--pb-font-heading);
    font-size: calc(14px * var(--pb-template-text-scale, 1));
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--pb-color-neutral-500);
    margin-bottom: 16px;
  }

  .stats-row {
    font-family: var(--pb-font-mono);
    font-weight: 500;
    font-size: calc(15px * var(--pb-template-text-scale, 1));
    color: var(--pb-color-primary);
    margin-bottom: 32px;
    line-height: 1.5;
  }
  .stats-row .stat-sep {
    color: var(--pb-color-neutral-300);
    margin: 0 6px;
  }

  /* Helpline block */
  .helpline-block {
    background: var(--pb-color-neutral-50);
    border-radius: 10px;
    padding: 18px 24px;
    width: 100%;
    max-width: 340px;
    margin-bottom: 28px;
    text-align: center;
  }
  .helpline-label {
    font-family: var(--pb-font-heading);
    font-size: calc(12px * var(--pb-template-text-scale, 1));
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--pb-color-neutral-500);
    margin-bottom: 6px;
  }
  .helpline-number {
    font-family: var(--pb-font-mono);
    font-weight: 600;
    font-size: calc(18px * var(--pb-template-text-scale, 1));
    color: var(--pb-color-primary);
  }
  .helpline-channels {
    font-size: calc(13px * var(--pb-template-text-scale, 1));
    color: var(--pb-color-neutral-500);
    margin-top: 4px;
  }

  /* Done button */
  .done-button {
    display: block;
    width: 100%;
    max-width: 340px;
    padding: 16px;
    background: var(--pb-color-secondary);
    color: var(--pb-color-primary);
    font-family: var(--pb-font-heading);
    font-weight: 700;
    font-size: calc(16px * var(--pb-template-text-scale, 1));
    text-align: center;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    letter-spacing: 0.01em;
  }
</style>
  <link rel="stylesheet" href="brand-inject.css">
  </head>
<body>
<div class="withdrawal-confirm">

  <div class="accent-bar"></div>

  <div class="content">
    <div class="logo">
      <span class="logo-play">Play</span><span class="logo-book">book</span>
    </div>

    <div class="check-circle">
      <span class="check-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><g stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="4"/></g><g stroke-width="1"><polyline points="8 12 11 15 16 9"/></g></svg></span>
    </div>

    <h1 class="heading">Withdrawal confirmed</h1>
    <div class="amount">$150.00</div>
    <p class="subhead">Your balance will be in your account within 24 hours.</p>

    <div class="divider"></div>

    <div class="section-label">Your session</div>
    <div class="stats-row">
      Duration: 45m<span class="stat-sep">&middot;</span>Wagered: $80<span class="stat-sep">&middot;</span>Net: +$70
    </div>

    <div class="helpline-block">
      <div class="helpline-label">24/7 Support</div>
      <div class="helpline-number">{{HELPLINE_NUMBER}}</div>
      <div class="helpline-channels">{{TEXT_NUMBER}} &middot; Chat {{CHAT_URL}}</div>
    </div>

    <button class="done-button">Done</button>
  </div>

</div>
</body>
</html>
