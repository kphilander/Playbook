<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=420">
<title>Betslip RG Messaging — Tier 1</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800;900&family=Source+Sans+3:wght@300;400;600&family=Source+Code+Pro:wght@500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { margin: 0; padding: 0; background: transparent; }

  .betslip-rg {
    width: 420px;
    height: 320px;
    background: var(--pb-color-primary);
    font-family: var(--pb-font-body);
    color: var(--pb-color-white);
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* Grid overlay */
  .betslip-rg::after {
    content: '';
    position: absolute;
    inset: 0;
    pointer-events: none;
    background-image:
      linear-gradient(rgba(var(--pb-grid-color, 255,255,255), var(--pb-grid-opacity, 0.02)) 1px, transparent 1px),
      linear-gradient(90deg, rgba(var(--pb-grid-color, 255,255,255), var(--pb-grid-opacity, 0.02)) 1px, transparent 1px);
    background-size: 60px 60px;
  }

  /* 6px gradient accent bar */
  .accent-bar {
    height: 6px;
    background: linear-gradient(90deg, var(--pb-color-accent), var(--pb-color-secondary));
    flex-shrink: 0;
  }

  /* Content */
  .content {
    flex: 1;
    padding: 20px 28px 18px;
    display: flex;
    flex-direction: column;
    position: relative;
    z-index: 1;
  }

  /* Logo */
  .logo {
    font-family: var(--pb-font-heading);
    font-size: calc(18px * var(--pb-template-text-scale, 1));
    margin-bottom: 14px;
    line-height: 1;
  }
  .logo .logo-play {
    font-weight: 800;
    letter-spacing: -0.02em;
    color: var(--pb-color-white);
  }
  .logo .logo-book {
    font-weight: 300;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--pb-color-secondary);
  }

  .heading {
    font-family: var(--pb-font-heading);
    font-weight: 700;
    font-size: calc(24px * var(--pb-template-text-scale, 1));
    color: var(--pb-color-white);
    margin-bottom: 16px;
    line-height: 1.2;
    letter-spacing: -0.01em;
  }

  /* Stat blocks */
  .stat-blocks {
    display: flex;
    gap: 24px;
    margin-bottom: 14px;
  }
  .stat-block {
    flex: 1;
  }
  .stat-label {
    font-family: var(--pb-font-body);
    font-size: calc(12px * var(--pb-template-text-scale, 1));
    color: var(--pb-color-neutral-300);
    margin-bottom: 4px;
    line-height: 1.3;
  }
  .stat-value {
    font-family: var(--pb-font-mono);
    font-weight: 600;
    font-size: calc(22px * var(--pb-template-text-scale, 1));
    line-height: 1.2;
  }
  .stat-value--teal {
    color: var(--pb-color-secondary);
  }
  .stat-value--white {
    color: var(--pb-color-white);
  }

  .body-text {
    font-family: var(--pb-font-body);
    font-size: calc(16px * var(--pb-template-text-scale, 1));
    color: var(--pb-color-neutral-300);
    line-height: 1.5;
    margin-bottom: 10px;
  }

  .manage-link {
    font-family: var(--pb-font-body);
    font-size: calc(14px * var(--pb-template-text-scale, 1));
    color: var(--pb-color-secondary);
    text-decoration: none;
    line-height: 1.3;
    margin-bottom: auto;
  }

  /* Footer helpline */
  .footer-helpline {
    font-family: var(--pb-font-mono);
    font-size: calc(13px * var(--pb-template-text-scale, 1));
    color: var(--pb-color-neutral-300);
    line-height: 1.3;
    padding-top: 10px;
  }
</style>
  <link rel="stylesheet" href="brand-inject.css">
  </head>
<body>
<div class="betslip-rg">

  <div class="accent-bar"></div>

  <div class="content">
    <div class="logo">
      <span class="logo-play">Play</span><span class="logo-book">book</span>
    </div>

    <h1 class="heading">Before you bet</h1>

    <div class="stat-blocks">
      <div class="stat-block">
        <div class="stat-label">Your budget left</div>
        <div class="stat-value stat-value--teal">$75</div>
      </div>
      <div class="stat-block">
        <div class="stat-label">This week's bets</div>
        <div class="stat-value stat-value--white">12</div>
      </div>
    </div>

    <p class="body-text">Sports outcomes are uncertain. Only bet what you can afford to lose.</p>

    <a class="manage-link" href="#">Manage your limits &rarr;</a>

    <div class="footer-helpline">Free support 24/7: {{HELPLINE_NUMBER}}</div>
  </div>

</div>
</body>
</html>
