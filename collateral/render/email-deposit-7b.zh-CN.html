<!DOCTYPE html>
<html lang="zh-Hans">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=600">
<title>存款确认</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800;900&family=Noto+Sans+SC:wght@300;400;600;700;800;900&family=Source+Code+Pro:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  .email {
    width: 600px;
    font-family: 'Inter', 'Noto Sans SC', Arial, sans-serif;
    background: var(--pb-color-white);
    color: var(--pb-color-neutral-900);
  }
  .accent-bar { height: 4px; background: linear-gradient(90deg, var(--pb-color-accent), var(--pb-color-secondary)); }
  .hero {
    background: var(--pb-color-primary);
    padding: 48px 56px;
    text-align: center;
  }
  .hero-logo {
    font-family: var(--pb-font-heading);
    font-size: calc(24px * var(--pb-template-text-scale, 1));
    margin-bottom: 32px;
    display: inline-block;
  }
  .hero-logo .logo-play { color: var(--pb-color-white); font-weight: 800; letter-spacing: -0.02em; }
  .hero-logo .logo-book { color: var(--pb-color-secondary); font-weight: 300; text-transform: uppercase; letter-spacing: 0.08em; }
  .hero h1 {
    font-family: var(--pb-font-heading);
    font-weight: 700;
    font-size: calc(30px * var(--pb-template-text-scale, 1));
    color: var(--pb-color-white);
    margin-bottom: 20px;
    line-height: 1.4;
  }
  .deposit-amount {
    font-family: 'Inter', system-ui, sans-serif;
    font-weight: 800;
    font-size: calc(48px * var(--pb-template-text-scale, 1));
    color: var(--pb-color-secondary);
    margin-bottom: 8px;
  }
  .deposit-date {
    font-size: calc(17px * var(--pb-template-text-scale, 1));
    color: var(--pb-color-neutral-300);
  }
  .section-white { padding: 40px 56px; background: var(--pb-color-white); }
  .section-gray { padding: 40px 56px; background: var(--pb-color-neutral-50); }
  .section-heading {
    font-family: var(--pb-font-heading);
    font-weight: 700;
    font-size: calc(22px * var(--pb-template-text-scale, 1));
    color: var(--pb-color-neutral-900);
    margin-bottom: 24px;
    line-height: 1.5;
  }
  .budget-grid {
    display: flex;
    gap: 16px;
    margin-bottom: 24px;
  }
  .budget-stat {
    flex: 1;
    background: var(--pb-color-neutral-50);
    border-radius: 10px;
    padding: 20px;
    text-align: center;
  }
  .budget-stat .label {
    font-size: calc(14px * var(--pb-template-text-scale, 1));
    color: var(--pb-color-neutral-500);
    font-family: var(--pb-font-heading);
    font-weight: 600;
    margin-bottom: 8px;
  }
  .budget-stat .value {
    font-family: 'Inter', system-ui, sans-serif;
    font-weight: 800;
    font-size: calc(22px * var(--pb-template-text-scale, 1));
    color: var(--pb-color-primary);
  }
  .budget-stat .value.teal { color: var(--pb-color-secondary); }
  .budget-stat .value.orange { color: var(--pb-color-accent); }
  .progress-bar-outer {
    width: 100%; height: 8px;
    background: var(--pb-color-neutral-100);
    border-radius: 4px;
    margin-bottom: 8px;
  }
  .progress-bar-inner {
    width: 35%; height: 8px;
    background: linear-gradient(90deg, var(--pb-color-secondary), var(--pb-color-secondary-dark));
    border-radius: 4px;
  }
  .progress-label {
    font-size: calc(15px * var(--pb-template-text-scale, 1));
    color: var(--pb-color-neutral-500);
    text-align: right;
  }
  .note {
    font-size: calc(17px * var(--pb-template-text-scale, 1));
    color: var(--pb-color-neutral-700);
    line-height: 1.7;
    margin-top: 16px;
  }
  .cta-button {
    display: inline-block;
    background: var(--pb-color-secondary);
    color: var(--pb-color-primary);
    font-family: var(--pb-font-heading);
    font-weight: 700;
    font-size: calc(16px * var(--pb-template-text-scale, 1));
    padding: 12px 28px;
    border-radius: 6px;
    text-decoration: none;
    margin-top: 20px;
  }
  .tool-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 16px 0;
    border-bottom: 1px solid var(--pb-color-neutral-100);
  }
  .tool-row:last-child { border-bottom: none; }
  .tool-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: var(--pb-color-secondary);
    min-width: 10px;
  }
  .tool-dot.off { background: var(--pb-color-neutral-300); }
  .tool-label {
    font-weight: 600;
    font-size: calc(17px * var(--pb-template-text-scale, 1));
    color: var(--pb-color-neutral-900);
    flex: 1;
    line-height: 1.5;
  }
  .tool-status {
    font-size: calc(16px * var(--pb-template-text-scale, 1));
    color: var(--pb-color-neutral-500);
    font-family: var(--pb-font-mono);
    font-weight: 500;
  }
  .footer {
    background: var(--pb-color-primary-dark);
    padding: 36px 56px;
    text-align: center;
  }
  .footer-support { font-size: calc(17px * var(--pb-template-text-scale, 1)); color: var(--pb-color-white); font-weight: 600; margin-bottom: 10px; line-height: 1.6; }
  .footer-channels {
    font-family: var(--pb-font-mono);
    font-size: calc(18px * var(--pb-template-text-scale, 1));
    font-weight: 700;
    color: var(--pb-color-secondary);
    margin-bottom: 20px;
    line-height: 1.8;
  }
  .footer-legal { font-size: calc(14px * var(--pb-template-text-scale, 1)); color: var(--pb-color-neutral-500); line-height: 1.7; margin-bottom: 12px; }
  .footer-logo { font-family: var(--pb-font-heading); font-size: calc(15px * var(--pb-template-text-scale, 1)); margin-top: 16px; display: inline-block; }
  .footer-logo .logo-play { color: var(--pb-color-white); font-weight: 800; letter-spacing: -0.02em; }
  .footer-logo .logo-book { color: var(--pb-color-secondary); font-weight: 300; text-transform: uppercase; letter-spacing: 0.08em; }
</style>
  <link rel="stylesheet" href="brand-inject.css">
  <style>
    /* Locale-specific font cascade override — must come AFTER brand-inject.css to win */
    :root {
      --pb-font-heading: 'Inter', 'Noto Sans SC', system-ui, -apple-system, sans-serif;
      --pb-font-body: 'Inter', 'Noto Sans SC', system-ui, sans-serif;
    }
  </style>
  </head>
<body>
<div class="email">

  <div class="accent-bar"></div>

  <div class="hero">
    <div class="hero-logo"><span class="logo-play">Play</span><span class="logo-book">book</span></div>
    <h1>存款确认</h1>
    <div class="deposit-amount">澳门币 400</div>
    <div class="deposit-date">2026 年 2 月 22 日</div>
  </div>

  <div class="section-white">
    <div class="section-heading">预算概览</div>
    <div class="budget-grid">
      <div class="budget-stat">
        <div class="label">每周限额</div>
        <div class="value">澳门币 1,600</div>
      </div>
      <div class="budget-stat">
        <div class="label">已使用</div>
        <div class="value teal">澳门币 560</div>
      </div>
      <div class="budget-stat">
        <div class="label">剩余</div>
        <div class="value">澳门币 1,040</div>
      </div>
    </div>
    <div class="progress-bar-outer">
      <div class="progress-bar-inner"></div>
    </div>
    <div class="progress-label">每周限额已使用 35%</div>
    <div class="note">限额由玩家自主设定，可随时在账户设置中调整。</div>
    <a href="#" class="cta-button">调整限额</a>
  </div>

  <div class="section-gray">
    <div class="section-heading">可用工具</div>
    <div class="tool-row">
      <div class="tool-dot"></div>
      <div class="tool-label">游戏时长提醒</div>
      <div class="tool-status">每六十分钟一次</div>
    </div>
    <div class="tool-row">
      <div class="tool-dot"></div>
      <div class="tool-label">活动仪表板</div>
      <div class="tool-status">实时更新</div>
    </div>
    <div class="tool-row">
      <div class="tool-dot off"></div>
      <div class="tool-label">资金规划器</div>
      <div class="tool-status">尚未设定</div>
    </div>
    <div style="text-align: center;">
      <a href="#" class="cta-button">查看仪表板</a>
    </div>
  </div>

  <div class="footer">
    <div class="footer-support">博彩相关任何问题，皆可获得免费保密支援。</div>
    <div class="footer-channels">电话 {{HELPLINE_NUMBER}} ｜ 短讯 {{HELPLINE_NUMBER}}</div>
    <div class="footer-legal">{{AGE_DISCLAIMER}} {{GENERAL_DISCLAIMER}}</div>
    <div class="footer-logo"><span class="logo-play">Play</span><span class="logo-book">book</span></div>
  </div>

</div>
</body>
</html>
