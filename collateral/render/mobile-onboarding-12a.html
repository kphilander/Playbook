<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=420">
<title>Mobile Onboarding — Welcome — Tier 1</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800;900&family=Source+Sans+3:wght@300;400;600&family=Source+Code+Pro:wght@500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { margin: 0; padding: 0; background: transparent; }

  .mobile-onboarding {
    width: 420px;
    height: 812px;
    background: var(--pb-color-primary);
    font-family: var(--pb-font-body);
    color: var(--pb-color-white);
    display: flex;
    flex-direction: column;
    position: relative;
    overflow: hidden;
  }

  /* Gradient accent bar */
  .accent-bar {
    height: 8px;
    background: linear-gradient(90deg, var(--pb-color-accent), var(--pb-color-secondary));
    flex-shrink: 0;
  }

  /* Header */
  .header {
    padding: 32px 32px 0;
    position: relative;
    z-index: 1;
  }
  .card-logo {
    font-family: var(--pb-font-heading);
    font-size: calc(28px * var(--pb-template-text-scale, 1));
  }
  .card-logo .logo-play {
    color: var(--pb-color-white);
    font-weight: 800;
    letter-spacing: -0.02em;
  }
  .card-logo .logo-book {
    color: var(--pb-color-secondary);
    font-weight: 300;
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  /* Content */
  .content {
    padding: 40px 32px 0;
    flex: 1;
    display: flex;
    flex-direction: column;
    position: relative;
    z-index: 1;
  }

  .headline {
    font-family: var(--pb-font-heading);
    font-weight: 800;
    font-size: calc(32px * var(--pb-template-text-scale, 1));
    color: var(--pb-color-white);
    line-height: 1.2;
    margin-bottom: 8px;
    letter-spacing: -0.01em;
  }
  .subhead {
    font-family: var(--pb-font-body);
    font-size: calc(18px * var(--pb-template-text-scale, 1));
    color: var(--pb-color-neutral-300);
    line-height: 1.5;
    margin-bottom: 36px;
  }

  /* Feature cards */
  .feature-list {
    display: flex;
    flex-direction: column;
    gap: 14px;
    margin-bottom: 40px;
  }
  .feature-card {
    display: flex;
    align-items: flex-start;
    gap: 16px;
    padding: 20px;
    background: var(--pb-color-primary-light);
    border-radius: 12px;
  }
  .feature-number {
    width: 36px;
    height: 36px;
    min-width: 36px;
    border-radius: 50%;
    background: var(--pb-color-secondary);
    color: var(--pb-color-primary);
    font-family: var(--pb-font-heading);
    font-weight: 700;
    font-size: calc(16px * var(--pb-template-text-scale, 1));
    display: flex;
    align-items: center;
    justify-content: center;
    line-height: 1;
  }
  .feature-text {
    flex: 1;
  }
  .feature-title {
    font-family: var(--pb-font-heading);
    font-weight: 700;
    font-size: calc(16px * var(--pb-template-text-scale, 1));
    color: var(--pb-color-white);
    margin-bottom: 4px;
  }
  .feature-desc {
    font-family: var(--pb-font-body);
    font-size: calc(16px * var(--pb-template-text-scale, 1));
    color: var(--pb-color-neutral-300);
    line-height: 1.5;
  }

  /* CTA */
  .cta-button {
    display: block;
    width: 100%;
    padding: 16px;
    background: var(--pb-color-secondary);
    color: var(--pb-color-primary);
    font-family: var(--pb-font-heading);
    font-weight: 700;
    font-size: calc(16px * var(--pb-template-text-scale, 1));
    text-align: center;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    letter-spacing: 0.01em;
    margin-top: auto;
  }

  /* Footer */
  .footer {
    padding: 20px 32px 28px;
    text-align: center;
    position: relative;
    z-index: 1;
  }
  .footer-helpline {
    font-family: var(--pb-font-mono);
    font-weight: 600;
    font-size: calc(18px * var(--pb-template-text-scale, 1));
    color: var(--pb-color-neutral-300);
    display: block;
    margin-bottom: 4px;
  }
  .footer-legal {
    font-family: var(--pb-font-body);
    font-size: calc(12px * var(--pb-template-text-scale, 1));
    color: var(--pb-color-neutral-500);
  }
</style>
  <link rel="stylesheet" href="brand-inject.css">
  </head>
<body>
<div class="mobile-onboarding">

  <div class="accent-bar"></div>

  <div class="header">
    <span class="card-logo"><span class="logo-play">Play</span><span class="logo-book">book</span></span>
  </div>

  <div class="content">
    <h1 class="headline">Welcome to Playbook</h1>
    <p class="subhead">Real odds. Real tools. Your call.</p>

    <div class="feature-list">
      <div class="feature-card">
        <div class="feature-number">1</div>
        <div class="feature-text">
          <div class="feature-title">Know the odds</div>
          <div class="feature-desc">See the house edge for every game</div>
        </div>
      </div>
      <div class="feature-card">
        <div class="feature-number">2</div>
        <div class="feature-text">
          <div class="feature-title">Set your limits</div>
          <div class="feature-desc">Deposit caps, session alerts, your rules</div>
        </div>
      </div>
      <div class="feature-card">
        <div class="feature-number">3</div>
        <div class="feature-text">
          <div class="feature-title">Track your play</div>
          <div class="feature-desc">Activity dashboard at a glance</div>
        </div>
      </div>
    </div>

    <button class="cta-button">Get started</button>
  </div>

  <div class="footer">
    <span class="footer-helpline">24/7 Support: {{HELPLINE_NUMBER}}</span>
    <span class="footer-legal">{{AGE_DISCLAIMER}}</span>
  </div>

</div>
</body>
</html>
