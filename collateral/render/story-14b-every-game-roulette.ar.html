<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800;900&family=Noto+Sans+Arabic:wght@300;400;600;700;800;900&family=Source+Code+Pro:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { margin: 0; background: transparent; }
  .story-card {
    width: 1080px; height: 1920px;
    background: linear-gradient(180deg, var(--pb-color-primary), var(--pb-color-primary-dark));
    position: relative; overflow: hidden;
    display: flex; flex-direction: column;
  }
  .story-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 8px; background: linear-gradient(90deg, var(--pb-color-accent), var(--pb-color-secondary)); z-index: 2; }
  .story-header { padding: 48px 48px 0; display: flex; align-items: center; justify-content: space-between; position: relative; z-index: 1; }
  .story-logo { font-family: var(--pb-font-heading); font-size: calc(28px * var(--pb-template-text-scale, 1)); }
  .story-logo .logo-play { color: var(--pb-color-white); font-weight: 800; letter-spacing: -0.02em; }
  .story-logo .logo-book { color: var(--pb-color-secondary); font-weight: 300; text-transform: uppercase; letter-spacing: 0.08em; }
  .story-pillar { font-family: var(--pb-font-heading); font-size: calc(20px * var(--pb-template-text-scale, 1)); font-weight: 700; color: var(--pb-color-primary); background: var(--pb-color-secondary); padding: 8px 22px; border-radius: 100px; display: inline-flex; align-items: center; justify-content: center; line-height: 1; }
  .story-body { flex: 1; display: flex; flex-direction: column; justify-content: center; padding: 0 48px; position: relative; z-index: 1; }
  .headline { font-family: var(--pb-font-heading); font-size: calc(80px * var(--pb-template-text-scale, 1)); font-weight: 800; line-height: 1.4; color: var(--pb-color-white); margin-bottom: 80px; }
  .stat-block { margin-bottom: 64px; }
  .stat-number { font-family: 'Inter', 'Noto Sans Arabic', system-ui, sans-serif; font-size: calc(280px * var(--pb-template-text-scale, 1)); font-weight: 900; color: var(--pb-color-accent); line-height: 1; display: block; margin-bottom: 16px; }
  .stat-label { font-family: var(--pb-font-heading); font-size: calc(44px * var(--pb-template-text-scale, 1)); font-weight: 600; color: var(--pb-color-neutral-300); line-height: 1.5; }
  .body-line { font-family: var(--pb-font-body); font-size: calc(40px * var(--pb-template-text-scale, 1)); line-height: 1.7; color: var(--pb-color-neutral-300); }
  .story-footer { background: var(--pb-color-primary-light); padding: 28px 48px; display: flex; flex-direction: column; align-items: center; gap: 6px; text-align: center; position: relative; z-index: 1; }
  .footer-helpline { font-family: var(--pb-font-mono); font-weight: 700; font-size: calc(20px * var(--pb-template-text-scale, 1)); color: var(--pb-color-white); }
  .footer-legal { font-size: calc(15px * var(--pb-template-text-scale, 1)); color: var(--pb-color-neutral-300); font-family: var(--pb-font-body); }
</style>
  <link rel="stylesheet" href="brand-inject.css">
  <style>
    /* Locale-specific font cascade override — must come AFTER brand-inject.css to win */
    :root {
      --pb-font-heading: 'Inter', 'Noto Sans Arabic', system-ui, -apple-system, sans-serif;
      --pb-font-body: 'Inter', 'Noto Sans Arabic', system-ui, sans-serif;
    }
  </style>
  </head>
<body>
<div class="story-card">
  <div class="story-header">
    <span class="story-logo"><span class="logo-play">Play</span><span class="logo-book">book</span></span>
    
  </div>
  <div class="story-body">
    <div class="headline">لكل لعبة حساباتها.<br>وفيما يلي التفاصيل.</div>
    <div class="stat-block">
      <span class="stat-number">5.26%</span>
      <span class="stat-label">الروليت الأمريكي</span>
    </div>
    <div class="body-line">نسبة الكازينو تبقى كما هي.</div>
  </div>
  <div class="story-footer">
    <span class="footer-helpline">دعم مجاني وسري على مدار الساعة: {{HELPLINE_NUMBER}}</span>
    <span class="footer-legal">{{AGE_DISCLAIMER}}</span>
  </div>
</div>
</body>
</html>
