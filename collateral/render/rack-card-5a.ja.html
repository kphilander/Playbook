<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800;900&family=Noto+Sans+JP:wght@300;400;600;700;800;900&family=Source+Code+Pro:wght@500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { margin: 0; padding: 24px; background: var(--pb-color-primary); }

    .rack-card {
      width: 800px;
      height: 1800px;
      position: relative;
      background: var(--pb-color-primary);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .rack-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 8px;
      background: linear-gradient(90deg, var(--pb-color-accent), var(--pb-color-secondary));
    }

    .card-header {
      padding: 48px 56px 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: relative;
      z-index: 1;
    }
    .card-logo {
      font-family: var(--pb-font-heading);
      font-size: calc(32px * var(--pb-template-text-scale, 1));
      color: var(--pb-color-white);
    }
    .card-logo .logo-play {
      font-weight: 800;
      letter-spacing: -0.02em;
    }
    .card-logo .logo-book {
      font-weight: 300;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    .card-header-left {
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .co-brand-divider {
      width: 1px;
      height: 28px;
      background: var(--pb-color-neutral-300);
    }
    .operator-placeholder {
      width: 120px;
      height: 48px;
      border: 1px dashed rgba(255,255,255,0.25);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--pb-font-body);
      font-size: calc(12px * var(--pb-template-text-scale, 1));
      color: rgba(255,255,255,0.4);
    }
    .card-pillar {
      font-family: var(--pb-font-heading);
      font-size: calc(20px * var(--pb-template-text-scale, 1));
      font-weight: 700;
      color: var(--pb-color-primary);
      background: var(--pb-color-secondary);
      padding: 8px 22px;
      border-radius: 100px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
    }

    .card-hero {
      padding: 56px 56px 40px;
      position: relative;
      z-index: 1;
    }
    .hero-headline {
      font-family: var(--pb-font-heading);
      font-size: calc(52px * var(--pb-template-text-scale, 1));
      font-weight: 700;
      line-height: 1.3;
      color: var(--pb-color-white);
      margin-bottom: 16px;
    }
    .hero-subhead {
      font-family: var(--pb-font-body);
      font-size: calc(26px * var(--pb-template-text-scale, 1));
      line-height: 1.7;
      color: var(--pb-color-neutral-300);
    }

    .stats-section {
      flex: 1;
      padding: 0 56px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 28px;
      position: relative;
      z-index: 1;
    }
    .stat-row {
      padding: 28px;
      background: rgba(255,255,255,0.03);
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.06);
    }
    .stat-game {
      font-family: var(--pb-font-body);
      font-size: calc(22px * var(--pb-template-text-scale, 1));
      color: var(--pb-color-neutral-300);
      margin-bottom: 8px;
    }
    .stat-value {
      font-family: var(--pb-font-heading);
      font-size: calc(58px * var(--pb-template-text-scale, 1));
      font-weight: 900;
      line-height: 1;
      letter-spacing: -0.03em;
      margin-bottom: 8px;
    }
    .stat-value.teal { color: var(--pb-color-secondary); }
    .stat-value.white { color: var(--pb-color-white); }
    .stat-value.orange { color: var(--pb-color-accent); }
    .stat-note {
      font-family: var(--pb-font-body);
      font-size: calc(22px * var(--pb-template-text-scale, 1));
      color: var(--pb-color-neutral-500);
      line-height: 1.5;
    }

    .card-callout {
      padding: 0 56px;
      position: relative;
      z-index: 1;
    }
    .callout-text {
      font-family: var(--pb-font-body);
      font-size: calc(24px * var(--pb-template-text-scale, 1));
      line-height: 1.7;
      color: var(--pb-color-neutral-300);
    }
    .callout-text strong {
      color: var(--pb-color-secondary);
      font-weight: 600;
    }

    .card-qr {
      padding: 40px 56px 0;
      display: flex;
      align-items: center;
      gap: 20px;
      position: relative;
      z-index: 1;
    }
    .qr-placeholder {
      width: 100px;
      height: 100px;
      background: var(--pb-color-white);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--pb-font-mono);
      font-size: calc(14px * var(--pb-template-text-scale, 1));
      color: var(--pb-color-primary);
      flex-shrink: 0;
    }
    .qr-label {
      font-family: var(--pb-font-heading);
      font-size: calc(22px * var(--pb-template-text-scale, 1));
      font-weight: 600;
      color: var(--pb-color-white);
    }

    .helpline-strip {
      margin-top: 32px;
      background: var(--pb-color-primary-light);
      padding: 24px 32px;
      text-align: center;
      position: relative;
      z-index: 1;
    }
    .helpline-text {
      font-family: var(--pb-font-mono);
      font-size: calc(24px * var(--pb-template-text-scale, 1));
      font-weight: 700;
      color: var(--pb-color-white);
      line-height: 1.5;
    }

    .legal-strip {
      padding: 16px 56px 24px;
      text-align: center;
      position: relative;
      z-index: 1;
    }
    .legal-text {
      font-family: var(--pb-font-body);
      font-size: calc(20px * var(--pb-template-text-scale, 1));
      color: var(--pb-color-neutral-500);
      line-height: 1.6;
    }
  </style>
  <link rel="stylesheet" href="brand-inject.css">
  <style>
    /* Locale-specific font cascade override — must come AFTER brand-inject.css to win */
    :root {
      --pb-font-heading: 'Inter', 'Noto Sans JP', system-ui, -apple-system, sans-serif;
      --pb-font-body: 'Inter', 'Noto Sans JP', system-ui, sans-serif;
    }
  </style>
  </head>
<body>
  <div class="rack-card">
    <div class="card-header">
      <div class="card-header-left">
        <span class="card-logo"><span class="logo-play">Play</span><span class="logo-book">book</span></span>
        <div class="co-brand-divider"></div>
        <div class="operator-placeholder">貴社ロゴ</div>
      </div>
      
    </div>
    <div class="card-hero">
      <div class="hero-headline">すべてのゲームには数学があります。<br>ここに示します。</div>
      <div class="hero-subhead">ハウスエッジを知り、ゲームを選び、予算を立てる。</div>
    </div>
    <div class="stats-section">
      <div class="stat-row">
        <div class="stat-game">ブラックジャック（基本戦略）</div>
        <div class="stat-value teal">0.5%</div>
        <div class="stat-note">カジノで最も有利な確率</div>
      </div>
      <div class="stat-row">
        <div class="stat-game">アメリカンルーレット</div>
        <div class="stat-value white">5.26%</div>
        <div class="stat-note">ダブルゼロはエッジも倍</div>
      </div>
      <div class="stat-row">
        <div class="stat-game">スロット（平均）</div>
        <div class="stat-value orange">2〜15%</div>
        <div class="stat-note">機種やカジノによって異なります</div>
      </div>
    </div>
    <div class="card-callout">
      <div class="callout-text"><strong>エッジを知ること</strong>が、ゲーム選びと予算設定の手がかりになります。</div>
    </div>
    <div class="card-qr">
      <div class="qr-placeholder">QR</div>
      <span class="qr-label">スキャンして事実を確認</span>
    </div>
    <div class="helpline-strip">
      <span class="helpline-text">秘密厳守・24時間無料サポート：{{HELPLINE_NUMBER}}</span>
    </div>
    <div class="legal-strip">
      <span class="legal-text">{{AGE_DISCLAIMER}} {{GENERAL_DISCLAIMER}}</span>
    </div>
  </div>
</body>
</html>
