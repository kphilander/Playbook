<!DOCTYPE html>
<html lang="zh-Hans">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=420">
<title>存款提醒页 — 限额设定 — Tier 1</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800;900&family=Noto+Sans+SC:wght@300;400;600;700;800;900&family=Source+Code+Pro:wght@500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { margin: 0; padding: 0; background: transparent; }

  .deposit-interstitial {
    width: 420px;
    height: 812px;
    background: var(--pb-color-primary);
    color: var(--pb-color-white);
    font-family: var(--pb-font-body);
    display: flex;
    flex-direction: column;
    position: relative;
  }
  /* Accent bar */
  .accent-bar {
    height: 8px;
    background: linear-gradient(90deg, var(--pb-color-accent), var(--pb-color-secondary));
    flex-shrink: 0;
  }

  /* Header */
  .header {
    padding: 32px 32px 0;
  }
  .card-logo {
    font-family: var(--pb-font-heading);
    font-size: calc(26px * var(--pb-template-text-scale, 1));
  }
  .card-logo .logo-play {
    color: var(--pb-color-white);
    font-weight: 800;
    letter-spacing: -0.02em;
  }
  .card-logo .logo-book {
    color: var(--pb-color-secondary);
    font-weight: 300;
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  /* Content */
  .content {
    padding: 36px 32px 0;
    flex: 1;
    display: flex;
    flex-direction: column;
  }

  .heading {
    font-family: var(--pb-font-heading);
    font-weight: 700;
    font-size: calc(30px * var(--pb-template-text-scale, 1));
    color: var(--pb-color-white);
    line-height: 1.4;
    margin-bottom: 14px;
  }
  .body-text {
    font-family: var(--pb-font-body);
    font-size: calc(17px * var(--pb-template-text-scale, 1));
    color: var(--pb-color-neutral-300);
    line-height: 1.7;
    margin-bottom: 30px;
  }

  /* Limit options — radio cards */
  .limit-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 32px;
  }
  .limit-option {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 16px 20px;
    border: 1.5px solid rgba(255,255,255,0.1);
    border-radius: 12px;
  }
  .limit-option.selected {
    border-color: var(--pb-color-secondary);
    background: rgba(0,212,170,0.1);
  }
  .radio-circle {
    width: 22px;
    height: 22px;
    min-width: 22px;
    border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.3);
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .selected .radio-circle {
    border-color: var(--pb-color-secondary);
  }
  .radio-fill {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: transparent;
  }
  .selected .radio-fill {
    background: var(--pb-color-secondary);
  }
  .limit-label {
    font-family: var(--pb-font-heading);
    font-weight: 600;
    font-size: calc(17px * var(--pb-template-text-scale, 1));
    color: var(--pb-color-white);
  }

  /* CTA */
  .cta-button {
    display: block;
    width: 100%;
    padding: 16px;
    background: var(--pb-color-secondary);
    color: var(--pb-color-primary);
    font-family: var(--pb-font-heading);
    font-weight: 700;
    font-size: calc(17px * var(--pb-template-text-scale, 1));
    text-align: center;
    border: none;
    border-radius: 10px;
    margin-top: auto;
    margin-bottom: 16px;
  }

  .skip-link {
    text-align: center;
    font-family: var(--pb-font-heading);
    font-size: calc(17px * var(--pb-template-text-scale, 1));
    font-weight: 600;
    color: var(--pb-color-neutral-300);
    text-decoration: none;
    display: block;
    padding-bottom: 8px;
  }

  /* Footer */
  .footer {
    padding: 16px 32px 28px;
    text-align: center;
  }
  .footer-helpline {
    font-family: var(--pb-font-mono);
    font-weight: 600;
    font-size: calc(17px * var(--pb-template-text-scale, 1));
    color: var(--pb-color-neutral-300);
  }
</style>
  <link rel="stylesheet" href="brand-inject.css">
  <style>
    /* Locale-specific font cascade override — must come AFTER brand-inject.css to win */
    :root {
      --pb-font-heading: 'Inter', 'Noto Sans SC', system-ui, -apple-system, sans-serif;
      --pb-font-body: 'Inter', 'Noto Sans SC', system-ui, sans-serif;
    }
  </style>
  </head>
<body>
<div class="deposit-interstitial">

  <div class="accent-bar"></div>

  <div class="header">
    <span class="card-logo"><span class="logo-play">Play</span><span class="logo-book">book</span></span>
  </div>

  <div class="content">
    <h1 class="heading">存款前请注意</h1>
    <p class="body-text">设定限额仅需十秒钟，选择合适的预算即可完成。</p>

    <div class="limit-list">
      <div class="limit-option">
        <div class="radio-circle"><div class="radio-fill"></div></div>
        <div class="limit-label">每周澳门币 400</div>
      </div>
      <div class="limit-option selected">
        <div class="radio-circle"><div class="radio-fill"></div></div>
        <div class="limit-label">每周澳门币 800</div>
      </div>
      <div class="limit-option">
        <div class="radio-circle"><div class="radio-fill"></div></div>
        <div class="limit-label">每周澳门币 1,600</div>
      </div>
      <div class="limit-option">
        <div class="radio-circle"><div class="radio-fill"></div></div>
        <div class="limit-label">自定义</div>
      </div>
    </div>

    <button class="cta-button">设定限额并继续</button>
    <a class="skip-link">暂时跳过</a>
  </div>

  <div class="footer">
    <span class="footer-helpline">24小时支援：{{HELPLINE_NUMBER}}</span>
  </div>

</div>
</body>
</html>
