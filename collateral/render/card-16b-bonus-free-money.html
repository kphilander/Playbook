<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800;900&family=Source+Sans+3:wght@300;400;600&family=Source+Code+Pro:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { margin: 0; background: transparent; }
  .social-card {
    width: 1080px; height: 1080px;
    background: var(--pb-color-primary);
    position: relative; overflow: hidden;
    display: flex; flex-direction: column;
  }
  .social-card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 8px;
    background: var(--pb-gradient-bar, linear-gradient(90deg, var(--pb-color-accent), var(--pb-color-secondary)));
  }
  .card-header { padding: 56px 64px 0; display: flex; align-items: center; justify-content: space-between; position: relative; z-index: 1; }
  .card-logo { font-family: var(--pb-font-heading); font-size: calc(32px * var(--pb-template-text-scale, 1)); }
  .card-logo .logo-play { color: var(--pb-color-white); font-weight: 800; letter-spacing: -0.02em; }
  .card-logo .logo-book { color: var(--pb-color-secondary); font-weight: 300; text-transform: uppercase; letter-spacing: 0.08em; }
  .card-body { flex: 1; display: flex; flex-direction: column; justify-content: center; padding: 0 64px; position: relative; z-index: 1; }
  .myth-label { font-family: var(--pb-font-heading); font-size: calc(16px * var(--pb-template-text-scale, 1)); font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: var(--pb-color-accent); margin-bottom: 20px; }
  .myth-statement { font-family: var(--pb-font-heading); font-size: calc(48px * var(--pb-template-text-scale, 1)); font-weight: 800; line-height: 1.15; color: var(--pb-color-white); margin-bottom: 32px; letter-spacing: -0.02em; }
  .myth-statement .strike { text-decoration: line-through; text-decoration-color: var(--pb-color-accent); text-decoration-thickness: 5px; color: var(--pb-color-neutral-300); }
  .fact-statement { font-family: var(--pb-font-body); font-size: calc(26px * var(--pb-template-text-scale, 1)); line-height: 1.55; color: var(--pb-color-neutral-300); }
  .fact-statement strong { color: var(--pb-color-secondary); font-weight: 600; }
  .stat-block { margin-top: 40px; display: flex; align-items: baseline; gap: 16px; }
  .stat-number { font-family: var(--pb-font-heading); font-size: calc(72px * var(--pb-template-text-scale, 1)); font-weight: 900; color: var(--pb-color-accent); line-height: 1; letter-spacing: -0.03em; }
  .stat-unit { font-family: var(--pb-font-heading); font-size: calc(22px * var(--pb-template-text-scale, 1)); font-weight: 600; color: var(--pb-color-neutral-300); line-height: 1.3; }
  .card-footer { background: var(--pb-color-primary-light); padding: 20px 64px; display: flex; align-items: center; justify-content: space-between; position: relative; z-index: 1; }
  .footer-helpline { font-family: var(--pb-font-mono); font-weight: 700; font-size: calc(16px * var(--pb-template-text-scale, 1)); color: var(--pb-color-white); }
  .footer-legal { font-size: calc(13px * var(--pb-template-text-scale, 1)); color: var(--pb-color-neutral-300); font-family: var(--pb-font-body); }
  .icon-chip { width: 88px; height: 88px; border-radius: 24px; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); display: flex; align-items: center; justify-content: center; color: var(--pb-color-accent); }
  .icon-chip svg { width: 48px; height: 48px; }
  .bg-motif { position: absolute; right: -60px; bottom: 70px; width: 500px; height: 500px; color: var(--pb-color-accent); opacity: 0.06; z-index: 0; }
  .bg-motif svg { width: 100%; height: 100%; }
</style>
  <link rel="stylesheet" href="brand-inject.css">
  </head>
<body>
<div class="social-card">
  <div class="card-header">
    <span class="card-logo"><span class="logo-play">Play</span><span class="logo-book">book</span></span>
    <span class="icon-chip"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><g stroke-width="2"><rect x="3" y="10" width="18" height="11" rx="2"/><path d="M12 6c-1.5-2-4-2-4 0s4 4 4 4 4-2 4-4-2.5-2-4 0z"/></g><g stroke-width="1"><line x1="12" y1="10" x2="12" y2="21"/><line x1="3" y1="14" x2="21" y2="14"/></g></svg></span>
  </div>
  <div class="bg-motif"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><g stroke-width="1"><rect x="3" y="10" width="18" height="11" rx="2"/><path d="M12 6c-1.5-2-4-2-4 0s4 4 4 4 4-2 4-4-2.5-2-4 0z"/></g><g stroke-width="0.5"><line x1="12" y1="10" x2="12" y2="21"/><line x1="3" y1="14" x2="21" y2="14"/></g></svg></div>
  <div class="card-body">
    <div class="myth-label">Myth vs. Math</div>
    <div class="myth-statement"><span class="strike">"A bonus is free money"</span></div>
    <div class="fact-statement">A $100 bonus at 30x wagering means <strong>$3,000 in bets</strong> before you can withdraw. Read the multiplier first.</div>
    <div class="stat-block">
      <span class="stat-number">30x</span>
      <span class="stat-unit">= $3,000 in bets before it pays out</span>
    </div>
  </div>
  <div class="card-footer">
    <span class="footer-helpline">Free support 24/7: {{HELPLINE_NUMBER}}</span>
    <span class="footer-legal">{{AGE_DISCLAIMER}}</span>
  </div>
</div>
</body>
</html>
