<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Entrance Sign — A2 Poster</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800;900&family=Source+Sans+3:wght@300;400;600&family=Source+Code+Pro:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { margin: 0; padding: 24px; background: var(--pb-color-primary); }

  .sign-entrance {
    width: 900px;
    height: 1200px;
    background: var(--pb-color-primary);
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    font-family: var(--pb-font-body);
  }
  .sign-entrance::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 8px;
    background: linear-gradient(90deg, var(--pb-color-accent), var(--pb-color-secondary));
  }
  .sign-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 48px 56px 0;
    position: relative;
    z-index: 1;
  }
  .card-logo {
    font-family: var(--pb-font-heading);
    font-size: calc(40px * var(--pb-template-text-scale, 1));
  }
  .card-logo .logo-play { color: var(--pb-color-white); font-weight: 800; letter-spacing: -0.02em; }
  .card-logo .logo-book { color: var(--pb-color-secondary); font-weight: 300; text-transform: uppercase; letter-spacing: 0.08em; }
  .co-brand {
    display: flex;
    align-items: center;
    gap: 20px;
  }
  .co-brand-divider {
    width: 1px;
    height: 36px;
    background: var(--pb-color-neutral-300);
  }
  .operator-placeholder {
    font-family: var(--pb-font-heading);
    font-size: calc(12px * var(--pb-template-text-scale, 1));
    color: var(--pb-color-neutral-500);
    border: 2px dashed rgba(255,255,255,0.15);
    border-radius: 6px;
    padding: 8px 16px;
  }

  .sign-content {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 0 56px;
    position: relative;
    z-index: 1;
  }
  .sign-headline {
    font-family: var(--pb-font-heading);
    font-weight: 800;
    font-size: calc(84px * var(--pb-template-text-scale, 1));
    color: var(--pb-color-white);
    line-height: 1.1;
    letter-spacing: -0.02em;
    margin-bottom: 28px;
  }
  .sign-sub {
    font-size: calc(32px * var(--pb-template-text-scale, 1));
    color: var(--pb-color-neutral-300);
    line-height: 1.45;
    margin-bottom: 56px;
    max-width: 720px;
  }

  .qr-block {
    display: flex;
    align-items: center;
    gap: 20px;
    position: relative;
    z-index: 1;
  }
  .qr-placeholder {
    width: 180px;
    height: 180px;
    background: var(--pb-color-white);
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--pb-font-mono);
    font-size: calc(16px * var(--pb-template-text-scale, 1));
    color: var(--pb-color-neutral-500);
    font-weight: 600;
  }
  .qr-text {
    font-family: var(--pb-font-heading);
    font-weight: 600;
    font-size: calc(26px * var(--pb-template-text-scale, 1));
    color: var(--pb-color-neutral-300);
    line-height: 1.3;
  }
  .qr-text strong {
    display: block;
    color: var(--pb-color-white);
    font-weight: 700;
    font-size: calc(30px * var(--pb-template-text-scale, 1));
    margin-bottom: 8px;
  }

  .sign-footer {
    background: var(--pb-color-primary-light);
    padding: 36px 56px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 24px;
    position: relative;
    z-index: 1;
  }
  .footer-helpline {
    font-family: var(--pb-font-mono);
    font-weight: 700;
    font-size: calc(28px * var(--pb-template-text-scale, 1));
    color: var(--pb-color-white);
  }
  .footer-legal {
    font-size: calc(20px * var(--pb-template-text-scale, 1));
    color: var(--pb-color-neutral-300);
  }
</style>
  <link rel="stylesheet" href="brand-inject.css">
  </head>
<body>
<div class="sign-entrance">

  <div class="sign-header">
    <span class="card-logo"><span class="logo-play">Play</span><span class="logo-book">book</span></span>
    <div class="co-brand">
      <div class="co-brand-divider"></div>
      <div class="operator-placeholder">Your logo here</div>
    </div>
  </div>

  <div class="sign-content">
    <div class="sign-headline">Know your game.<br>Play on your terms.</div>
    <div class="sign-sub">Real odds. Real tools. Free support.</div>
    <div class="qr-block">
      <div class="qr-placeholder">QR Code</div>
      <div class="qr-text"><strong>Scan for the facts</strong>Odds, tools, and guides</div>
    </div>
  </div>

  <div class="sign-footer">
    <span class="footer-helpline">Free, confidential support: {{HELPLINE_NUMBER}}</span>
    <span class="footer-legal">{{AGE_DISCLAIMER}}</span>
  </div>

</div>
</body>
</html>
