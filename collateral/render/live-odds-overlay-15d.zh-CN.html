<!DOCTYPE html>
<html lang="zh-Hans">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=420">
<title>即时赔率浮层 — 博彩公司抽成 — Tier 1</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800;900&family=Noto+Sans+SC:wght@300;400;600;700;800;900&family=Source+Code+Pro:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { margin: 0; padding: 0; background: transparent; }

  .live-overlay {
    width: 420px;
    height: 280px;
    background: var(--pb-color-primary);
    font-family: var(--pb-font-body);
    color: var(--pb-color-white);
    display: flex;
    flex-direction: column;
    position: relative;
  }

  /* Accent bar */
  .accent-bar {
    height: 6px;
    background: linear-gradient(90deg, var(--pb-color-accent), var(--pb-color-secondary));
    flex-shrink: 0;
  }

  /* Content */
  .content {
    padding: 16px 24px 12px;
    flex: 1;
    display: flex;
    flex-direction: column;
  }

  .top-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
  }
  .card-logo {
    font-family: var(--pb-font-heading);
    font-size: calc(15px * var(--pb-template-text-scale, 1));
  }
  .card-logo .logo-play {
    color: var(--pb-color-white);
    font-weight: 800;
    letter-spacing: -0.02em;
  }
  .card-logo .logo-book {
    color: var(--pb-color-secondary);
    font-weight: 300;
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }
  .section-label {
    font-family: var(--pb-font-heading);
    font-size: calc(11px * var(--pb-template-text-scale, 1));
    font-weight: 700;
    color: var(--pb-color-accent);
  }

  .heading {
    font-family: var(--pb-font-heading);
    font-weight: 700;
    font-size: calc(19px * var(--pb-template-text-scale, 1));
    color: var(--pb-color-white);
    line-height: 1.4;
    margin-bottom: 6px;
  }

  .body-text {
    font-family: var(--pb-font-body);
    font-size: calc(12px * var(--pb-template-text-scale, 1));
    color: var(--pb-color-neutral-300);
    line-height: 1.6;
    margin-bottom: 10px;
  }

  /* Hero stat row */
  .stat-row {
    display: flex;
    align-items: center;
    gap: 12px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 10px;
    padding: 10px 14px;
    margin-bottom: auto;
  }
  .stat-big {
    font-family: var(--pb-font-mono);
    font-size: calc(28px * var(--pb-template-text-scale, 1));
    font-weight: 700;
    color: var(--pb-color-secondary);
    line-height: 1;
    letter-spacing: -0.02em;
  }
  .stat-label {
    font-family: var(--pb-font-body);
    font-size: calc(12px * var(--pb-template-text-scale, 1));
    color: var(--pb-color-neutral-300);
    line-height: 1.5;
  }

  /* Footer */
  .footer {
    padding: 8px 24px 14px;
    text-align: center;
  }
  .footer-helpline {
    font-family: var(--pb-font-mono);
    font-weight: 600;
    font-size: calc(13px * var(--pb-template-text-scale, 1));
    color: var(--pb-color-neutral-300);
  }
</style>
  <link rel="stylesheet" href="brand-inject.css">
  <style>
    /* Locale-specific font cascade override — must come AFTER brand-inject.css to win */
    :root {
      --pb-font-heading: 'Inter', 'Noto Sans SC', system-ui, -apple-system, sans-serif;
      --pb-font-body: 'Inter', 'Noto Sans SC', system-ui, sans-serif;
    }
  </style>
  </head>
<body>
<div class="live-overlay">

  <div class="accent-bar"></div>

  <div class="content">
    <div class="top-row">
      <span class="card-logo"><span class="logo-play">Play</span><span class="logo-book">book</span></span>
      <span class="section-label">体育博彩的数学</span>
    </div>

    <h1 class="heading">即时赔率会变，抽成始终不变。</h1>
    <div class="body-text">每条即时赔率均内含博彩公司的抽成，赔率更新并不会将其消除。</div>

    <div class="stat-row">
      <div class="stat-big">5&ndash;10%</div>
      <div class="stat-label">即时投注的典型抽成</div>
    </div>
  </div>

  <div class="footer">
    <span class="footer-helpline">{{HELPLINE_NUMBER}}・24小时</span>
  </div>

</div>
</body>
</html>
