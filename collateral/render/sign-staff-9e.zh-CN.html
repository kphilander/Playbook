<!DOCTYPE html>
<html lang="zh-Hans">
<head>
<meta charset="UTF-8">
<title>员工休息室海报 — A3</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800;900&family=Noto+Sans+SC:wght@300;400;600;700;800;900&family=Source+Code+Pro:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { margin: 0; padding: 24px; background: var(--pb-color-white); }

  .sign-staff {
    width: 900px;
    height: 1200px;
    background: var(--pb-color-white);
    position: relative;
    overflow: hidden;
    font-family: var(--pb-font-body);
    color: var(--pb-color-neutral-900);
    display: flex;
    flex-direction: column;
  }
  .sign-staff::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 8px;
    background: linear-gradient(90deg, var(--pb-color-accent), var(--pb-color-secondary));
  }

  .staff-header {
    background: var(--pb-color-primary);
    padding: 40px 56px;
    position: relative;
    z-index: 1;
  }
  .header-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 24px;
  }
  .card-logo { font-family: var(--pb-font-heading); font-size: calc(34px * var(--pb-template-text-scale, 1)); }
  .card-logo .logo-play { color: var(--pb-color-white); font-weight: 800; letter-spacing: -0.02em; }
  .card-logo .logo-book { color: var(--pb-color-secondary); font-weight: 300; text-transform: uppercase; letter-spacing: 0.08em; }
  .internal-badge {
    font-family: var(--pb-font-heading);
    font-weight: 700;
    font-size: calc(17px * var(--pb-template-text-scale, 1));
    color: var(--pb-color-accent);
    background: rgba(255,107,53,0.15);
    padding: 8px 18px;
    border-radius: 100px;
  }
  .staff-headline {
    font-family: var(--pb-font-heading);
    font-weight: 700;
    font-size: calc(58px * var(--pb-template-text-scale, 1));
    color: var(--pb-color-white);
    line-height: 1.3;
  }

  .staff-content {
    flex: 1;
    padding: 40px 56px;
  }

  .staff-item {
    display: flex;
    gap: 24px;
    margin-bottom: 32px;
    align-items: flex-start;
  }
  .item-number {
    width: 60px;
    height: 60px;
    min-width: 60px;
    border-radius: 50%;
    background: var(--pb-color-primary);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--pb-font-heading);
    font-weight: 800;
    font-size: calc(26px * var(--pb-template-text-scale, 1));
    color: var(--pb-color-secondary);
    margin-top: 2px;
  }
  .item-content strong {
    font-family: var(--pb-font-heading);
    font-weight: 700;
    font-size: calc(27px * var(--pb-template-text-scale, 1));
    color: var(--pb-color-primary);
    display: block;
    margin-bottom: 8px;
    line-height: 1.4;
  }
  .item-content p {
    font-size: calc(22px * var(--pb-template-text-scale, 1));
    color: var(--pb-color-neutral-700);
    line-height: 1.7;
  }
  .item-content .highlight {
    color: var(--pb-color-secondary);
    font-weight: 600;
  }
  .item-content strong.swap {
    display: inline;
    font-family: var(--pb-font-body);
    font-size: inherit;
    color: var(--pb-color-primary);
    font-weight: 700;
    margin: 0;
  }

  .staff-footer {
    background: var(--pb-color-primary);
    padding: 32px 56px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 24px;
  }
  .footer-helpline {
    font-family: var(--pb-font-mono);
    font-weight: 700;
    font-size: calc(32px * var(--pb-template-text-scale, 1));
    color: var(--pb-color-secondary);
  }
  .footer-note {
    font-size: calc(19px * var(--pb-template-text-scale, 1));
    color: var(--pb-color-neutral-500);
  }
</style>
  <link rel="stylesheet" href="brand-inject.css">
  <style>
    /* Locale-specific font cascade override — must come AFTER brand-inject.css to win */
    :root {
      --pb-font-heading: 'Inter', 'Noto Sans SC', system-ui, -apple-system, sans-serif;
      --pb-font-body: 'Inter', 'Noto Sans SC', system-ui, sans-serif;
    }
  </style>
  </head>
<body>
<div class="sign-staff">

  <div class="staff-header">
    <div class="header-top">
      <span class="card-logo"><span class="logo-play">Play</span><span class="logo-book">book</span></span>
      <span class="internal-badge">内部使用</span>
    </div>
    <div class="staff-headline">员工须知五项要点</div>
  </div>

  <div class="staff-content">
    <div class="staff-item">
      <div class="item-number">1</div>
      <div class="item-content">
        <strong>玩家具备相关工具。</strong>
        <p>限额、提醒及仪表板均位于账户设置中。</p>
      </div>
    </div>

    <div class="staff-item">
      <div class="item-number">2</div>
      <div class="item-content">
        <strong>使用 Playbook 规范用语。</strong>
        <p>应使用<strong class="swap">「工具」</strong>而非「介入」；使用<strong class="swap">「玩家」</strong>而非「赌徒」；使用<strong class="swap">「咨询」</strong>而非「自我评估」。</p>
      </div>
    </div>

    <div class="staff-item">
      <div class="item-number">3</div>
      <div class="item-content">
        <strong>熟记支援热线。</strong>
        <p><span class="highlight">{{HELPLINE_NUMBER}}</span> — 免费、保密、24 小时服务。</p>
      </div>
    </div>

    <div class="staff-item">
      <div class="item-number">4</div>
      <div class="item-content">
        <strong>以审慎方式提供支援。</strong>
        <p>切勿作出任何判断。仅需表示：「请参阅我方提供的支援资讯卡。」</p>
      </div>
    </div>

    <div class="staff-item">
      <div class="item-number">5</div>
      <div class="item-content">
        <strong>玩家教育资料位于内容中心。</strong>
        <p>对此感兴趣的玩家，可引导前往 Playbook 专区。</p>
      </div>
    </div>
  </div>

  <div class="staff-footer">
    <span class="footer-helpline">{{HELPLINE_NUMBER}}</span>
    <span class="footer-note">内部使用</span>
  </div>

</div>
</body>
</html>
