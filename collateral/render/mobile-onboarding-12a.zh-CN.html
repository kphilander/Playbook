<!DOCTYPE html>
<html lang="zh-Hans">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=420">
<title>移动入门 — 欢迎 — Tier 1</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800;900&family=Noto+Sans+SC:wght@300;400;600;700;800;900&family=Source+Code+Pro:wght@500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { margin: 0; padding: 0; background: transparent; }

  .mobile-onboarding {
    width: 420px;
    height: 812px;
    background: var(--pb-color-primary);
    font-family: var(--pb-font-body);
    color: var(--pb-color-white);
    display: flex;
    flex-direction: column;
    position: relative;
    overflow: hidden;
  }

  /* Gradient accent bar */
  .accent-bar {
    height: 8px;
    background: linear-gradient(90deg, var(--pb-color-accent), var(--pb-color-secondary));
    flex-shrink: 0;
  }

  /* Header */
  .header {
    padding: 32px 32px 0;
    position: relative;
    z-index: 1;
  }
  .card-logo {
    font-family: var(--pb-font-heading);
    font-size: calc(30px * var(--pb-template-text-scale, 1));
  }
  .card-logo .logo-play {
    color: var(--pb-color-white);
    font-weight: 800;
    letter-spacing: -0.02em;
  }
  .card-logo .logo-book {
    color: var(--pb-color-secondary);
    font-weight: 300;
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  /* Content */
  .content {
    padding: 36px 32px 0;
    flex: 1;
    display: flex;
    flex-direction: column;
    position: relative;
    z-index: 1;
  }

  .headline {
    font-family: var(--pb-font-heading);
    font-weight: 700;
    font-size: calc(34px * var(--pb-template-text-scale, 1));
    color: var(--pb-color-white);
    line-height: 1.4;
    margin-bottom: 10px;
  }
  .subhead {
    font-family: var(--pb-font-body);
    font-size: calc(18px * var(--pb-template-text-scale, 1));
    color: var(--pb-color-neutral-300);
    line-height: 1.7;
    margin-bottom: 32px;
  }

  /* Feature cards */
  .feature-list {
    display: flex;
    flex-direction: column;
    gap: 14px;
    margin-bottom: 36px;
  }
  .feature-card {
    display: flex;
    align-items: flex-start;
    gap: 16px;
    padding: 18px 20px;
    background: var(--pb-color-primary-light);
    border-radius: 12px;
  }
  .feature-number {
    width: 36px;
    height: 36px;
    min-width: 36px;
    border-radius: 50%;
    background: var(--pb-color-secondary);
    color: var(--pb-color-primary);
    font-family: var(--pb-font-heading);
    font-weight: 700;
    font-size: calc(17px * var(--pb-template-text-scale, 1));
    display: flex;
    align-items: center;
    justify-content: center;
    line-height: 1;
  }
  .feature-text {
    flex: 1;
  }
  .feature-title {
    font-family: var(--pb-font-heading);
    font-weight: 700;
    font-size: calc(17px * var(--pb-template-text-scale, 1));
    color: var(--pb-color-white);
    margin-bottom: 6px;
  }
  .feature-desc {
    font-family: var(--pb-font-body);
    font-size: calc(16px * var(--pb-template-text-scale, 1));
    color: var(--pb-color-neutral-300);
    line-height: 1.7;
  }

  /* CTA */
  .cta-button {
    display: block;
    width: 100%;
    padding: 16px;
    background: var(--pb-color-secondary);
    color: var(--pb-color-primary);
    font-family: var(--pb-font-heading);
    font-weight: 700;
    font-size: calc(17px * var(--pb-template-text-scale, 1));
    text-align: center;
    border: none;
    border-radius: 12px;
    margin-top: auto;
  }

  /* Footer */
  .footer {
    padding: 20px 32px 28px;
    text-align: center;
    position: relative;
    z-index: 1;
  }
  .footer-helpline {
    font-family: var(--pb-font-mono);
    font-weight: 600;
    font-size: calc(17px * var(--pb-template-text-scale, 1));
    color: var(--pb-color-neutral-300);
    display: block;
    margin-bottom: 4px;
  }
  .footer-legal {
    font-family: var(--pb-font-body);
    font-size: calc(13px * var(--pb-template-text-scale, 1));
    color: var(--pb-color-neutral-500);
  }
</style>
  <link rel="stylesheet" href="brand-inject.css">
  <style>
    /* Locale-specific font cascade override — must come AFTER brand-inject.css to win */
    :root {
      --pb-font-heading: 'Inter', 'Noto Sans SC', system-ui, -apple-system, sans-serif;
      --pb-font-body: 'Inter', 'Noto Sans SC', system-ui, sans-serif;
    }
  </style>
  </head>
<body>
<div class="mobile-onboarding">

  <div class="accent-bar"></div>

  <div class="header">
    <span class="card-logo"><span class="logo-play">Play</span><span class="logo-book">book</span></span>
  </div>

  <div class="content">
    <h1 class="headline">欢迎使用 Playbook</h1>
    <p class="subhead">真实赔率、实用工具、由玩家自主决定。</p>

    <div class="feature-list">
      <div class="feature-card">
        <div class="feature-number">1</div>
        <div class="feature-text">
          <div class="feature-title">了解赔率</div>
          <div class="feature-desc">查看各款游戏的庄家优势</div>
        </div>
      </div>
      <div class="feature-card">
        <div class="feature-number">2</div>
        <div class="feature-text">
          <div class="feature-title">设定限额</div>
          <div class="feature-desc">存款上限、游戏时长提醒，规则由玩家自主设定</div>
        </div>
      </div>
      <div class="feature-card">
        <div class="feature-number">3</div>
        <div class="feature-text">
          <div class="feature-title">追踪游戏数据</div>
          <div class="feature-desc">活动仪表板一目了然</div>
        </div>
      </div>
    </div>

    <button class="cta-button">立即开始</button>
  </div>

  <div class="footer">
    <span class="footer-helpline">24小时支援：{{HELPLINE_NUMBER}}</span>
    <span class="footer-legal">{{AGE_DISCLAIMER}}</span>
  </div>

</div>
</body>
</html>
