# Sample _brand.yml — Japanese operator preview
# ================================================
# Drop this into the "Upload _brand.yml" drop zone on rg-page.html
# (inside the "Try your brand" modal). The page will:
#   • Set <html lang="ja">
#   • Load Noto Sans JP
#   • Swap static copy, glossary, and quizzes to Japanese (elder/reserved tone)
#   • Fetch api/myths.ja.json for the quiz content
#
# Combine with brand-inject.css from the Playbook configurator to also
# substitute {{PROGRAM_NAME}}, {{ORGANIZATION}}, {{HELPLINE_NUMBER}}, etc.

meta:
  program_name: "SakuraPlay"
  organization: "Neko Gaming Ltd."
  website: "https://sakuraplay.example.jp"
  contact_email: "support@sakuraplay.example.jp"
  primary_jurisdictions:
    - japan

legal:
  minimum_gambling_age:
    japan: 20

cultural_profile:
  voice: "elder"
  framing: "communal"
  humor: "understated"
  directness: "contextual"
  comfort: "reserved"
