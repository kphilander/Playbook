      dimensions:
        framing:
          communal: "Decide on a betting budget that leaves the things beyond the bet — the plans, the people — untouched."
        voice:
          authority: "Establish a designated bankroll and a fixed percentage for individual wagers prior to placing bets."

    - original: "The line already knows what you know."
      section: "Tips for informed play — Tip 5"
      dimensions:
        framing:
          communal: "The odds already reflect what's publicly known — chasing an edge that isn't there can cost more than the bet itself."

