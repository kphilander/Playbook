# Game Guide Cultural Adaptation Notes
# ======================================
# Phrase-level adaptation variants for how-to-play game guides.
#
# Each entry identifies a culture-dependent phrase in a game guide
# and provides variants for the relevant cultural dimensions.
#
# Default voice: peer / individual / irreverent / blunt / open
#
# Usage: When adapting a game guide, find the section by guide name,
# locate the original phrase, and replace with the appropriate variant.
#
# Dimensions:
#   voice:       peer (default) | authority | elder
#   framing:     individual (default) | communal
#   humor:       irreverent (default) | warm | understated | minimal
#   directness:  blunt (default) | diplomatic | contextual
#   comfort:     open (default) | reserved | private

# ──────────────────────────────────────────────────────────────────────────────
# SHARED PHRASES
# The following phrases appear identically across all game guides.
# They are listed once here for reference rather than repeated per game.
#
# "No fine print." (Introduction / header)
#   humor:
#     warm: "We wrote it all down. The whole thing."
#     understated: "The details. All of them, for once."
#     minimal: "Full disclosure provided."
#   voice:
#     authority: "Full transparency on game mechanics and odds."
#     elder: "Everything you need to know, laid out honestly."
# ──────────────────────────────────────────────────────────────────────────────

# ==========================================================================
# SLOTS
# ==========================================================================
slots:
  title: "Slots"
  file: "how-to-play/slots.md"
  phrases:

    # --- Humor-dependent ---

    - original: "Your slot machine has the emotional range of a toaster."
      section: "Social snippets — Snippet 1"
      dimensions:
        humor:
          warm: "The machine doesn't pick sides. It treats every spin the same way it treated the last one."
          understated: "The machine does not have an opinion about your strategy. It does not have opinions."
          minimal: "The machine does not respond to previous results or player behavior."
        comfort:
          reserved: "The random number generator treats every outcome identically."
          private: "Each outcome is generated independently by the system."

    - original: "TL;DR for the impatient"
      section: "Quick-scan index"
      dimensions:
        humor:
          warm: "Short on time? Here's everything that matters."
          understated: "For those disinclined to linger"
          minimal: "Summary"
        voice:
          authority: "Executive summary"
          elder: "The key points at a glance"

    - original: "The spinning reels are just the show."
      section: "How the game works — The basics"
      dimensions:
        humor:
          warm: "By the time the reels spin, the result is already settled. The show is for us."
          understated: "The reels are, at that point, performing. The decision was made earlier."
          minimal: "The reel animation displays a result already determined by the RNG."
        voice:
          authority: "The reel animation serves as a visual display mechanism for the predetermined outcome."

    # --- Individual-framing ---

    - original: "Set your budget before you press spin."
      section: "Tips for informed play — Tip 4"
      dimensions:
        framing:
          communal: "Setting a budget before playing helps protect the plans, people, and priorities beyond the game."
        voice:
          authority: "Players are advised to establish a session budget prior to commencing play."
          elder: "Before you start, it's worth deciding what you're comfortable spending — it helps you enjoy the game without second-guessing later."

    - original: "Decide what you're willing to spend for the session and stick to it."
      section: "Tips for informed play — Tip 4"
      dimensions:
        framing:
          communal: "Decide what's comfortable given the commitments beyond the game, and keep to it."
        voice:
          authority: "Establish a predetermined session limit and adhere to it throughout play."

    # --- Blunt evaluative ---

    - original: "Every spin is independent. What happened on the last spin — or the last 1,000 spins — has zero effect on the next one. The RNG doesn't keep score."
      section: "Tips for informed play — Tip 5"
      dimensions:
        directness:
          diplomatic: "Each spin is a fresh, independent event. Previous outcomes have no influence on future results — the RNG treats every spin as if it were the first."
          contextual: "Something worth understanding about the RNG: it generates each outcome independently. Whether you've had ten wins or a thousand losses, the next spin is determined the same way as the very first one."
        voice:
          authority: "Each spin constitutes an independent random event. Prior outcomes bear no statistical relationship to subsequent results."

    # --- Currency-dependent ---

    - original: "A $0.50 bet every 3 seconds."
      section: "Social snippets — Snippet 3"
      dimensions:
        # Note: Replace currency values with local equivalents.
        # This entry flags the phrase for adaptation.
        humor:
          warm: "Most people don't clock the speed until they do the maths."
          understated: "Three seconds per spin. Not without a certain urgency."
          minimal: "Slot play operates at a high wagering pace."

    - original: "That's how fast modern slots play. At that pace, you're wagering about $600 per hour — even on a \"penny\" machine."
      section: "Social snippets — Snippet 3"
      dimensions:
        framing:
          communal: "At that pace, spending can add up in ways that reach beyond the session — even on low-denomination machines."
        directness:
          diplomatic: "At that pace, total wagers can accumulate to a meaningful amount per hour, even on lower-denomination machines."

    - original: "Betting more per spin does not improve your odds."
      section: "Bet types — Key point"
      dimensions:
        directness:
          diplomatic: "The house edge applies as a percentage regardless of bet size — larger bets produce proportionally larger wins and losses at the same rate."
          contextual: "Whether you compare a smaller wager to a larger one, the percentage the machine retains is identical. The scale changes; the math does not."

    # --- Comfort-dependent ---

    - original: "Everything you need to know about slot machines — how they work, what the numbers mean, and why no strategy changes the math."
      section: "Introduction"
      dimensions:
        comfort:
          reserved: "A clear look at how slot machines operate — the mechanics, the numbers, and the mathematics behind every spin."
          private: "Understanding how random number generation works in electronic gaming — the mechanics and mathematics that determine outcomes."

# ==========================================================================
# BLACKJACK
# ==========================================================================
blackjack:
  title: "Blackjack"
  file: "how-to-play/blackjack.md"
  phrases:

    # --- Blunt evaluative ---

    - original: "Insurance in particular is almost always a bad deal mathematically."
      section: "Bet types — Key point"
      dimensions:
        directness:
          diplomatic: "Insurance carries a significantly higher house edge than the base game, making it a less favorable option for most players."
          contextual: "The house edge on insurance is 7.7%. The house edge on the base game is 0.5%. Side by side, the difference is substantial."
        voice:
          authority: "Statistical analysis consistently demonstrates that the insurance bet offers unfavorable expected value, with a house edge of approximately 7.7%."
          elder: "Insurance might feel like a safety net, but when you look at the numbers — a 7.7% house edge versus 0.5% on the main game — most experienced players pass on it."

    - original: "Basic strategy says: skip it."
      section: "Bet types — Key point"
      dimensions:
        directness:
          diplomatic: "Basic strategy recommends declining insurance in virtually all situations."
          contextual: "Basic strategy is built on expected value calculations. Its position on insurance follows from the same math."
        humor:
          warm: "Basic strategy has a one-word answer here: pass."
          understated: "Basic strategy's position on insurance is not, shall we say, ambiguous."
          minimal: "Basic strategy recommends declining insurance."

    - original: "The dealer has no choices. None."
      section: "Social snippets — Snippet 3"
      dimensions:
        humor:
          warm: "The dealer follows a script. You're the only one at the table making choices."
          understated: "The dealer follows the rules. All of them. Every time. Without exception."
          minimal: "The dealer follows fixed rules with no decision-making discretion."
        voice:
          authority: "Dealer play is entirely governed by predetermined house rules, with no discretionary decisions."

    - original: "That's the math, not a mood."
      section: "Social snippets — Snippet 3"
      dimensions:
        humor:
          warm: "That's just what the numbers do. Every time, same answer."
          understated: "Arithmetic, not attitude."
          minimal: "This is a statistical average derived from standard dealing rules."

    # --- Individual-framing ---

    - original: "Set your budget before you play."
      section: "Tips for informed play — Tip 4"
      dimensions:
        framing:
          communal: "Setting a budget before playing helps protect the plans and priorities that matter most — the ones beyond the table."

    - original: "Decide on a session bankroll and a bet size."
      section: "Tips for informed play — Tip 4"
      dimensions:
        framing:
          communal: "Settle on a session amount that leaves room for the commitments that matter most."
        voice:
          authority: "Establish predetermined session and unit-bet limits prior to play."

    - original: "Don't worry about other players."
      section: "Tips for informed play — Tip 5"
      dimensions:
        framing:
          communal: "Your hand plays out against the dealer alone — what matters is making decisions you're comfortable with when you step away from the table."
        directness:
          diplomatic: "Each hand plays out against the dealer independently, so other players' decisions have no mathematical effect on your outcome."

    # --- Currency examples ---

    - original: "On a $10 bet, that's $12 instead of $15."
      section: "Bet types — 6:5 vs. 3:2 blackjack"
      dimensions:
        directness:
          diplomatic: "The difference in payout may seem small on a single hand, but it compounds meaningfully over a session."
          contextual: "Comparing the two payout structures side by side reveals a meaningful difference that grows with each natural blackjack dealt."

    - original: "This single rule change increases the house edge by about 1.4%. Check the table sign before you sit down."
      section: "Bet types — 6:5 vs. 3:2 blackjack"
      dimensions:
        directness:
          diplomatic: "This rule difference increases the house edge by about 1.4%, which is worth checking before choosing a table."
          contextual: "The posted payout ratio is visible on the table sign. It varies from table to table, and a 1.4% difference in house edge follows from it."

