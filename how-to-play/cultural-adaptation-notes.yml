# BACCARAT
# ==========================================================================
baccarat:
  title: "Baccarat"
  file: "how-to-play/baccarat.md"
  phrases:

    # --- Blunt evaluative ---

    - original: "Skip the Tie bet."
      section: "Tips for informed play — Tip 2"
      dimensions:
        directness:
          diplomatic: "The Tie bet offers a notably higher house edge than the main bets — 14.4% compared to 1.06% for Banker."
          contextual: "Comparing the three available bets side by side, the Tie bet's 14.4% house edge stands in sharp contrast to the Banker bet's 1.06% and the Player bet's 1.24%."
        voice:
          authority: "The Tie bet carries a 14.4% house edge and is not recommended by standard probability analysis."
          elder: "The Tie payout might look appealing at 8:1, but when you see that it hits only about 9.5% of the time, the cost becomes clear."

    - original: "The 8:1 payout looks attractive. The 14.4% house edge isn't."
      section: "Tips for informed play — Tip 2"
      dimensions:
        directness:
          diplomatic: "The 8:1 payout on the Tie bet is appealing, but the underlying probability makes it significantly more expensive than the main bets."
          contextual: "An 8:1 payout naturally draws attention. Ties occur about 9.5% of the time; the payout would need them to occur about 11.1% of the time to break even. That gap is where the 14.4% house edge lives."
        humor:
          warm: "8:1 looks good on the felt. The 14.4% house edge is the part that doesn't make the sign."
          understated: "The 8:1 is prominently displayed. The 14.4% house edge, one notices, somewhat less so."
          minimal: "The Tie bet pays 8:1 with a 14.4% house edge. Actual tie frequency is 9.5%; break-even requires 11.1%."

    - original: "The Tie bet pays 8:1. The house edge is 14.4%."
      section: "Social snippets — Snippet 2"
      dimensions:
        directness:
          diplomatic: "The Tie bet's 8:1 payout comes with a 14.4% house edge — notably higher than the main bets."
          contextual: "Side by side, the numbers on the Tie bet reveal a significant gap: an 8:1 payout, but a 14.4% house edge. The Banker bet, by comparison, sits at 1.06%."

    - original: "That's roughly 13 times worse than the Banker bet — on the same table, in the same game."
      section: "The math — What this means for your wallet"
      dimensions:
        directness:
          diplomatic: "The difference between the Tie and Banker house edges is significant — more than a tenfold increase, despite being bets on the same table."
          contextual: "Placing these numbers next to each other makes the scale of the difference clear: $14.40 per $100 wagered on Tie, versus $1.06 per $100 on Banker."

    # --- Humor-dependent ---

    - original: "Those scorecards? Entertainment, not prediction."
      section: "Social snippets — Snippet 3"
      dimensions:
        humor:
          warm: "Scorecards are part of the ritual. They show you where you've been, not where you're going."
          understated: "The scorecards are meticulous historians. Prophets, they are not."
          minimal: "Scorecards record past results. They have no predictive value."
        voice:
          authority: "Baccarat scorecards document historical outcomes. Each hand is an independent event; previous results have no statistical bearing on future hands."

    # --- Individual-framing ---

    - original: "Set your session budget."
      section: "Tips for informed play — Tip 5"
      dimensions:
        framing:
          communal: "Setting a session budget helps ensure the evening stays enjoyable without affecting the commitments that matter most."
        voice:
          authority: "Players should establish a predetermined session budget based on the expected pace of play and unit bet size."

    # --- Comfort-dependent ---

    - original: "Everything you need to know about baccarat — the rules, the three bets, and why the simplest game on the floor has some of the best odds."
      section: "Introduction"
      dimensions:
        comfort:
          reserved: "A guide to baccarat mechanics — the rules, bet types, and the mathematics that make it one of the most favorable table games."
          private: "Understanding probability in card comparison games — the rules, decision structure, and mathematical expectations."

