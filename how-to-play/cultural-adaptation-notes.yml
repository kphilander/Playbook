          understated: "The displays are thorough records of what has happened. What happens next, they cannot say."
          minimal: "Electronic result displays have no predictive value for future spins."
        voice:
          authority: "Electronic result displays provide historical data only. They have no predictive value for future outcomes."

    # --- Individual-framing ---

    - original: "Set your budget per session."
      section: "Tips for informed play — Tip 5"
      dimensions:
        framing:
          communal: "Setting a session budget helps ensure the evening's entertainment stays within what's comfortable for you and those counting on you."
        voice:
          authority: "Players should establish a predetermined budget for each session prior to play."

    # --- Comfort-dependent ---

    - original: "Everything you need to know about roulette — the wheel, the bets, and why the number of zeros changes everything."
      section: "Introduction"
      dimensions:
        comfort:
          reserved: "A clear guide to roulette mechanics — wheel types, bet structures, and how the mathematics differ between game variants."
