          contextual: "When compared to every other bet on the table, the five-number bet carries a noticeably higher house edge — 7.89% versus the standard 5.26%."
        voice:
          authority: "This bet is not recommended based on its unfavorable house edge of 7.89%."
          elder: "It's worth knowing that this particular bet costs more than any other option on the table — and there's no strategic reason to take it."

    - original: "Skip the five-number bet on American roulette."
      section: "Tips for informed play — Tip 4"
      dimensions:
        directness:
          diplomatic: "The five-number bet on American roulette carries a higher house edge than any other bet on the table — 7.89% versus 5.26%."
          contextual: "Among all the bets available on an American roulette table, one stands apart: the five-number bet, at 7.89%, carries a measurably higher cost than the standard 5.26%."
        voice:
          authority: "The five-number bet (0, 00, 1, 2, 3) carries a 7.89% house edge — the highest on the table — and is not recommended under any strategy."

    - original: "The worst bet on the table."
      section: "Tips for informed play — Tip 4"
      dimensions:
        directness:
          diplomatic: "The most expensive bet on the table in terms of house edge."
          contextual: "The bet with the highest mathematical cost to the player."
