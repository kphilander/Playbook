<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" font-family="system-ui, -apple-system, sans-serif">
  <!-- Background -->
  <rect width="800" height="480" rx="12" fill="#1B2838"/>

  <!-- Title -->
  <text x="40" y="44" fill="#FF6B35" font-size="13" font-weight="700" letter-spacing="1.5">CRAPS BETS BY HOUSE EDGE</text>
  <line x1="40" y1="56" x2="760" y2="56" stroke="#2A3F56" stroke-width="1"/>

  <!-- Legend -->
  <rect x="40" y="70" width="16" height="16" rx="3" fill="#00D4AA"/>
  <text x="62" y="83" fill="#A8A8C0" font-size="12">Good bets (under 2%)</text>
  <rect x="260" y="70" width="16" height="16" rx="3" fill="#FFB300"/>
  <text x="282" y="83" fill="#A8A8C0" font-size="12">Moderate (2-5%)</text>
  <rect x="460" y="70" width="16" height="16" rx="3" fill="#FF3D00"/>
  <text x="482" y="83" fill="#A8A8C0" font-size="12">Avoid (9%+)</text>

  <!-- Column headers -->
  <text x="40" y="118" fill="#6B6B8A" font-size="12" font-weight="700" letter-spacing="1">BET</text>
  <text x="340" y="118" fill="#6B6B8A" font-size="12" font-weight="700" letter-spacing="1">HOUSE EDGE</text>
  <text x="540" y="118" fill="#6B6B8A" font-size="12" font-weight="700" letter-spacing="1">EDGE BAR</text>

  <!-- Good bets -->
  <text x="40" y="152" fill="#FFFFFF" font-size="14" font-weight="600">Odds (behind Pass/DP)</text>
  <text x="340" y="152" fill="#00D4AA" font-size="16" font-weight="700">0%</text>
  <rect x="540" y="140" width="200" height="16" rx="3" fill="#2A3F56"/>
  <rect x="540" y="140" width="1" height="16" rx="1" fill="#00D4AA"/>

  <line x1="40" y1="168" x2="760" y2="168" stroke="#2A3F56" stroke-width="0.5"/>
  <text x="40" y="192" fill="#FFFFFF" font-size="14" font-weight="600">Don't Pass / Don't Come</text>
  <text x="340" y="192" fill="#00D4AA" font-size="16" font-weight="700">1.36%</text>
  <rect x="540" y="180" width="200" height="16" rx="3" fill="#2A3F56"/>
  <rect x="540" y="180" width="16" height="16" rx="3" fill="#00D4AA"/>

  <line x1="40" y1="208" x2="760" y2="208" stroke="#2A3F56" stroke-width="0.5"/>
  <text x="40" y="232" fill="#FFFFFF" font-size="14" font-weight="600">Pass / Come</text>
  <text x="340" y="232" fill="#00D4AA" font-size="16" font-weight="700">1.41%</text>
  <rect x="540" y="220" width="200" height="16" rx="3" fill="#2A3F56"/>
  <rect x="540" y="220" width="17" height="16" rx="3" fill="#00D4AA"/>

  <!-- Moderate bets -->
  <line x1="40" y1="252" x2="760" y2="252" stroke="#2A3F56" stroke-width="0.5"/>
  <text x="40" y="276" fill="#FFFFFF" font-size="14" font-weight="600">Place 6 or 8</text>
  <text x="340" y="276" fill="#FFB300" font-size="16" font-weight="700">1.52%</text>
  <rect x="540" y="264" width="200" height="16" rx="3" fill="#2A3F56"/>
  <rect x="540" y="264" width="18" height="16" rx="3" fill="#FFB300"/>

  <line x1="40" y1="292" x2="760" y2="292" stroke="#2A3F56" stroke-width="0.5"/>
  <text x="40" y="316" fill="#FFFFFF" font-size="14" font-weight="600">Field (double on 12)</text>
  <text x="340" y="316" fill="#FFB300" font-size="16" font-weight="700">2.78%</text>
  <rect x="540" y="304" width="200" height="16" rx="3" fill="#2A3F56"/>
  <rect x="540" y="304" width="33" height="16" rx="3" fill="#FFB300"/>

  <!-- Bad bets -->
  <line x1="40" y1="336" x2="760" y2="336" stroke="#2A3F56" stroke-width="0.5"/>
  <text x="40" y="360" fill="#FFFFFF" font-size="14" font-weight="600">Hardways (6, 8)</text>
  <text x="340" y="360" fill="#FF3D00" font-size="16" font-weight="700">9.09%</text>
  <rect x="540" y="348" width="200" height="16" rx="3" fill="#2A3F56"/>
  <rect x="540" y="348" width="108" height="16" rx="3" fill="#FF3D00"/>

  <line x1="40" y1="376" x2="760" y2="376" stroke="#2A3F56" stroke-width="0.5"/>
  <text x="40" y="400" fill="#FFFFFF" font-size="14" font-weight="600">Any 7 / Big Red</text>
  <text x="340" y="400" fill="#FF3D00" font-size="16" font-weight="700">16.67%</text>
  <rect x="540" y="388" width="200" height="16" rx="3" fill="#2A3F56"/>
  <rect x="540" y="388" width="200" height="16" rx="3" fill="#FF3D00"/>

  <!-- Divider -->
  <line x1="40" y1="420" x2="760" y2="420" stroke="#2A3F56" stroke-width="1"/>

  <!-- Key takeaway -->
  <text x="40" y="450" fill="#FFFFFF" font-size="14" font-weight="700">Key takeaway</text>
  <text x="40" y="472" fill="#A8A8C0" font-size="13">The layout is designed to put the worst bets front and center. The best bets are at the edges of the table.</text>
</svg>
