<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" font-family="system-ui, -apple-system, sans-serif">
  <!-- Background -->
  <rect width="800" height="400" rx="12" fill="#1B2838"/>

  <!-- Title -->
  <text x="40" y="44" fill="#FF6B35" font-size="13" font-weight="700" letter-spacing="1.5">BACCARAT BETS COMPARED</text>
  <line x1="40" y1="56" x2="760" y2="56" stroke="#2A3F56" stroke-width="1"/>

  <!-- Column headers -->
  <text x="40" y="88" fill="#6B6B8A" font-size="12" font-weight="700" letter-spacing="1">BET</text>
  <text x="240" y="88" fill="#6B6B8A" font-size="12" font-weight="700" letter-spacing="1">PAYS</text>
  <text x="400" y="88" fill="#6B6B8A" font-size="12" font-weight="700" letter-spacing="1">HOUSE EDGE</text>
  <text x="580" y="88" fill="#6B6B8A" font-size="12" font-weight="700" letter-spacing="1">COST PER $100</text>

  <!-- Row 1: Banker -->
  <text x="40" y="130" fill="#FFFFFF" font-size="16" font-weight="600">Banker</text>
  <text x="240" y="130" fill="#A8A8C0" font-size="15">1:1 (minus 5% comm.)</text>
  <text x="400" y="130" fill="#00D4AA" font-size="18" font-weight="700">1.06%</text>
  <text x="580" y="130" fill="#00D4AA" font-size="15" font-weight="600">$1.06</text>

  <!-- Row 2: Player -->
  <line x1="40" y1="152" x2="760" y2="152" stroke="#2A3F56" stroke-width="0.5"/>
  <text x="40" y="182" fill="#FFFFFF" font-size="16" font-weight="600">Player</text>
  <text x="240" y="182" fill="#A8A8C0" font-size="15">1:1</text>
  <text x="400" y="182" fill="#00D4AA" font-size="18" font-weight="700">1.24%</text>
  <text x="580" y="182" fill="#00D4AA" font-size="15" font-weight="600">$1.24</text>

  <!-- Row 3: Tie -->
  <line x1="40" y1="204" x2="760" y2="204" stroke="#2A3F56" stroke-width="0.5"/>
  <text x="40" y="234" fill="#FFFFFF" font-size="16" font-weight="600">Tie</text>
  <text x="240" y="234" fill="#A8A8C0" font-size="15">8:1</text>
  <text x="400" y="234" fill="#FF3D00" font-size="18" font-weight="700">14.4%</text>
  <text x="580" y="234" fill="#FF3D00" font-size="15" font-weight="600">$14.40</text>

  <!-- Row 4: Pair side bets -->
  <line x1="40" y1="256" x2="760" y2="256" stroke="#2A3F56" stroke-width="0.5"/>
  <text x="40" y="286" fill="#FFFFFF" font-size="16" font-weight="600">Pair side bets</text>
  <text x="240" y="286" fill="#A8A8C0" font-size="15">11:1</text>
  <text x="400" y="286" fill="#FF3D00" font-size="18" font-weight="700">10.4%</text>
  <text x="580" y="286" fill="#FF3D00" font-size="15" font-weight="600">$10.40</text>

  <!-- Divider -->
  <line x1="40" y1="316" x2="760" y2="316" stroke="#2A3F56" stroke-width="1"/>

  <!-- Key takeaway -->
  <text x="40" y="348" fill="#FFFFFF" font-size="14" font-weight="700">Key takeaway</text>
  <text x="40" y="372" fill="#A8A8C0" font-size="13">Banker wins slightly more often (45.9% vs. 44.6%). The 5% commission exists because without it, Banker would be a free edge.</text>
</svg>
