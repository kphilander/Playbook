# Sample _brand.yml — UAE locale preview
# ==========================================
# Region-only demo, used by the "AE · العربية" preset chip on rg-page.html.
# The page will:
#   • Set <html lang="ar" dir="rtl">
#   • Load Noto Sans Arabic
#   • Mirror the nav, progress bar, and tool cards (RTL)
#   • Swap copy, glossary, and quizzes to Arabic
#     (UAE profile: authority / communal / understated / contextual / private)
#   • Fetch api/myths.ar.json for the quiz content

meta:
  program_name: "UAE"
  organization: "UAE locale demo"
  website: "https://example.ae"
  contact_email: "info@example.ae"
  primary_jurisdictions:
    - united-arab-emirates

legal:
  minimum_gambling_age:
    united-arab-emirates: 21

cultural_profile:
  voice: "authority"
  framing: "communal"
  humor: "understated"
  directness: "contextual"
  comfort: "private"
