<svg xmlns="http://www.w3.org/2000/svg" width="200" height="64" viewBox="0 0 200 64">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter+Tight:wght@800');
  </style>

  <!-- Mark — blue tile reads on any bg -->
  <rect x="6" y="10" width="44" height="44" rx="10" fill="#2563EB"/>
  <polygon points="28,18 42,42 28,36 14,42" fill="#FFFFFF"/>

  <!-- Wordmark — white for dark nav -->
  <text x="62" y="44"
        font-family="'Inter Tight', system-ui, sans-serif"
        font-size="38"
        font-weight="800"
        letter-spacing="-1.6"
        fill="#FFFFFF">North</text>
</svg>
