<svg xmlns="http://www.w3.org/2000/svg" width="240" height="64" viewBox="0 0 240 64">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700');
  </style>

  <!-- Globe mark — oxblood disc with gold meridian + equator lines -->
  <g transform="translate(8, 8)">
    <circle cx="24" cy="24" r="23" fill="#5C1A1B"/>
    <!-- Equator -->
    <ellipse cx="24" cy="24" rx="23" ry="6" fill="none" stroke="#A88E3F" stroke-width="1.2" opacity="0.9"/>
    <!-- Meridian (vertical) -->
    <ellipse cx="24" cy="24" rx="6" ry="23" fill="none" stroke="#A88E3F" stroke-width="1.2" opacity="0.9"/>
    <!-- Outer ring -->
    <circle cx="24" cy="24" r="23" fill="none" stroke="#A88E3F" stroke-width="1.5"/>
  </g>

  <!-- Wordmark — Playfair italic, weighty -->
  <text x="64" y="46"
        font-family="'Playfair Display', Georgia, serif"
        font-size="42"
        font-weight="700"
        font-style="italic"
        fill="#5C1A1B">Atlas</text>

  <!-- Gold rule under wordmark -->
  <line x1="64" y1="54" x2="178" y2="54" stroke="#A88E3F" stroke-width="0.8"/>
</svg>
