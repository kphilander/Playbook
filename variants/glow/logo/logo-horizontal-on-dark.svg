<svg xmlns="http://www.w3.org/2000/svg" width="200" height="64" viewBox="0 0 200 64">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600');
  </style>

  <!-- Sun mark — sand disc with thin cream halo (visible on dark moss bg) -->
  <circle cx="32" cy="32" r="28" fill="none" stroke="#FAF7F2" stroke-width="1.5" opacity="0.5"/>
  <circle cx="32" cy="32" r="22" fill="#D4A574"/>

  <!-- Wordmark — cream Fraunces semibold for legibility on dark moss nav -->
  <text x="72" y="47"
        font-family="'Fraunces', Georgia, serif"
        font-size="44"
        font-weight="600"
        letter-spacing="-1.2"
        fill="#FAF7F2">Glow</text>
</svg>
