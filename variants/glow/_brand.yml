# _brand.yml — Glow (Variant Demo)
# ============================================
# Demonstration fork of Playbook showing the wellness / mindful end of
# the spectrum — what the system looks like when an operator wants
# to position gambling literacy alongside meditation, journaling, and
# personal finance apps.
#
# To use: cp variants/glow/_brand.yml _brand.yml && npm run generate
# ============================================


# ─── META ────────────────────────────────────

meta:
  program_name: "Glow"
  organization: "Your Company Name"
  website: "https://example.com/glow"
  contact_email: "info@example.com"
  year_established: 2026
  version: "0.1.0"
  license: "CC0-1.0"
  primary_jurisdictions:
    - united-states
    - united-kingdom


# ─── BRAND PILLARS ───────────────────────────

brand_pillars:

  - name: "Aware"
    tagline: "Notice the moment"
    description: >
      Gambling well starts with paying attention — to the math,
      to the money, to your own mood. Awareness is the work.

  - name: "Yours"
    tagline: "On your terms"
    description: >
      Limits, sessions, breaks, budgets. The choice is always
      yours. We just make the choice easier to make.


# ─── COLOR PALETTE ───────────────────────────
# Wellness-aesthetic. Mossy greens, warm cream, soft coral accents.
# Reads more "Headspace" than "MGM."

color:
  palette:
    primary: "#2D4A3E"                    # Deep moss
    primary_light: "#4A6B5C"
    primary_dark: "#1A2E26"

    secondary: "#D4A574"                  # Warm sand
    secondary_light: "#E1B98D"
    secondary_dark: "#B8895C"

    accent: "#E8826B"                     # Soft coral (decorative use)
    accent_light: "#F09F8C"
    accent_dark: "#A8472E"                # Deepened terracotta — 5.45:1 on cream (was #C9684F @ 3.52:1)

    neutral_900: "#1F1F1B"
    neutral_700: "#3D3A33"
    neutral_500: "#6B6B65"
    neutral_300: "#A8A6A0"
    neutral_200: "#C8C5BD"
    neutral_100: "#E8E4DA"
    neutral_50: "#FAF7F2"                 # Cream

    success: "#4A8C5A"
    warning: "#D49B3F"
    danger: "#B8453E"
    info: "#5B7DA1"

    white: "#FFFFFF"
    black: "#1A1A17"

  aliases:
    moss: "primary"
    mossLight: "primary_light"
    mossDark: "primary_dark"
    sand: "secondary"
    sandLight: "secondary_light"
    sandDark: "secondary_dark"
    coral: "accent"
    coralLight: "accent_light"
    coralDark: "accent_dark"
    n900: "neutral_900"
    n700: "neutral_700"
    n500: "neutral_500"
    n300: "neutral_300"
    n200: "neutral_200"
    n100: "neutral_100"
    n50: "neutral_50"

  semantic:
    background: "neutral_50"              # Cream page
    surface: "white"
    text_primary: "neutral_900"
    text_secondary: "neutral_700"
    text_muted: "neutral_500"
    link: "primary"                        # Moss links on cream — 9.3:1
    link_hover: "primary_dark"             # 12.5:1
    cta_primary_bg: "primary"              # Moss CTAs feel calm
    cta_primary_text: "neutral_50"         # Cream on moss — 9.3:1
    cta_secondary_bg: "secondary"          # Sand
    cta_secondary_text: "primary_dark"     # Moss-dark on sand — 6.45:1 (was primary @ 4.37:1 — FAIL)
    quiz_correct: "success"
    quiz_incorrect: "danger"
    feature_highlight: "accent_dark"       # Terracotta for emphasis text — 5.45:1 on cream
                                            # (coral #E8826B was 2.51:1 — fails 3:1; coral kept for decorative chips)
    helpline_banner: "primary_dark"
    border: "neutral_300"
    divider: "neutral_100"


# ─── TYPOGRAPHY ──────────────────────────────
# Editorial serif headline + clean grotesque body.
# Reads like a reflective long-read, not a casino.

typography:
  fonts:
    heading:
      family: "Fraunces"
      source: "google"
      weights: [400, 500, 600, 700]
      fallback: "Georgia, 'Times New Roman', serif"
    body:
      family: "Inter"
      source: "google"
      weights: [300, 400, 500, 600]
      fallback: "system-ui, -apple-system, sans-serif"
    monospace:
      family: "JetBrains Mono"
      source: "google"
      weights: [400, 500]
      fallback: "monospace"

  scale:
    display: 3.25
    h1: 2.5
    h2: 2.0
    h3: 1.5
    h4: 1.25
    body_large: 1.125
    body: 1.0
    small: 0.875
    caption: 0.75

  line_height:
    heading: 1.15                         # Tight serif headlines
    body: 1.7                             # Generous, readable
    tight: 1.3


# ─── LOGO ────────────────────────────────────

logo:
  type: "wordmark + leaf-mark"
  font: "Fraunces"
  primary_path: "variants/glow/logo/"


# ─── TONE ────────────────────────────────────

tone:
  humor: "warm"
  formality: "balanced"
  voice_archetype: "reflective-coach"
  gambling_culture: "minimal"

  prefer:
    player: "you"
    informed_play: "intentional play, knowing your numbers, checking in"
    tools: "practices, rituals, check-ins"
    check_in: "pause"
    take_a_break: "step away"
    your_limits: "your boundaries"


# ─── MESSAGING ───────────────────────────────

messaging:
  taglines:
    aware:
      - "Notice the moment."
      - "The math is honest. So can you be."
      - "Aware is enough."
      - "Pay attention. That's the practice."
    yours:
      - "Your limits, your call."
      - "Set the boundary. Keep the play."
      - "Small choices. Real ones."

  ctas:
    primary:
      - "Set an intention"
      - "Check in"
      - "See your numbers"
    features:
      - "Set a boundary"
      - "Plan a session"
      - "Review the week"
    content:
      - "Read the reflection"
      - "Take the practice"
      - "See the breakdown"


# ─── Content Defaults ───────────────────────────────────────────

content_defaults:
  stat_game_1: "Blackjack (basic strategy)"
  stat_value_1: "0.5%"
  stat_note_1: "Most favorable to the player"
  stat_game_2: "American Roulette"
  stat_value_2: "5.26%"
  stat_note_2: "The double zero matters"
  stat_game_3: "Slots (average)"
  stat_value_3: "2–15%"
  stat_note_3: "Each machine is its own number"

  hero_headline: "Play with attention."
  hero_subhead: "The math is public. The choices are yours. Let's make them on purpose."

  quiz_cta: "How well do you know your games?"
  tools_headline: "Small practices. Real boundaries."
  tools_body: "A deposit limit, a session reminder, a weekly check-in. Three minutes to set up. Quiet for the rest of the year."

  support_headline: "Free, confidential support — when you want it."
  support_body: "No pressure. No script. Just someone to talk to."
