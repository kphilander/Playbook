<svg xmlns="http://www.w3.org/2000/svg" width="180" height="140" viewBox="0 0 180 140">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700');
  </style>

  <!-- Dark plate -->
  <rect width="180" height="140" rx="6" fill="#0A0A0F"/>

  <!-- Pulse waveform centered horizontally, upper half -->
  <polyline points="40,52 60,52 72,52 84,28 96,76 108,52 140,52"
            stroke="#00F0FF" stroke-width="4" fill="none"
            stroke-linejoin="round" stroke-linecap="round"/>
  <circle cx="84" cy="28" r="4" fill="#FF2E9A"/>

  <!-- Wordmark below -->
  <text x="90" y="118" text-anchor="middle"
        font-family="'Space Grotesk', sans-serif"
        font-size="42"
        font-weight="700"
        letter-spacing="-1.6"
        fill="#F5F5FA">Pulse</text>
</svg>
