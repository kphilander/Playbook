<svg xmlns="http://www.w3.org/2000/svg" width="240" height="64" viewBox="0 0 240 64">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700');
  </style>

  <!-- Dark plate -->
  <rect width="240" height="64" rx="6" fill="#0A0A0F"/>

  <!-- Heartbeat / pulse waveform — cyan with magenta peak -->
  <polyline points="14,32 28,32 36,32 44,16 52,48 60,32 74,32"
            stroke="#00F0FF" stroke-width="3.5" fill="none"
            stroke-linejoin="round" stroke-linecap="round"/>
  <!-- Magenta peak accent dot -->
  <circle cx="44" cy="16" r="3.5" fill="#FF2E9A"/>

  <!-- Wordmark -->
  <text x="86" y="46"
        font-family="'Space Grotesk', sans-serif"
        font-size="42"
        font-weight="700"
        letter-spacing="-1.6"
        fill="#F5F5FA">Pulse</text>
</svg>
