# ─── CULTURAL PROFILE ───────────────────────
# Five-dimension cultural adapter. Pick one value per spectrum.
# See _taxonomy.yml for all valid values and brand-book/09-cultural-adaptation.md
# for detailed guidance with before/after examples.

cultural_profile:
  voice: "peer"              # peer | authority | elder
  framing: "individual"      # individual | communal
  humor: "irreverent"        # irreverent | warm | understated | minimal
  directness: "blunt"        # blunt | diplomatic | contextual
  comfort: "open"            # open | reserved | private


# ─── COUNTRY CULTURAL PROFILES ──────────────
# Per-country cultural profile overrides for localized collateral.
# Applied at build time based on target jurisdiction. See
# brand-book/09-cultural-adaptation.md for research basis.

country_cultural_profiles:
  japan:
    voice: "elder"           # Respected guidance, not buddy-to-buddy
    framing: "communal"      # Family/workplace context (Hofstede IDV 46)
    humor: "understated"     # Subtle, self-deprecating, absurdist
    directness: "contextual" # High-context ("read the air")
    comfort: "reserved"      # Cautious openness about gambling

  macau:
    voice: "authority"       # Institutional voice (Hofstede PDI 80)
    framing: "communal"      # Family/mianzi (Hofstede IDV 20)
    humor: "minimal"         # Serious tone, no RG humor
    directness: "diplomatic" # Face-saving, never direct confrontation
    comfort: "private"       # Loo et al. 2022: extreme stigma in Chinese communities

  united-arab-emirates:
    voice: "authority"       # High trust in government/institutions
    framing: "communal"      # Islamic ethics, family honor
    humor: "understated"     # Subtle humor OK; Dubai is cosmopolitan
    directness: "contextual" # High-context Arab communication patterns
    comfort: "private"       # Religious + social stigma; maximum confidentiality


# ─── CURRENCY LOCALIZATION ──────────────────
# Per-jurisdiction currency symbols and formatting for templates that
# display monetary amounts (e.g., house edge illustration $1.10).

currency:
  default:
    symbol: "$"
    code: "USD"
    position: "before"        # before | after
    thousands: ","
    decimal: "."

  japan:
    symbol: "¥"
    code: "JPY"
    position: "before"
    thousands: ","
    decimal: "."
    notes: "JPY has no decimal subunit in practice. Round dollar examples to integers: $1.10 → ¥110, $0.10 → ¥10, $2.20 → ¥220."

  macau:
    symbol: "澳门币"
    symbol_intl: "MOP$"
    code: "MOP"
    position: "before"
    thousands: ","
    decimal: "."
    notes: |
      Macau pataca. In Chinese-language content, use 澳门币 (Macau currency, Simplified)
      or 澳門幣 (Traditional). MOP$ is the international banking convention used in
      English-language contexts. ISO 4217 code is MOP. Exchange ~8 MOP per USD as of
      Q2 2026 — round dollar examples: $1.10 → 澳门币 9, $0.10 → 澳门币 1, $2.20 → 澳门币 18.

  united-arab-emirates:
    symbol: "د.إ"
    symbol_intl: "AED"
    code: "AED"
    position: "after"
    thousands: ","
    decimal: "."
    notes: |
      UAE dirham. In Arabic-language content, use د.إ (dirham emirati). AED is the
      ISO 4217 banking code used in international/English contexts. Position is
      "after" because Arabic price convention writes the number followed by the
      currency abbreviation. Exchange ~3.67 AED per USD (pegged). Round examples:
      $1.10 → 4 د.إ, $0.10 → 0.40 د.إ, $2.20 → 8 د.إ.


# ─── LEGAL ───────────────────────────────────

legal:
  terms: "TERMS.md"                    # Indemnification, disclaimers, liability limits
  copyright_holder: "Your Company Name"
  minimum_gambling_age:
    default: 18
    united-states: 21
    united-states-nevada: 21
    canada-british-columbia: 19
    japan: 20                    # Japan age of majority; IR casinos require 20+
    macau: 21                    # Macau casinos require 21+
    united-arab-emirates: 21     # UAE placeholder — verify per licensed venue
  disclaimers:
    age: "You must be {{MIN_AGE}}+ to gamble."
    general: "Gambling involves risk. Play on your terms."


# ─── MESSAGING ───────────────────────────────
# Tagline system — pick what fits your brand, or write your own.
# See brand-book/05-messaging-framework.md for the full system.

messaging:
  taglines:
    open:
      - "Here's how it actually works."
      - "No fine print. Just facts."
      - "The odds are public. Now you know them."
      - "Every game has math. Here's yours."
    social:
      - "Share the facts."
      - "Challenge your friends."
      - "The best players know the game."
      - "How well do you really know the odds?"

  ctas:
    primary:
      - "Take the quiz"
      - "Test your game IQ"
      - "See the real odds"
    features:
      - "Set your limits"
      - "Try the bankroll planner"
      - "Check your stats"
    content:
      - "Read the breakdown"
      - "Watch the explainer"
      - "See how it works"


# ─── Content Defaults ───────────────────────────────────────────
# Default text for collateral templates. Operators can override
# any value here to localize or customize messaging.
content_defaults:
  # Stat block: game examples shown on posters, rack cards, displays
  stat_game_1: "Blackjack (basic strategy)"
  stat_value_1: "0.5%"
  stat_note_1: "Best odds in the casino"
  stat_game_2: "American Roulette"
  stat_value_2: "5.26%"
  stat_note_2: "Double zero = double edge"
  stat_game_3: "Slots (average)"
  stat_value_3: "2–15%"
  stat_note_3: "Varies by machine and casino"

  # Hero messaging
  hero_headline: "Every game has math. Here's yours."
  hero_subhead: "Know the house edge. Pick your games. Set your budget."

  # Quiz CTA
  quiz_cta: "Think you know the odds? Scan to take the quiz"

  # Tools section
  tools_headline: "Your tools. Your limits. Your call."
  tools_body: "Set your deposit limit, session reminders, and activity alerts in your account settings. Takes 10 seconds."

  # Support messaging
  support_headline: "Free, confidential support"
  support_body: "For any question about gambling. No judgment. Ever."


# ─── TONE ────────────────────────────────────
# Voice configuration. The Playbook default is
# "confident myth-buster" — adapt to your brand.

tone:
  humor: "confident-wit"             # minimal | warm | confident-wit
  formality: "conversational"        # formal | balanced | conversational
  voice_archetype: "playbook-voice"     # The friend who knows the game
  gambling_culture: "selective"      # How much industry language to use

  # Tier 1 language preferences
  prefer:
    player: "player (not 'gambler')"
    informed_play: "specific behaviors — e.g. 'set a budget', 'know the odds', 'check your session' (not 'responsible gambling' or 'smart play')"
    tools: "tools / features (not 'interventions')"
    check_in: "check in (not 'self-assess')"
    take_a_break: "take a break (not 'self-exclude' in Tier 1)"
    your_limits: "your limits (not 'restrictions')"

  avoid_in_tier_1:
    - "responsible gambling"
    - "problem gambler"
    - "gambling addiction"
    - "pathological"
    - "intervention"
    - "at-risk"
    - "harm"
    - "disorder"
