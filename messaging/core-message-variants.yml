# ─── OPEN (Transparency) ─────────────────────────

O-1:
  default: "The house edge on blackjack is 0.5%. On slots, it's 2–15%. On American roulette, it's 5.26%. Now you know."
  voice:
    authority: "Industry-standard return rates: blackjack retains 0.5%, slot machines 2–15%, and American roulette 5.26%. These are the published figures."
    elder: "I've watched people play for years without knowing these numbers. Blackjack takes 0.5%. Slots take 2–15%. American roulette takes 5.26%. Worth knowing before you sit down."
  humor:
    warm: "We love this stuff. Blackjack keeps 0.5%, slots keep 2–15%, American roulette keeps 5.26%. Numbers like these are oddly satisfying once you know them."
    understated: "Blackjack: 0.5%. Slots: 2–15%. American roulette: 5.26%. The house did the maths some time ago."
    minimal: "House edge — blackjack: 0.5%. Slots: 2–15%. American roulette: 5.26%."
  framing:
    communal: "The house edge on blackjack is 0.5%, on slots it's 2–15%, and on American roulette it's 5.26%. Numbers worth knowing — especially when your plans extend beyond the table."
  directness:
    diplomatic: "It helps to know the numbers behind each game. Blackjack carries a 0.5% house edge, slots range from 2–15%, and American roulette sits at 5.26%."
    contextual: "Every game is designed to earn revenue over time. The house edge on blackjack is 0.5%, slots range from 2–15%, and American roulette is 5.26%. Side by side, the differences are worth noticing."
  comfort:
    reserved: "Every entertainment option has a cost structure — just like a subscription fee or a service charge. Some retain as little as 0.5%, others up to 15%. Understanding the margin helps you budget smarter across all your spending."
    private: "Cost structures are everywhere — streaming services, loyalty programs, financial products. Some take 0.5%, others up to 15%. Understanding how margins work helps you make better decisions about where your money goes."

O-2:
  default: "Every game has a house edge. It's how the business works. Knowing the edge helps you pick your games and set your budget."
  voice:
    authority: "All games operate with a built-in margin known as the house edge. Understanding this margin is essential for informed game selection and budget planning."
    elder: "Every game takes its cut — that's just how it's always worked. But once you know that, you can make smarter choices about what you play and what you spend."
  humor:
    warm: "Every game takes its cut — that's how the lights stay on. But once you know the number, you can make it work for you. That's the real advantage."
    understated: "Every game has a margin. It's not hidden. Knowing what it is just happens to make every decision after that a better one."
    minimal: "Every game has a house edge. Use it to choose games and set your budget."
  framing:
    communal: "Every game has a house edge — it's how the industry works. Understanding the margin helps you make choices that protect more than just your bankroll."
  directness:
    diplomatic: "Games are designed with a built-in margin. Being aware of it can help you make more informed choices about what to play and how much to spend."
    contextual: "The house edge exists because operators need revenue to run the business. The margin varies — some games retain 0.5%, others retain 15%. The difference between those two numbers shapes a very different evening."
  comfort:
    reserved: "Every entertainment product has a built-in margin — the same way a restaurant marks up ingredients or a streaming service prices its plan. Understanding that margin helps you make informed spending decisions."
    private: "Every product and service you pay for has a built-in cost structure. Understanding how margins work — whether in subscriptions, insurance, or entertainment — helps you budget with clarity and confidence."

O-3:
  default: "No fine print. Just the real numbers behind the games you play."
  voice:
    authority: "Full transparency. Complete odds disclosure for every game on the platform."
    elder: "No tricks, no buried details. Just the honest numbers behind every game — the way it should be."
  humor:
    warm: "We figured you'd rather just see the numbers than wade through the fine print. So that's what we did."
    understated: "The real numbers. No fine print. Not a complicated idea, really."
    minimal: "Real numbers. No fine print. Full transparency."
  framing:
    communal: "No fine print. Just the real numbers behind the games — because knowing them protects the things that matter most."
  directness:
    diplomatic: "We believe in making the numbers behind every game clear and accessible to you."
    contextual: "The real odds exist in every game's documentation. Most players never encounter them. We publish them here, plainly."
  comfort:
    reserved: "Clear information about how costs work across entertainment options — no hidden details, just the real numbers behind each one."
    private: "Straightforward breakdowns of cost structures across the things you spend on. No hidden fees, no surprises — just clear information to help you decide."

O-4:
