# Core Message Cultural Variants
# ================================
# Adapted versions of all 74 Playbook core messages for different cultural profiles.
#
# Default voice: peer / individual / irreverent / blunt / open
# The default is the recommended Playbook voice — tested, proven, and designed
# to work in markets where gambling is openly discussed and informal
# communication resonates.
#
# Variants are organized by message ID matching core-messages.md.
# Each dimension is only listed when it materially changes the message.
#
# Dimensions:
#   voice:       peer (default) / authority / elder
#   framing:     individual (default) / communal
#   humor:       irreverent (default) / warm / understated / minimal
#   directness:  blunt (default) / diplomatic / contextual
#   comfort:     open (default) / reserved / private
#
# See brand-book/09-cultural-adaptation.md for dimension definitions.


