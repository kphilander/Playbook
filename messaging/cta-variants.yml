# CTA Cultural Variants
# ==========================
# Adapted versions of Playbook calls-to-action for different cultural profiles.
#
# Default voice: peer / individual / irreverent / blunt / open
# The default is the recommended Playbook voice — tested, proven, and designed
# to work in markets where gambling is openly discussed and informal
# communication resonates.
#
# These variants let operators adapt CTAs when their market differs
# on one or more cultural dimensions. Pick the variant that matches your
# cultural_profile setting in _brand.yml.
#
# CTAs are short action phrases, so the primary dimensions that change them
# are voice, framing, and comfort. Humor and directness are included only
# where they genuinely alter the CTA text.
#
# Dimensions are only listed when they materially change the CTA.
# If a dimension isn't listed, the default works across all values
# of that dimension.
#
# See brand-book/09-cultural-adaptation.md for full dimension definitions.

