# Tagline Cultural Variants
# ==========================
# Adapted versions of Playbook taglines for different cultural profiles.
#
# Default voice: peer / individual / irreverent / blunt / open
# The default is the recommended Playbook voice — tested, proven, and designed
# to work in markets where gambling is openly discussed and informal
# communication resonates.
#
# These variants let operators adapt taglines when their market differs
# on one or more cultural dimensions. Pick the variant that matches your
# cultural_profile setting in _brand.yml.
#
# Dimensions are only listed when they materially change the tagline.
# If a dimension isn't listed for a tagline, the default works across
# all values of that dimension.
#
# See brand-book/09-cultural-adaptation.md for full dimension definitions.

# ============================================================================
# OPEN PILLAR — Entertainment literacy, transparency, math-first messaging
# ============================================================================

