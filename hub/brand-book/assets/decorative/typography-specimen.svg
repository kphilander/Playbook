<svg xmlns="http://www.w3.org/2000/svg" width="500" height="300" viewBox="0 0 500 300">
  <style>@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800;900&amp;family=Source+Sans+3:wght@300;400;600&amp;family=Source+Code+Pro:wght@400;500;600');</style>

  <rect width="500" height="300" fill="#1B2838" rx="16"/>

  <!-- Inter showcase -->
  <text x="40" y="50" font-family="'Inter', sans-serif" font-weight="900" font-size="10"
        fill="#00D4AA" letter-spacing="3">INTER</text>

  <text x="40" y="90" font-family="'Inter', sans-serif" font-weight="800" font-size="42"
        fill="#FFFFFF" letter-spacing="-1.5">The Quick</text>
  <text x="40" y="130" font-family="'Inter', sans-serif" font-weight="300" font-size="42"
        fill="#8899AA" letter-spacing="-0.5">Brown Fox</text>

  <!-- Weight ramp -->
  <text x="40" y="168" font-family="'Inter', sans-serif" font-weight="300" font-size="14" fill="#7A8FA3">Light 300</text>
  <text x="140" y="168" font-family="'Inter', sans-serif" font-weight="400" font-size="14" fill="#8899AA">Regular 400</text>
  <text x="260" y="168" font-family="'Inter', sans-serif" font-weight="600" font-size="14" fill="#A0B4C8">Semi 600</text>
  <text x="370" y="168" font-family="'Inter', sans-serif" font-weight="800" font-size="14" fill="#FFFFFF">Bold 800</text>

  <!-- Divider -->
  <line x1="40" y1="185" x2="460" y2="185" stroke="#2A3F54" stroke-width="0.5"/>

  <!-- Source Sans 3 -->
  <text x="40" y="210" font-family="'Source Sans 3', sans-serif" font-weight="600" font-size="10"
        fill="#00D4AA" letter-spacing="3">SOURCE SANS 3</text>
  <text x="40" y="235" font-family="'Source Sans 3', sans-serif" font-weight="400" font-size="18"
        fill="#A0B4C8">Body text for clear, accessible communication.</text>

  <!-- Source Code Pro -->
  <text x="40" y="265" font-family="'Source Code Pro', monospace" font-weight="500" font-size="10"
        fill="#00D4AA" letter-spacing="3">SOURCE CODE PRO</text>
  <text x="40" y="285" font-family="'Source Code Pro', monospace" font-weight="400" font-size="14"
        fill="#8899AA">--color-teal: #00D4AA; --color-navy: #1B2838;</text>
</svg>
