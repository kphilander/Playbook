<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="tealGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00D4AA" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#00D4AA" stop-opacity="0.3"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="400" rx="40" fill="#1B2838"/>

  <!-- Subtle radial pulse behind mark -->
  <circle cx="200" cy="185" r="0" fill="none" stroke="#00D4AA" stroke-width="1" opacity="0">
    <animate attributeName="r" values="60;120" dur="3s" begin="1.8s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.3;0" dur="3s" begin="1.8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="200" cy="185" r="0" fill="none" stroke="#00D4AA" stroke-width="1" opacity="0">
    <animate attributeName="r" values="60;120" dur="3s" begin="2.8s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.3;0" dur="3s" begin="2.8s" repeatCount="indefinite"/>
  </circle>

  <!-- Page shape - draws on -->
  <rect x="140" y="130" width="50" height="110" rx="6" fill="none" stroke="#FFFFFF" stroke-width="3"
        stroke-dasharray="320" stroke-dashoffset="320">
    <animate attributeName="stroke-dashoffset" from="320" to="0" dur="0.8s" begin="0.2s" fill="freeze"/>
  </rect>
  <!-- Page fills in -->
  <rect x="140" y="130" width="50" height="110" rx="6" fill="#FFFFFF" opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="1s" fill="freeze"/>
  </rect>

  <!-- Play triangle - draws on -->
  <polygon points="200,130 260,185 200,240" fill="none" stroke="#00D4AA" stroke-width="3" stroke-linejoin="round"
           stroke-dasharray="280" stroke-dashoffset="280">
    <animate attributeName="stroke-dashoffset" from="280" to="0" dur="0.8s" begin="0.6s" fill="freeze"/>
  </polygon>
  <!-- Play triangle fills in -->
  <polygon points="200,130 260,185 200,240" fill="url(#tealGlow)" opacity="0" filter="url(#glow)">
    <animate attributeName="opacity" from="0" to="1" dur="0.4s" begin="1.2s" fill="freeze"/>
  </polygon>

  <!-- Wordmark fades up -->
  <style>@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;800');</style>
  <g opacity="0" transform="translate(0,10)">
    <animate attributeName="opacity" from="0" to="1" dur="0.6s" begin="1.5s" fill="freeze"/>
    <animateTransform attributeName="transform" type="translate" from="0,10" to="0,0" dur="0.6s" begin="1.5s" fill="freeze"/>
    <text x="200" y="310" text-anchor="middle" font-family="'Inter', sans-serif" font-size="52" letter-spacing="-1.5">
      <tspan font-weight="800" fill="#FFFFFF">Play</tspan><tspan font-weight="300" fill="#00D4AA">BOOK</tspan>
    </text>
  </g>

  <!-- Tagline fades up -->
  <text x="200" y="345" text-anchor="middle" font-family="'Inter', sans-serif" font-weight="400" font-size="14"
        letter-spacing="3" fill="#6B8299" opacity="0">
    BRAND SYSTEM
    <animate attributeName="opacity" from="0" to="1" dur="0.6s" begin="1.8s" fill="freeze"/>
  </text>
</svg>
