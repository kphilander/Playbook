<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
  <!-- Card 1 (back) - sways left -->
  <g>
    <animateTransform attributeName="transform" type="rotate" values="-5 100 120;5 100 120;-5 100 120" dur="2s" repeatCount="indefinite"/>
    <rect x="55" y="40" width="90" height="130" rx="8" fill="#1B2838" stroke="#2A3F54" stroke-width="1.5"/>
    <rect x="63" y="48" width="74" height="114" rx="4" fill="none" stroke="#00D4AA" stroke-width="0.5" opacity="0.4"/>
    <!-- Back pattern -->
    <g opacity="0.15" stroke="#00D4AA" stroke-width="0.5">
      <line x1="65" y1="50" x2="135" y2="120"/>
      <line x1="65" y1="70" x2="135" y2="140"/>
      <line x1="65" y1="90" x2="115" y2="140"/>
      <line x1="85" y1="50" x2="135" y2="100"/>
      <line x1="105" y1="50" x2="135" y2="80"/>
      <line x1="135" y1="50" x2="65" y2="120"/>
      <line x1="135" y1="70" x2="65" y2="140"/>
      <line x1="135" y1="90" x2="85" y2="140"/>
      <line x1="115" y1="50" x2="65" y2="100"/>
      <line x1="95" y1="50" x2="65" y2="80"/>
    </g>
  </g>

  <!-- Card 2 (middle) - sways right offset -->
  <g>
    <animateTransform attributeName="transform" type="rotate" values="3 100 120;-3 100 120;3 100 120" dur="2s" begin="0.3s" repeatCount="indefinite"/>
    <rect x="55" y="40" width="90" height="130" rx="8" fill="#FFFFFF" stroke="#E0E0E8" stroke-width="1.5"/>
    <!-- Card face - heart suit -->
    <text x="67" y="64" font-family="'Inter', sans-serif" font-size="16" font-weight="700" fill="#FF6B35">A</text>
    <path d="M73 72c-3-3-8-3-8 2s8 8 8 8 8-3 8-8-5-5-8-2z" fill="#FF6B35" opacity="0.7"/>
    <!-- Center suit large -->
    <path d="M100 85c-8-8-22-8-22 5s22 22 22 22 22-9 22-22-14-13-22-5z" fill="#FF6B35" opacity="0.15"/>
    <!-- Bottom corner -->
    <text x="125" y="160" font-family="'Inter', sans-serif" font-size="16" font-weight="700" fill="#FF6B35" text-anchor="end" transform="rotate(180 121 152)">A</text>
  </g>

  <!-- Card 3 (front) - floats up -->
  <g>
    <animateTransform attributeName="transform" type="translate" values="0,0;0,-6;0,0" dur="2s" begin="0.6s" repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="rotate" values="-2 100 120;2 100 120;-2 100 120" dur="2.5s" repeatCount="indefinite" additive="sum"/>
    <rect x="55" y="40" width="90" height="130" rx="8" fill="#FFFFFF" stroke="#E0E0E8" stroke-width="1.5"/>
    <!-- Card face - spade suit, bolder -->
    <text x="67" y="64" font-family="'Inter', sans-serif" font-size="16" font-weight="800" fill="#1B2838">K</text>
    <path d="M73 68l-5 6c-2 3 0 5 3 4l-1 3h6l-1-3c3 1 5-1 3-4z" fill="#1B2838"/>
    <!-- Center spade large -->
    <path d="M100 78l-16 18c-6 8 0 16 9 12l-3 11h20l-3-11c9 4 15-4 9-12z" fill="#1B2838" opacity="0.25"/>
    <!-- Bottom corner -->
    <text x="125" y="160" font-family="'Inter', sans-serif" font-size="16" font-weight="800" fill="#1B2838" text-anchor="end" transform="rotate(180 121 152)">K</text>
  </g>
</svg>
